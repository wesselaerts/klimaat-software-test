.fb-protoband{font-family:var(--mono);font-size:8.5px;font-weight:800;letter-spacing:.18em;text-align:center;color:#46514b;background:rgba(0,0,0,.05);border-radius:3px;margin:4px 6px;padding:3px 0}
.fb-protoband.bad{color:var(--warn)}
.fb-connline{display:flex;align-items:center;gap:5px;font-size:9.5px;font-weight:600;color:var(--info);padding:4px 8px 6px}
.fb-connline svg{color:var(--info);flex:0 0 auto}
.fb-connline.bad,.fb-connline.bad svg{color:var(--warn)}

/* veldbus-stations met eigen I/O-rail (zelfde opbouw als PLC) */
.fb-hint{display:flex;align-items:flex-start;gap:7px;padding:11px 16px 0;font-size:12px;color:var(--ink-2);line-height:1.5}
.fb-hint svg{flex:0 0 auto;color:var(--ink-3);margin-top:1px}
.fb-stations{display:flex;flex-direction:column;gap:14px;padding:14px 16px 18px}
.fb-station{display:flex;align-items:stretch;gap:0;border:1px solid var(--c-line);border-radius:var(--r-lg);background:var(--c-sunken);overflow-x:auto;position:relative}
.fb-station::before{content:"";position:absolute;left:188px;top:50%;width:18px;height:2px;background:var(--info);transform:translateY(-50%);opacity:.5}
.fb-coupler{flex:0 0 188px;display:flex;flex-direction:column;gap:5px;justify-content:center;padding:12px 14px;border-right:2px dashed var(--info-line);background:linear-gradient(180deg,#DBE0DD,#C8CFCB);border-radius:var(--r-lg) 0 0 var(--r-lg)}
.fb-coupler.hw-pick{cursor:pointer}
.fb-coupler.hw-pick:hover{background:linear-gradient(180deg,#e7f0ea,#d6e4dc)}
.fb-coupler.bad{border-right-color:var(--warn-line)}
.fb-io{flex:1;min-width:0;padding:12px 14px;display:flex;align-items:stretch}
.fb-io .hw-railrow{padding:0}
.fb-station .fb-proto{align-self:flex-start}

/* SD-kaart in controller */
.hw-sd{width:100%;border:0;background:#c0c7c4;border-radius:5px;padding:6px;display:flex;flex-direction:column;gap:5px;cursor:default;font:inherit}
.hw-sd.hw-pick{cursor:pointer}
.hw-sd.hw-pick:hover{outline:1.5px solid var(--acc);outline-offset:1px}
.hw-sd .slot.has{display:flex;align-items:center;justify-content:center;background:linear-gradient(90deg,#1f4a33,#2a6f50 70%,#1f4a33)}
.hw-sd .slot.has .sdsz{font-family:var(--mono);font-size:7px;font-weight:700;color:#cfe7d6}

/* doorzoekbare kiezer */
.pick-search{display:flex;align-items:center;gap:8px;padding:9px 12px;border:1px solid var(--c-line-2);border-radius:var(--r-md);background:var(--c-sunken)}
.pick-search svg{color:var(--ink-3);flex:0 0 auto}
.pick-search input{flex:1;border:0;background:none;font:inherit;font-size:14px;color:var(--ink);outline:none}
.pick-list{display:flex;flex-direction:column;gap:6px;max-height:48vh;overflow:auto;margin-top:4px}
.pick-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid var(--c-line);border-radius:var(--r-sm);background:var(--c-surface);cursor:pointer;text-align:left;font:inherit}
.pick-row:hover{border-color:var(--acc);background:var(--acc-50)}
.pick-row.cur{border-color:var(--acc);background:var(--acc-50)}
.pick-row.dis{opacity:.62;cursor:not-allowed;background:var(--c-sunken)}
.pick-row.dis:hover{border-color:var(--c-line)}
.pick-row .pr-l{display:flex;align-items:center;gap:10px;min-width:0;flex:1}
.pick-row .pr-ic{flex:0 0 auto;width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;background:var(--c-sunken);color:var(--ink-2)}
.pick-row .pr-ic.DI{background:#E7F0F4;color:#2E6E8E}.pick-row .pr-ic.DO{background:#FBF0DC;color:#B26A00}
.pick-row .pr-ic.AI,.pick-row .pr-ic.AO{background:#EDEBF7;color:#6A5FB0}
.pick-row .pr-ic.alarm{background:var(--alarm-bg);color:var(--alarm)}.pick-row .pr-ic.idle{background:var(--idle-bg);color:var(--ink-3)}
.pick-row .pr-txt{display:flex;flex-direction:column;gap:1px;min-width:0}
.pick-row .nm{font-size:13.5px;color:var(--ink);font-weight:600;line-height:1.25}
.pick-row .sub{font-size:11.5px;color:var(--ink-2);line-height:1.35}
.pick-row .why{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--warn);margin-top:1px}
.pick-row .meta{font-size:11px;color:var(--ink-3);margin-left:auto;font-family:var(--mono);flex:0 0 auto;text-align:right;white-space:nowrap}
.pick-row .curtag{display:inline-block;font-family:var(--font);font-size:9.5px;font-weight:700;color:var(--acc-700);background:var(--acc-50);border:1px solid var(--acc-100);border-radius:99px;padding:0 6px;margin-left:4px}
.pick-empty{display:none;padding:18px;text-align:center;color:var(--ink-3);font-size:12.5px}

/* ---- diagnostic faceplate ---- */
.dg-h{display:flex;align-items:center;gap:12px;padding:14px 15px;border-radius:var(--r-md);margin-bottom:16px}
.dg-h.flt{background:var(--alarm-bg);border:1px solid var(--alarm-line)}
.dg-h.ok{background:var(--ok-bg);border:1px solid var(--ok-line)}
.dg-h .big{font-size:15px;font-weight:700;color:var(--ink)}
.dg-h.flt .big{color:var(--alarm)}
.dg-h .code{margin-left:auto;font-family:var(--mono);font-weight:700;font-size:13px;padding:4px 9px;border-radius:6px;background:rgba(0,0,0,.05)}
.dg-h.flt .code{background:#fff;color:var(--alarm)}
.dg-grid{display:grid;grid-template-columns:auto 1fr;gap:8px 16px;font-size:13px;margin-bottom:14px}
.dg-grid dt{color:var(--ink-3);font-size:12px;font-weight:600}
.dg-grid dd{color:var(--ink);margin:0}
.dg-grid dd.mono{font-family:var(--mono);font-size:12.5px}
.dg-block{border:1px solid var(--c-line);border-radius:var(--r-md);padding:12px 14px;margin-bottom:10px}
.dg-block h5{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-3);margin:0 0 5px}
.dg-block p{margin:0;font-size:13px;color:var(--ink);line-height:1.5}
.dg-force{display:flex;gap:10px;align-items:flex-start;padding:11px 13px;border-radius:var(--r-md);background:var(--warn-bg);border:1px solid var(--warn-line);color:var(--warn);font-size:12.5px;margin-bottom:14px;line-height:1.45}
.dg-force b{color:var(--warn)}
.dg-wire{display:flex;flex-wrap:wrap;gap:6px 16px;font-size:13px;color:var(--ink)}
.dg-wire b{font-family:var(--mono);font-weight:700}
.dg-wire span{display:inline-flex;align-items:center;gap:5px}
.hw-ch .hbadge{display:none;font-family:var(--mono);font-size:7.5px;font-weight:800;color:#fff;background:var(--warn);border-radius:3px;padding:0 3px;flex:0 0 auto;line-height:1.45}
.hw-ch.hand .hbadge{display:inline-flex;align-items:center}
.hw-ch.hand{box-shadow:inset 2px 0 0 var(--warn)}
.hw-ch.hand.flt{box-shadow:inset 2px 0 0 var(--warn),0 0 0 1px var(--alarm-line)}
.sys-card{margin-top:20px;overflow:hidden}
.sys-head{display:flex;align-items:center;gap:8px;padding:13px 16px;border-bottom:1px solid var(--c-line)}
.sys-head h3{font-size:14px}
.sys-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(152px,1fr));gap:1px;background:var(--c-line)}
.sys-tile{background:var(--c-surface);padding:11px 14px;display:flex;flex-direction:column;gap:4px;min-width:0}
.sys-tile .k{font-size:10.5px;color:var(--ink-3);font-weight:600;text-transform:uppercase;letter-spacing:.03em}
.sys-tile .v{font-size:14px;color:var(--ink);font-weight:600}
.sys-tile .v.mono{font-family:var(--mono)}
.sys-tile .sub{font-size:11px;color:var(--ink-3)}
.sys-tile .bar{position:relative;height:6px;border-radius:3px;background:var(--c-sunken);overflow:hidden;margin-top:3px}
.sys-tile .bar span{position:absolute;left:0;top:0;bottom:0;background:var(--acc);border-radius:3px;transition:width var(--dur)}
.sys-tile .bar span.warn{background:var(--warn)}.sys-tile .bar span.ok{background:var(--ok)}
.sys-tile .bar i{position:absolute;top:-2px;bottom:-2px;width:2px;background:var(--alarm);opacity:.55}

.hw-tbl tr.grp td{background:var(--c-sunken);font-size:11px;font-weight:700;letter-spacing:.02em;color:var(--ink-2);text-transform:none;padding:8px 14px}
.hw-tbl tr.grp td .smono{font-family:var(--mono);color:var(--acc-700);font-size:11.5px}
.tbl tr.flt td{background:var(--alarm-bg)}
.tbl tr.flt:hover td{background:var(--alarm-bg)}
.tbl tr.flt td.tag{color:var(--alarm);font-weight:600}
@media (prefers-reduced-motion: reduce){
  .led.blink{animation:none!important;opacity:1!important}
  *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important}
  #main.reveal>*{animation:none!important}
  .tb-conn .pulse::after{animation:none!important}
  #boot .btrack>i{animation:none!important;width:100%}
}

/* afgeleide hardware-info uit de keuzes */
function hwCtrl(){return CONTROLLERS[state.hw.ctrlId]||CONTROLLERS.F2152;}
function hwSd(){return SD_CARDS[state.hw.sd]||SD_CARDS.none;}
function nextSegUid(ctx){ctx=ctx||state.hw;return ctx._uid=(ctx._uid||1)+1;}
/* SE-segmenten met hun globale slot-bereik (start..start+count-1) */
function seSegs(ctx){ctx=ctx||state.hw;const out=[];let start=0;(ctx.rail||[]).forEach((seg,ri)=>{if(seg.kind==='se'){const c=(BACKPLANES[seg.bp]||BACKPLANES.SE6).slots;out.push({ri,uid:seg.uid,bp:seg.bp,count:c,start});start+=c;}});return out;}
function hwSlotCount(ctx){return seSegs(ctx).reduce((n,s)=>n+s.count,0);}
function segOfSlot(slot,ctx){const segs=seSegs(ctx);for(const s of segs){if(slot>=s.start&&slot<s.start+s.count)return s;}return null;}

const uidOf=s=>s.type+':'+s.k;

function sigAt(slot,ch){for(const[u,p]of Object.entries(state.hw.map)){if(p.slot===slot&&p.ch===ch)return sigByUid(u);}return null;}
function hwAddr(s){const p=state.hw.map[uidOf(s)];return p?('S'+(p.slot+1)+'·CH'+String(p.ch).padStart(2,'0')):null;}
function chFaultCode(slot,ch){return state.hw.diag[slot+'.'+ch]||null;}
function modFaultCode(slot){return state.hw.diag[slot+'.M']||null;}
function condOf(elemId,code){return (DIAG[elemId]||[]).find(c=>c.code===code)||{code,nm:'Onbekende diagnose',cause:'',action:'',lvl:'mod'};}
function sigFault(s){const p=state.hw.map[uidOf(s)];if(!p)return null;const el=state.hw.slots[p.slot];if(!el||!el.type)return null;const code=chFaultCode(p.slot,p.ch)||modFaultCode(p.slot);if(!code)return null;return {code,cond:condOf(el.type,code),slot:p.slot,ch:p.ch};}
function activeFaults(){
  const out=[];
  for(const[key,code]of Object.entries(state.hw.diag)){
    const[s,c]=key.split('.');const slot=+s;const el=state.hw.slots[slot];if(!el||!el.type)continue;

    out.push({slot,ch,code,cond:condOf(el.type,code),sig:ch?sigAt(slot,ch):null,elem:ELEMENTS[el.type]});

}

function chOn(s){

function buildSequence(rcp){
  const steps=[
    {nm:'Tussenbak '+rcp.bak+' selecteren',meta:'Route vrijgeven naar tussenbak '+rcp.bak,dur:3},
    {nm:'Inlaatklep '+rcp.bak+(rcp.bak==='B'?' (KI 14)':'')+' openen',meta:'Vulroute geopend',dur:2}
  ];
  // Na ELKE doseerklep een dichtheidstest: alles dicht, pomp aan, FC 01 = 0 verwacht.
  rcp.steps.forEach(([src,amt])=>{
    steps.push({nm:src+' doseren — '+amt+' L',meta:'Doseren op flow · volgorde geborgd',dur:4,dose:src,amt});
    steps.push({nm:'Lektest — '+src+' dicht?',meta:'Alle kleppen dicht · pomp aan · FC 01 moet 0 melden',dur:3,leaktest:true,after:src});
  });
  steps.push({nm:'Mengen (recirculatie VP 0'+(rcp.bak==='A'?'2':'3')+')',meta:'Rondpompen tot homogeen',dur:6,recirc:true});
  steps.push({nm:'Overpompen naar '+rcp.bak+'1 / '+rcp.bak+'2 (KL 20)',meta:'Hoog toeren (50 Hz)',dur:7,transfer:true});
  steps.push({nm:'Doseerstraat spoelen',meta:'Schoon water — voorkomt vermenging',dur:4,flush:true});
  steps.push({nm:'Lektest — waterklep dicht?',meta:'Alle kleppen dicht · pomp aan · FC 01 moet 0 melden',dur:3,leaktest:true,after:'Water'});
  steps.push({nm:'Batch gereed',meta:'Tussenbak '+rcp.bak+' geleegd · klaar voor volgende',dur:3,end:true});
  return steps;
}

/* ---------- LEVENDE-BEWEGING HELPERS ---------- */
function reducedMotion(){return !!(window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches);}
const _tw={};
function tweenNum(el,to,dur){
  if(!el)return; to=Math.round(to);
  const id=el.id||(el.id='tw'+Math.random().toString(36).slice(2));
  const cur=parseFloat(String(el.textContent||'').replace(/[^0-9,-]/g,'').replace(',','.'));
  const from=isNaN(cur)?to:cur;
  if(from===to){el.textContent=fix(to);return;}
  if(reducedMotion()||!dur){el.textContent=fix(to);return;}
  if(_tw[id])cancelAnimationFrame(_tw[id]);
  const t0=(typeof performance!=='undefined'&&performance.now)?performance.now():Date.now();
  const step=now=>{let p=Math.min(1,(now-t0)/dur);p=1-Math.pow(1-p,3);el.textContent=fix(Math.round(from+(to-from)*p));if(p<1)_tw[id]=requestAnimationFrame(step);};
  _tw[id]=requestAnimationFrame(step);
}
function flash(el){if(!el||reducedMotion())return;el.classList.remove('flash');void el.offsetWidth;el.classList.add('flash');}

function wavePath(cx,w,top,h,amp,wl){
  const x0=+(cx-w/2-wl).toFixed(1), x1=+(cx+w/2+wl).toFixed(1), half=wl/2;
  let d=`M${x0} ${top}`, up=true;
  for(let x=x0;x<x1-0.1;x+=half){const nx=+(x+half).toFixed(1);const mx=+(x+half/2).toFixed(1);const my=+(top+(up?-amp*2:amp*2)).toFixed(1);d+=`Q${mx} ${my} ${nx} ${top}`;up=!up;}
  d+=`L${x1} ${+(top+2*h).toFixed(1)}L${x0} ${+(top+2*h).toFixed(1)}Z`;
  return d;
}
function vesselSVG(key,cx,top,w,h,minPc){
  const x=cx-w/2, ab=(key.includes('A')||key==='tA')?'a':'b';
  const wl=+(w/1.5).toFixed(1), amp=2.6, wd=wavePath(cx,w,top,h,amp,wl);
  const pc0=Math.max(0,Math.min(100,(state.lvl&&state.lvl[key]!=null)?state.lvl[key]:0)), ty0=((1-pc0/100)*h).toFixed(1);
  let s=`<clipPath id="clip-${key}"><rect x="${x}" y="${top}" width="${w}" height="${h}" rx="10"/></clipPath>`;
  s+=`<rect class="svessel" x="${x}" y="${top}" width="${w}" height="${h}" rx="10"/>`;
  s+=`<g clip-path="url(#clip-${key})">`
    +`<g class="liqlvl" id="liqg-${key}" style="transform:translateY(${ty0}px)">`
      +`<g class="liq-wave" style="--wl:${wl}px"><path fill="url(#grad-${ab})" d="${wd}"/></g>`
      +`<g class="liq-wave2" style="--wl:${wl}px"><path fill="url(#grad-${ab})" fill-opacity=".45" d="${wd}"/></g>`
    +`</g>`
    +`<rect class="glass-sheen" x="${x}" y="${top}" width="${+(w*0.5).toFixed(1)}" height="${h}" rx="10" fill="url(#sheen)"/>`
  +`</g>`;
  if(minPc!=null){const my=+(top+h-(minPc/100*h)).toFixed(1);s+=`<line x1="${x}" y1="${my}" x2="${x+w}" y2="${my}" stroke="${COL.alarm}" stroke-width="1.5" stroke-dasharray="3 3" opacity=".5"/>`;}
  s+=`<rect x="${x}" y="${top}" width="${w}" height="${h}" rx="10" fill="none" stroke="#C6CFC6" stroke-width="1.5"/>`;
  return s;
}
function pipe(id,d,cls){return `<path class="pipe-base" d="${d}"/><path class="pipe-flow" id="${id}" data-d="${cls}" d="${d}"/>`;}

function buildMimic(){
  const m=MX;const cy=m.collY;
  let s=`<svg class="mimic" viewBox="0 0 1200 620" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Procesmimic Cogas AutoFill">`;
  // defs gradients
  s+=`<defs>
     <linearGradient id="grad-a" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${COL.aSoft}"/><stop offset="1" stop-color="${COL.a}"/></linearGradient>
     <linearGradient id="grad-b" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${COL.bSoft}"/><stop offset="1" stop-color="${COL.b}"/></linearGradient>
     <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ffffff" stop-opacity=".22"/><stop offset=".6" stop-color="#ffffff" stop-opacity="0"/></linearGradient>
   </defs>`;
  // zone backgrounds
  s+=`<rect x="176" y="290" width="248" height="320" rx="16" fill="${COL.aBg}" opacity=".45"/>`;
  s+=`<rect x="776" y="290" width="248" height="320" rx="16" fill="${COL.bBg}" opacity=".5"/>`;
  s+=`<circle cx="200" cy="306" r="4" fill="${COL.a}" opacity=".7"/><text x="210" y="310" text-anchor="start" class="stank-lbl" fill="${COL.a}" font-size="11" font-weight="700" opacity=".7">A</text>`;
  s+=`<circle cx="1000" cy="306" r="4" fill="${COL.b}" opacity=".7"/><text x="990" y="310" text-anchor="end" class="stank-lbl" fill="${COL.b}" font-size="11" font-weight="700" opacity=".7">B</text>`;

  // collector
  s+=`<path class="pipe-base" d="M62 ${cy}H1138"/>`;
  s+=`<path class="pipe-flow" id="f-coll" d="M62 ${cy}H1138"/>`;
  // sources
  SOURCES.forEach((src,i)=>{
    const x=srcX(i);
    const bakCol=src.bak==='A'?COL.a:src.bak==='B'?COL.b:src.bak==='AB'?COL.ink2:COL.water;
    const bakTxt=src.bak==='-'?'H₂O':src.bak;
    s+=`<text x="${x}" y="42" text-anchor="middle" class="ssrc-nm">${src.name}</text>`;
    s+=`<rect class="svessel" x="${x-m.srcW/2}" y="${m.srcY+6}" width="${m.srcW}" height="${m.srcH-6}" rx="7"/>`;
    s+=`<rect x="${x-m.srcW/2+2}" y="${m.srcY+m.srcH-19}" width="${m.srcW-4}" height="17" rx="3" fill="${bakCol}" opacity=".20"/>`;
    s+=`<rect x="${x-m.srcW/2-1.5}" y="${m.srcY}" width="${m.srcW+3}" height="15" rx="6" fill="${bakCol}"/>`;
    s+=`<text x="${x}" y="${m.srcY+11}" text-anchor="middle" font-family="${COL.mono}" font-size="9.5" font-weight="800" fill="#fff">${bakTxt}</text>`;
    // branch + valve
    s+=`<path class="pipe-base" d="M${x} 121V${cy}"/>`;
    s+=`<path class="pipe-flow" id="f-src${src.n}" d="M${x} 121V${cy}"/>`;
    s+=valveSVG('val-dose-'+src.n,x,120,'dose-'+src.n);
  });
  // feed to FC01 + FCS1 + manifold
  s+=`<path class="pipe-base" d="M600 ${cy}V${m.manY}"/>`;
  s+=`<path class="pipe-flow" id="f-feed" d="M600 ${cy}V${m.manY}"/>`;
  // FC01
  s+=`<circle cx="600" cy="${m.fcY}" r="15" fill="#fff" stroke="#C6CFC6" stroke-width="1.5"/>`;
  s+=`<g stroke="${COL.acc}" stroke-width="1.8" fill="none" stroke-linecap="round"><path d="M593 ${m.fcY}c2 -4 5 -4 7 0s5 4 7 0"/></g>`;
  s+=`<text x="622" y="${m.fcY-4}" class="sreadout-lbl">FC 01 · flow</text>`;
  s+=`<text x="622" y="${m.fcY+11}" class="sreadout" id="ro-flow">0 L/min</text>`;
  // FCS1 pump
  s+=pumpSVG('pump-fcs',600,m.fcsY,16,'fcs');
  s+=`<text x="624" y="${m.fcsY-4}" class="sreadout-lbl">FCS1 · hoofdpomp</text>`;
  s+=`<text x="624" y="${m.fcsY+11}" class="sreadout" id="ro-fcs">Standby</text>`;
  // manifold
  s+=`<path class="pipe-base" d="M${m.tA} ${m.manY}H${m.tB}"/>`;
  s+=`<path class="pipe-flow" id="f-man" d="M${m.tA} ${m.manY}H${m.tB}"/>`;

  // ---- tussenbak A + B ----
  [['A',m.tA,m.recircAX,m.A1,m.A2],['B',m.tB,m.recircBX,m.B1,m.B2]].forEach(([L,cx,rx,v1,v2])=>{
    const tk='t'+L;
    // inlet pipe
    s+=`<path class="pipe-base" d="M${cx} ${m.manY}V${m.tankTop}"/>`;
    s+=`<path class="pipe-flow" id="f-in${L}" d="M${cx} ${m.manY}V${m.tankTop}"/>`;
    s+=valveSVG('val-inlet-'+L,cx,290,'inlet-'+L);
    // vessel
    s+=vesselSVG(tk,cx,m.tankTop,m.tankW,m.tankH,null);
    s+=`<g class="bubbles" id="bub-${tk}" clip-path="url(#clip-${tk})">`+[0,1,2].map(i=>`<circle cx="${cx-8+i*8}" cy="${m.tankTop+m.tankH-8}" r="${(2.2-i*0.3).toFixed(1)}" fill="#fff" style="animation-delay:${(i*0.9).toFixed(1)}s"/>`).join('')+`</g>`;
    s+=`<text x="${cx}" y="${m.tankTop+m.tankH/2-4}" text-anchor="middle" class="sreadout" id="nm-${tk}" fill="#fff" font-size="13" font-weight="600">Tussenbak ${L}</text>`;
    s+=`<text x="${cx}" y="${m.tankTop+m.tankH/2+16}" text-anchor="middle" class="stank-pc" id="pc-${tk}" fill="#fff">0%</text>`;
    // pump (mengpomp)
    s+=`<path class="pipe-base" d="M${cx} ${m.tankTop+m.tankH}V${m.pumpY}"/>`;
    s+=pumpSVG('pump-vp'+(L==='A'?'02':'03'),cx,m.pumpY,13,'vp'+(L==='A'?'02':'03'));
    s+=`<text x="${cx+(L==='A'?-32:32)}" y="${m.pumpY+3}" text-anchor="${L==='A'?'end':'start'}" class="sreadout-lbl">VP 0${L==='A'?'2':'3'}</text>`;
    // recirc loop
    const rd=`M${cx} ${m.pumpY+13}V${m.pumpY+30}H${rx}V316H${L==='A'?cx-m.tankW/2:cx+m.tankW/2}`;
    s+=`<path class="pipe-base" d="${rd}"/>`;
    s+=`<path class="pipe-flow" id="f-rec${L}" d="${rd}"/>`;
    s+=valveSVG('val-recirc-'+L,rx,400,'recirc-'+L);
    s+=`<text x="${rx}" y="384" text-anchor="middle" class="sreadout-lbl">meng</text>`;
    // transfer to voorraad
    const td=`M${cx} ${m.pumpY+13}V${m.klManY}M${v1} ${m.klManY}H${v2}`;
    s+=`<path class="pipe-base" d="${td}"/>`;
    s+=`<path class="pipe-flow" id="f-tr${L}" d="${td}"/>`;
    [[v1,L+'1'],[v2,L+'2']].forEach(([vx,bk])=>{
      s+=`<path class="pipe-base" d="M${vx} ${m.klManY}V${m.vbTop}"/>`;
      s+=`<path class="pipe-flow" id="f-tr${L}-${bk}" d="M${vx} ${m.klManY}V${m.vbTop}"/>`;
      s+=valveSVG('val-kl-'+bk,vx,474,'kl-'+bk);
      // voorraad vessel
      s+=vesselSVG(bk,vx,m.vbTop,m.vbW,m.vbH,12);
      const cap=L==='A'?1500:1000;
      s+=`<text x="${vx}" y="${m.vbTop+m.vbH+16}" text-anchor="middle" class="stank-lbl">${bk} · ${cap} L</text>`;
      s+=`<text x="${vx}" y="${m.vbTop+m.vbH/2-3}" text-anchor="middle" class="stank-pc" id="pc-${bk}" fill="#fff">0%</text>`;
      s+=`<text x="${vx}" y="${m.vbTop+m.vbH/2+15}" text-anchor="middle" class="sreadout" id="lt-${bk}" fill="#fff" font-size="12">0 L</text>`;
    });
  });
  s+=`</svg>`;
  return s;
}

function setLiquid(key,pc,max){
  const m=MX;const isTank=key==='tA'||key==='tB';
  const h=isTank?m.tankH:m.vbH;
  const g=$('#liqg-'+key), pcEl=$('#pc-'+key);
  if(g){const cl=Math.max(0,Math.min(100,pc));g.style.transform='translateY('+((1-cl/100)*h).toFixed(1)+'px)';}
  if(pcEl)pcEl.textContent=Math.round(pc)+'%';
  const lt=$('#lt-'+key); if(lt&&max)lt.textContent=fix(Math.round(pc/100*max))+' L';
  if(!isTank&&pcEl){const dark=pc<52;pcEl.setAttribute('fill',dark?COL.ink:'#fff');if(lt)lt.setAttribute('fill',dark?COL.ink2:'#fff');}
}
function setValve(id,open){const e=$('#val-'+id);if(e)e.classList.toggle('open',!!open);}
function setPump(id,run){const e=$('#'+id);if(e)e.classList.toggle('run',!!run);}
function setFlow(id,on,col){const e=$('#'+id);if(!e)return;e.setAttribute('class','pipe-flow'+(on?(' on '+(col||'fl-mix')):''));}

function updateMimic(){
  // flow-snelheid gekoppeld aan werkelijk debiet
  const root=$('#mimic-host svg');
  if(root){let fd=1.0;const af=state.activeFlow;
    if(af){if(af.tr)fd=0.7;else if(af.rec)fd=0.95;else{const f=Math.max(1,state.flow);fd=Math.max(0.6,Math.min(4,33/f));}}
    root.style.setProperty('--flow-dur',fd.toFixed(2)+'s');}
  // mengbellen tijdens recirculatie
  ['tA','tB'].forEach(t=>{const el=$('#bub-'+t);if(el)el.classList.toggle('on',!!state.mixing&&('t'+state.rcp.bak)===t);});
  // levels
  setLiquid('tA',state.lvl.tA); setLiquid('tB',state.lvl.tB);
  setLiquid('A1',state.lvl.A1,1500); setLiquid('A2',state.lvl.A2,1500);
  setLiquid('B1',state.lvl.B1,1000); setLiquid('B2',state.lvl.B2,1000);
  // readouts
  const ro=$('#ro-flow'); if(ro)ro.textContent=fix(state.flow)+' L/min';
  const rf=$('#ro-fcs'); if(rf)rf.textContent=state.fcsFlt?'Storing':state.fcsRun?(state.hz+' Hz · '+(state.fcsHi?'hoog':'laag')):'Standby';
  if(rf)rf.setAttribute('fill',state.fcsFlt?COL.alarm:state.fcsRun?COL.acc:COL.ink2);
  // pumps
  setPump('pump-fcs',state.fcsRun); setPump('pump-vp02',state.openValves.has('vp02')); setPump('pump-vp03',state.openValves.has('vp03'));
  // valves: reset all then set open
  $$('.sval').forEach(e=>e.classList.remove('open'));
  state.openValves.forEach(k=>{ if(k.startsWith('dose-'))setValve(k,1); });
  ['inlet-A','inlet-B','recirc-A','recirc-B','kl-A1','kl-A2','kl-B1','kl-B2'].forEach(k=>setValve(k,state.openValves.has(k)));
  // flows off
  $$('.pipe-flow').forEach(e=>e.setAttribute('class','pipe-flow'));
  const af=state.activeFlow;
  if(af){
    if(af.feed){
      setFlow('f-feed',1,af.col);
      // collector: alleen van de actieve bron naar het aftappunt (x=600)
      let sx=600;
      if(af.src){const idx=SOURCES.findIndex(s=>s.n===af.src);if(idx>=0)sx=Math.round(srcX(idx));setFlow('f-src'+af.src,1,af.col);}
      const ce=$('#f-coll');if(ce)ce.setAttribute('d',`M${Math.min(sx,600)} ${MX.collY}H${Math.max(sx,600)}`);
      setFlow('f-coll',1,af.col);
      // manifold: alleen van het midden naar de actieve tussenbak
      const tx=af.in==='A'?MX.tA:af.in==='B'?MX.tB:600;
      const me=$('#f-man');if(me)me.setAttribute('d',`M${Math.min(600,tx)} ${MX.manY}H${Math.max(600,tx)}`);
      setFlow('f-man',1,af.col);
    }
    if(af.in){ setFlow('f-in'+af.in,1,af.col); }
    if(af.rec){ setFlow('f-rec'+af.rec,1,'fl-mix'); }
    if(af.tr){ const L=af.tr; setFlow('f-tr'+L,1,L==='A'?'fl-a':'fl-b'); setFlow('f-tr'+L+'-'+L+'1',1,L==='A'?'fl-a':'fl-b'); setFlow('f-tr'+L+'-'+L+'2',1,L==='A'?'fl-a':'fl-b'); }
  }
}

function miniTankSVG(bak,pc){
  const w=44,h=74,x=6,top=6, ab=bak[0]==='A'?'a':'b';
  const wl=+(w/1.4).toFixed(1), amp=2.2, wd=wavePath(x+w/2,w,top,h,amp,wl);
  const ty=((1-Math.max(0,Math.min(100,pc))/100)*h).toFixed(1);
  const c1=ab==='a'?COL.aSoft:COL.bSoft, c2=ab==='a'?COL.a:COL.b;
  return `<svg class="mtank" width="56" height="86" viewBox="0 0 56 86" aria-hidden="true">`
    +`<defs><linearGradient id="mg-${bak}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${c1}"/><stop offset="1" stop-color="${c2}"/></linearGradient>`
    +`<clipPath id="mc-${bak}"><rect x="${x}" y="${top}" width="${w}" height="${h}" rx="9"/></clipPath></defs>`
    +`<rect x="${x}" y="${top}" width="${w}" height="${h}" rx="9" fill="#F1F6F1" stroke="#C6CFC6" stroke-width="1.4"/>`
    +`<g clip-path="url(#mc-${bak})"><g class="liqlvl" id="mliqg-${bak}" style="transform:translateY(${ty}px)">`
      +`<g class="liq-wave" style="--wl:${wl}px"><path fill="url(#mg-${bak})" d="${wd}"/></g>`
      +`<g class="liq-wave2" style="--wl:${wl}px"><path fill="url(#mg-${bak})" fill-opacity=".45" d="${wd}"/></g>`
    +`</g></g>`
    +`<rect x="${x}" y="${top}" width="${w}" height="${h}" rx="9" fill="none" stroke="#C6CFC6" stroke-width="1.4"/>`
  +`</svg>`;
}
function setMiniLiquid(bak,pc){const g=$('#mliqg-'+bak);if(g){const cl=Math.max(0,Math.min(100,pc));g.style.transform='translateY('+((1-cl/100)*74).toFixed(1)+'px)';}}
function updateSpark(){
  const l=$('#kpi-spark-l'),a=$('#kpi-spark-a');if(!l)return;
  const h=state.flowHist;
  if(!h||h.length<2){l.setAttribute('d','');if(a)a.setAttribute('d','');return;}
  const W=120,H=26,n=h.length,max=Math.max(12,...h)*1.1;
  const pts=h.map((v,i)=>[+(i/(n-1)*W).toFixed(1),+(H-2-(Math.max(0,v)/max)*(H-4)).toFixed(1)]);
  const dl='M'+pts.map(p=>p[0]+' '+p[1]).join(' L');
  l.setAttribute('d',dl);
  if(a)a.setAttribute('d',dl+' L'+W+' '+H+' L0 '+H+' Z');
}
function tankTile(bak,cap){
  const pc=state.lvl[bak];const L=bak[0].toLowerCase();
  return `<div class="tank ${L}" id="tile-${bak}">
    ${miniTankSVG(bak,pc)}
    <div class="meta">
      <div class="nm">${bak} <span class="chip ${L}">${bak[0]}</span></div>

      <div class="lt"><span id="tlt-${bak}" class="num">${fix(Math.round(pc/100*cap))}</span> / ${fix(cap)} L</div>
    </div>
  </div>`;
}
function ringSVG(pct,color){
  const r=18,c=2*Math.PI*r,off=c*(1-pct/100);
  return `<svg width="46" height="46" viewBox="0 0 46 46"><circle cx="23" cy="23" r="${r}" fill="none" stroke="#E2E8F0" stroke-width="4"/><circle cx="23" cy="23" r="${r}" fill="none" stroke="${color}" stroke-width="4" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 23 23)" style="transition:stroke-dashoffset .6s"/></svg>`;
}
function mountOverzicht(){
  $('#mimic-host').innerHTML=buildMimic();
  $('#ov-tanks').innerHTML=tankTile('A1',1500)+tankTile('A2',1500)+tankTile('B1',1000)+tankTile('B2',1000);
  updateMimic(); refreshOverzicht();
  $('#mimic-host').addEventListener('click',e=>{const g=e.target.closest('[data-dev]');if(g)openFaceplate(g.dataset.dev);});
  $('#ov-start').onclick=()=>go('recepten');
  $('#ov-flush').onclick=()=>toast('Spoelopdracht naar PLC verzonden','flush');
}
function refreshOverzicht(){
  if(state.screen!=='overzicht')return;
  // mimic
  updateMimic();
  // tanks
  ['A1','A2','B1','B2'].forEach(b=>{const cap=b[0]==='A'?1500:1000;const pc=state.lvl[b];
    const t=$('#tile-'+b);if(t){setMiniLiquid(b,pc);tweenNum($('#tpc-'+b),Math.round(pc),500);tweenNum($('#tlt-'+b),Math.round(pc/100*cap),600);}});
  // kpis
  const st=curStep();
  tweenNum($('#kpi-flow-n'),state.flow,350);
  updateSpark();
  tweenNum($('#kpi-batch'),state.batchesToday,700);
  $('#kpi-batch-s') && ($('#kpi-batch-s').textContent='Laatste: '+state.lastBatch);
  $('#kpi-flow-s') && ($('#kpi-flow-s').textContent=state.fcsRun?(state.hz+' Hz · '+(state.fcsHi?'hoog toeren':'normaal')):'Hoofdpomp standby');
  $('#kpi-mode') && ($('#kpi-mode').textContent=modeLabel());
  $('#kpi-mode-s') && ($('#kpi-mode-s').textContent=st?st.meta:'Wacht op opdracht');
  $('#kpi-next') && ($('#kpi-next').textContent=(state.lvl.B2<22?'B2 — ingepland':'—'));
  // greeting + summary + status
  const sev=worstSev();
  $('#ov-greet') && ($('#ov-greet').textContent=greeting());
  const N=state.batchesToday,inHand=devsInHand().length;
  let sum;
  if(sev==='alarm')sum=((activeAlarms().find(a=>a.sev==='alarm')||{}).ti||'Storing actief')+' — controleer Alarmen.';
  else if(sev==='warn')sum=((activeAlarms().find(a=>a.sev==='warn')||{}).ti||'Aandachtspunt')+' — verder draait alles normaal.';
  else if(state.role==='klant')sum='Alles draait rustig. '+N+' batches vandaag · watergift loopt.';
  else sum='Systeem operationeel. '+N+' batches vandaag'+(inHand?' · '+inHand+' in handbediening':'')+'.';
  $('#ov-sum') && ($('#ov-sum').textContent=sum);
  const sEl=$('#ov-status');
  if(sEl){const sp=sev==='alarm'?pill('alarm','Storing'):sev==='warn'?pill('warn','Aandacht'):pill('ok','Alles in bedrijf');
    sEl.innerHTML=sp+pill(running()?'run':'idle',running()?'Productie loopt':'Standby');}
  // activity
  $('#mimic-mode') && ($('#mimic-mode').textContent=modeLabel());
  $('#ov-now') && ($('#ov-now').textContent=modeLabel());
  $('#ov-sub') && ($('#ov-sub').textContent=st?st.meta:'Machine gereed');
  const prog=state.seq.length?Math.round((state.seqIdx)/(state.seq.length-1)*100):0;
  $('#ov-ring') && ($('#ov-ring').innerHTML=ringSVG(running()?prog:0, running()?COL.acc:COL.idle));
}
/* ============================================================ PROCES-HELPERS */
function curStep(){return state.seq[state.seqIdx]||null;}
function running(){const s=curStep();return !!s && !s.end;}
function modeLabel(){const s=curStep();const bak=state.rcp.bak;
  if(!s)return'Standby';
  if(s.end)return'Batch gereed';
  if(s.dose)return'Doseren '+s.dose;
  if(s.leaktest)return'Lektest';
  if(s.recirc)return'Mengen ('+bak+')';
  if(s.transfer)return'Overpompen → '+bak+'1/'+bak+'2';
  if(s.flush)return'Spoelen';
  return'Vullen tussenbak '+bak;
}
function timeAgo(ts){const s=Math.floor((Date.now()-ts)/1000);if(s<60)return s+' s geleden';const m=Math.floor(s/60);if(m<60)return m+' min geleden';const h=Math.floor(m/60);if(h<24)return h+' u geleden';return Math.floor(h/24)+' d geleden';}
function clockStr(ts){return new Date(ts).toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'});}
function dateStr(ts){return new Date(ts).toLocaleDateString('nl-NL',{day:'numeric',month:'short',year:'numeric'});}

/* ---- voedingsschema (spiegelt het adviesblad) ---- */
function numNL(s){const n=parseFloat(String(s).replace(',','.'));return isFinite(n)?n:0;}
function ccm3(amount){const t=numNL(state.draft.tankL)||1000,c=numNL(state.draft.conc)||100;return Math.round(numNL(amount)*1e6/(t*c));}
function vatsTank(tank,kind){return state.vats.filter(v=>v.kind===kind&&(v.bak===tank||v.bak==='AB'));}
function blankDraft(){return {id:null,naam:'',gewas:'',stadium:'Standard',substraat:'Steenwol',ec:'',tankL:1000,conc:100,verval:'',A:{},B:{},phKg:'',phL:''};}
function loadDraft(id){const s=id?state.schemas.find(x=>x.id===id):null;state.draft=s?JSON.parse(JSON.stringify(s)):blankDraft();schemaSel=s?s.id:null;}
function saveDraft(){const d=state.draft;if(!d.naam||!d.naam.trim()){toast('Geef het recept eerst een naam','info');return;}
  if(d.id){const i=state.schemas.findIndex(s=>s.id===d.id);if(i>=0)state.schemas[i]=JSON.parse(JSON.stringify(d));}
  else{d.id='sch-'+Date.now();state.schemas.push(JSON.parse(JSON.stringify(d)));schemaSel=d.id;}
  toast('Recept opgeslagen — '+d.naam,'check');}
function dupDraft(){const c=JSON.parse(JSON.stringify(state.draft));c.id=null;c.naam=(c.naam||'Recept')+' (kopie)';state.draft=c;schemaSel=null;toast('Recept gedupliceerd — pas aan en sla op','beaker');}
function vervalText(d){if(!d.verval)return{cls:'',txt:'Geen vervaldatum'};const exp=new Date(d.verval)<new Date(new Date().toDateString());const ds=dateStr(new Date(d.verval).getTime());return{cls:exp?'exp':'',txt:exp?('⚠ Recept verlopen ('+ds+')'):('Geldig t/m '+ds)};}
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

/* Fase A — rekenkern: voedingsschema → batch-doseervolumes (liters) */
function doseLiters(vat,amount,k){const a=numNL(amount)*k;
  if(vat.unit==='ml')return a/1000;
  if(vat.unit==='g')return (a/1000)*(numNL(vat.sf)||1);
  if(vat.unit==='kg')return a*(numNL(vat.sf)||1);
  return a;}
function schemaToRecipe(schema,tank,bl){const k=bl/(numNL(schema.tankL)||1000);
  const vats=[...vatsTank(tank,'macro'),...vatsTank(tank,'micro')];const dose=[];
  vats.forEach(v=>{const a=numNL(schema[tank][v.n]);if(a>0){const L=Math.round(doseLiters(v,schema[tank][v.n],k)*10)/10;if(L>0){const src=SOURCES.find(s=>s.n===v.n);dose.push([src?src.name:v.name,L]);}}});
  if(!dose.length)return null;
  const sumF=dose.reduce((s,[,l])=>s+l,0);const water=Math.max(0,Math.round((bl-sumF)*10)/10);
  const steps=water>0?[['Water',water],...dose]:dose;
  return {id:'live-'+tank+'-'+Date.now(),name:(schema.naam||'Voedingsschema')+' — Bak '+tank,bak:tank,batch:Math.round(bl),ec:numNL(schema.ec)||2.4,ph:5.5,note:'Live uit het voedingsschema (geschaald ×'+fix(k,2)+').',steps};}
function startFillFromSchema(tank){
  if(!(batchL>0)){toast('Vul eerst een batchgrootte in','info');return;}
  const rcp=schemaToRecipe(state.draft,tank,batchL);
  if(!rcp){toast('Geen meststoffen ingevuld voor bak '+tank,'info');return;}
  state.rcp=rcp;state.seq=buildSequence(rcp);state.seqIdx=0;state.stepT=0;state.leak=null;state.leakArm=false;
  state.alarms=state.alarms.filter(x=>!x.leak);
  toast('Vulling bak '+tank+' gestart — '+(state.draft.naam||'voedingsschema'),'play');go('overzicht');}
function batchPreviewHTML(){const d=state.draft,k=batchL/(numNL(d.tankL)||1000);
  const col=(tank)=>{const cls=tank==='A'?'a':'b';const vats=[...vatsTank(tank,'macro'),...vatsTank(tank,'micro')];
    let sum=0;const rows=[];
    vats.forEach(v=>{const a=numNL(d[tank][v.n]);if(a>0){const L=doseLiters(v,d[tank][v.n],k);sum+=L;rows.push(`<div class="bp-row"><span>${v.name}</span><span class="mono">${fix(Math.round(L*10)/10,1)} l</span></div>`);}});
    const water=Math.max(0,batchL-sum);const tot=sum+water;
    return `<div class="mb-col ${cls}">
      <div class="mb-h"><span class="chip ${cls}">${tank}</span> Bak ${tank}</div>
      ${rows.length?rows.join(''):'<div class="vat-empty">niets ingevuld voor deze bak</div>'}
      ${rows.length?`<div class="bp-row water"><span>Schoon water (aanvulling)</span><span class="mono">${fix(Math.round(water*10)/10,1)} l</span></div><div class="bp-row tot"><span>Totaal batch</span><span class="mono">${fix(Math.round(tot))} l</span></div>`:''}
    </div>`;};
  return col('A')+col('B');}

/* A/B-veiligheid: chemiegroep, receptcontrole, interlocks */
function grpConflict(v){return v.grp&&v.grp!=='-'&&v.grp!=='AB'&&v.bak!=='AB'&&v.bak!=='-'&&v.bak!==v.grp;}
function validateFill(schema,tank,bl){const errors=[],warnings=[];
  const vats=[...vatsTank(tank,'macro'),...vatsTank(tank,'micro')];
  const used=vats.filter(v=>numNL(schema[tank][v.n])>0);
  if(!used.length)errors.push('Geen meststoffen ingevuld voor bak '+tank+'.');
  used.forEach(v=>{if(v.grp&&v.grp!=='-'&&v.grp!=='AB'&&v.grp!==tank){
    errors.push(v.name+' is '+v.grp+'-chemie maar wordt in bak '+tank+' gedoseerd — risico op neerslag (A/B-scheiding).');}});
  if(!(bl>0))errors.push('Vul een batchgrootte in.');
  else if(bl>1500)errors.push('Batchgrootte '+fix(bl)+' l is groter dan de mestbakgrootte.');
  else if(bl>1000)warnings.push('Batch > 1000 l — advies is "nooit 1000 l aanmaken, circa 800".');
  if(state.estop)errors.push('Noodstop ingedrukt — vrijgave geblokkeerd.');
  if(!state.air)errors.push('Luchtdruk te laag — pneumatische kleppen niet vrijgegeven.');
  if(vervalText(schema).cls==='exp')warnings.push('Recept is verlopen — controleer of het advies nog geldt.');
  if(!numNL(schema.phKg)&&!numNL(schema.phL))warnings.push('Geen pH-correctie (Nitrokal) ingevuld.');
  if(state.leak)warnings.push('Er stond een lektest-melding open — die wordt gewist bij opnieuw starten.');
  return {errors,warnings};}
function checkBannerHTML(kind,tank,v){
  const items=(kind==='error'?v.errors:v.warnings).map(t=>`<li>${t}</li>`).join('');
  if(kind==='error')return `<div class="check-banner error"><div class="cb-h">${ic('alarm',16,2)} Vulling bak ${tank} geblokkeerd — veiligheidscontrole</div><ul>${items}</ul></div>`;
  return `<div class="check-banner warn"><div class="cb-h">${ic('warn',16,2)} Controleer vóór bak ${tank}</div><ul>${items}</ul>
     <div style="margin-top:9px"><button class="btn sm" id="fill-confirm">${ic('play',15,2)} Toch vullen — bak ${tank}</button></div></div>`;}
function attemptFill(tank){if(!state.draft)return;
  const v=validateFill(state.draft,tank,batchL);const box=document.getElementById('fill-check');
  if(v.errors.length){if(box)box.innerHTML=checkBannerHTML('error',tank,v);toast('Veiligheidscontrole: vulling geblokkeerd','warn');return;}
  if(v.warnings.length){if(box)box.innerHTML=checkBannerHTML('warn',tank,v);const cf=document.getElementById('fill-confirm');if(cf)cf.onclick=()=>startFillFromSchema(tank);return;}
  if(box)box.innerHTML='';startFillFromSchema(tank);}
function abInterlockRow(){const active=state.rcp.bak,other=active==='A'?'B':'A';
  const blocked=SOURCES.filter(s=>s.bak===other).length;
  if(running())return `<div class="il-ab"><span style="display:flex;gap:7px;align-items:center"><span class="il-ab-ic">${ic('shield',15,2)}</span><span>Bak <b>${active}</b> wordt gevuld — doseerkleppen bak <b>${other}</b> geblokkeerd</span></span><span class="muted-2" style="font-size:11px">${blocked} klep(pen)</span></div>`;
  return `<div class="il-ab idle"><span style="display:flex;gap:7px;align-items:center"><span class="il-ab-ic">${ic('shield',15,2)}</span><span>A/B-scheiding gereed — geen vulling actief</span></span></div>`;}

     const jump=(a.leak&&a.suspect)?`<button class="btn sm" data-hw="${a.suspect.slot}.${a.suspect.ch}">${ic('chip',15,2)} Naar verdachte klep</button>`:a.hw?`<button class="btn sm" data-hw="${a.slot}.${a.ch==null?'M':a.ch}">${ic('chip',15,2)} Naar hardware</button>`:`<button class="btn sm" data-io="1">${ic('io',15,2)} Naar I/O</button>`;

      </div>
    </div>`;
}
function seqStepsHTML(){
  return state.seq.map((s,i)=>{
    const failed=state.leak&&i===state.leak.stepIdx;
    let cls=failed?'fail':(i<state.seqIdx?'done':i===state.seqIdx?(running()?'active':'done'):'todo');
    const knob=failed?ic('alarm',14,2.4):(cls==='done'?ic('check',14,2.6):(i+1));
    let waitTag='',meta=s.meta;
    if(failed){waitTag=`<span class="fail-tag">${ic('alarm',12,2.2)} restflow ${fix(state.leak.restflow,1)} L/min</span>`;meta='Gefaald — verdachte klep: '+state.leak.suspectName+'. Batch afgekeurd.';}
    else if(i===state.seqIdx&&running()){
      let cond=s.leaktest?'Flow = 0 L/min':s.dose?('Doelvolume '+s.amt+' L'):s.transfer?'Tussenbak leeg':s.recirc?'Homogeen ('+ (s.dur) +' s)':s.flush?'Spoelen actief':'In uitvoering';
      waitTag=`<span class="wait-tag">${ic('clock',12,2.2)} ${cond}</span>`;
    }
    return `<div class="step ${cls}"><div class="marker"><div class="knob">${knob}</div><div class="stem"></div></div>
      <div class="body"><div class="nm">${s.nm} ${waitTag}</div><div class="meta"${failed?' style="color:var(--alarm)"':''}>${meta}</div></div></div>`;
  }).join('');
}
function ilRow(label,ok,note){return `<div style="display:flex;align-items:center;justify-content:space-between;gap:8px">

function mountSequentie(){
  const db=$('#seq-leak-demo');if(db)db.onclick=()=>{if(state.leak)return;state.leakArm=true;toast('Lektest gewapend — de eerstvolgende dichtheidstest faalt','warn');refreshSequentie();};

}
function refreshSequentie(){
  if(state.screen!=='sequentie')return;
  const r=state.rcp;
  $('#seq-title').textContent='Vullen tussenbak '+r.bak+' — '+r.name;
  const prog=state.seq.length?Math.round(state.seqIdx/(state.seq.length-1)*100):0;

  $('#seq-steps').innerHTML=seqStepsHTML();

  const bn=$('#seq-banner');if(bn)bn.innerHTML=state.leak?`<div class="seq-banner"><span style="display:flex;flex:0 0 auto">${ic('alarm',17,2)}</span><div><b>Lektest gefaald — batch afgekeurd.</b> FC 01 meet ${fix(state.leak.restflow,1)} L/min met alle kleppen dicht. Waarschijnlijke veroorzaker: <b>${state.leak.suspectName}</b> (laatst gesloten klep) — vermoedelijk, niet zeker. Bevestig de melding in Alarmen na herstel.</div></div>`:'';
  const db=$('#seq-leak-demo');if(db){db.disabled=!!state.leak;db.style.opacity=state.leak?'.55':'1';db.innerHTML=state.leak?(ic('alarm',15,2)+' Lektest gefaald'):(state.leakArm?(ic('clock',15,2)+' Lektest gewapend…'):(ic('alarm',15,2)+' Simuleer lekkende klep'));}

     <div class="tabs" id="io-types">
       <button data-t="ALL" aria-selected="true">Alle <span class="muted-2">${SIGNALS.length}</span></button>
       <button data-t="DO">DO <span class="muted-2">${c('DO')}</span></button>

     <tbody id="io-body"></tbody></table>
   </div></div>`;
}
function ioVals(s){
  // returns {raw, scaled, sev, lbl}
  if(s.type==='DO'){const on=state.openValves.has(s.k);const isValve=/dose|inlet|recirc|kl/.test(s.k);
    return {raw:on?'1':'0',scaled:isValve?(on?'Open':'Dicht'):(on?'Aan':'Uit'),sev:on?'run':'idle',lbl:on?(isValve?'Open':'Aan'):(isValve?'Dicht':'Uit')};}
  if(s.type==='DI'){
    if(s.k==='flow'){const on=state.flow>0;return {raw:on?fix(Math.round(state.flow*state.cal.flow.kfactor/60)):'0',scaled:fix(state.flow)+' L/min',sev:on?'run':'idle',lbl:on?'Puls':'Stil'};}
    if(s.k==='fcs-run')return {raw:state.fcsRun?'1':'0',scaled:state.fcsRun?'Bedrijf':'Stop',sev:state.fcsRun?'run':'idle',lbl:state.fcsRun?'Bedrijf':'Stop'};
    if(s.k==='fcs-hi')return {raw:state.fcsHi?'1':'0',scaled:state.fcsHi?'Hoog':'Laag',sev:state.fcsHi?'run':'idle',lbl:state.fcsHi?'Hoog':'Laag'};
    if(s.k==='fcs-flt')return {raw:state.fcsFlt?'1':'0',scaled:state.fcsFlt?'Storing':'OK',sev:state.fcsFlt?'alarm':'ok',lbl:state.fcsFlt?'Storing':'OK'};
    if(s.k==='estop')return {raw:state.estop?'1':'0',scaled:state.estop?'Ingedrukt':'Vrij',sev:state.estop?'alarm':'ok',lbl:state.estop?'Noodstop':'Vrij'};
    if(s.k==='air')return {raw:state.air?'1':'0',scaled:state.air?'Druk OK':'Laag',sev:state.air?'warn':'alarm',lbl:state.air?'Nabij grens':'Laag'};
  }
  if(s.type==='AI'){const v=scaled(s.k);const mA=state.cal[s.k].raw;const pct=v/(s.max)*100;
    let sev='ok',lbl='Normaal';
    if(s.unit==='L'){if(pct<15){sev='warn';lbl='Laag';}}
    return {raw:fix(mA,2)+' mA',scaled:fix(Math.round(v))+' '+s.unit,sev,lbl};}
  return {raw:'—',scaled:'—',sev:'idle',lbl:'—'};
}
function ioRowHTML(s){
  const v=ioStatus(s);const flt=!!v.fault;const addr=hwAddr(s)||'—';const id=idu(s);

/* ============================================================ SCHERM: HAND/AUTO + FACEPLATE */
let fpDev=null, fpHolding=false, haOpenSet=new Set(['Pompen']);

function isValveKey(k){return /dose|inlet|recirc|kl/.test(k);}
function interlockOK(k){if(state.estop)return false;if(isValveKey(k)&&!state.air)return false;if((k==='fcs-run'||k==='fcs-hi'||k==='fcs')&&state.fcsFlt)return false;return true;}

/* device-model voor faceplate + tegels (fcs = hoofdpomp, stuurt fcs-run + fcs-hi) */
const HA_DEV_GROUPS=[
 ['Pompen',[['fcs','Hoofdpomp FCS1','pump'],['vp02','Mengpomp VP 02','pump'],['vp03','Mengpomp VP 03','pump']]],
 ['Tussenbak-kleppen',[['inlet-A','Inlaatklep A','drop'],['inlet-B','Inlaatklep B · KI 14','drop'],['recirc-A','Recirc-klep A','wave'],['recirc-B','Recirc-klep B','wave']]],
 ['Overpompkleppen KL 20',[['kl-A1','KL 20 → A1','drop'],['kl-A2','KL 20 → A2','drop'],['kl-B1','KL 20 → B1','drop'],['kl-B2','KL 20 → B2','drop']]],
 ['Doseerkleppen',[...SOURCES.filter(s=>s.n<=11).map(s=>['dose-'+s.n,s.name,'beaker']),['dose-12','Water','drop']]]
];
const ALL_DEVS=HA_DEV_GROUPS.flatMap(([,items])=>items.map(([k])=>k));

function devMeta(k){
  if(k==='fcs')return{name:'Hoofdpomp FCS1',tag:'I428.5 RT',kind:'pump',icon:'pump'};
  const s=SIGNALS.find(x=>x.type==='DO'&&x.k===k);
  const kind=isValveKey(k)?'valve':'pump';
  return{name:s?s.nm:k,tag:s?s.tag:'—',kind,icon:kind==='valve'?(/dose|water/.test(k)||k==='dose-12'?'beaker':'drop'):'pump'};
}
function devActual(k){return state.openValves.has(k==='fcs'?'fcs-run':k);}
function devMode(k){const hk=k==='fcs'?'fcs-run':k;const o=state.hand[hk];return o&&o.mode==='hand'?'hand':'auto';}
function devCommanded(k){const hk=k==='fcs'?'fcs-run':k;const o=state.hand[hk];if(o&&o.mode==='hand')return!!o.on;return devActual(k);}
function devStateLabel(k,on){if(k==='fcs')return on?'Bedrijf':'Gestopt';return devMeta(k).kind==='valve'?(on?'Open':'Dicht'):(on?'Aan':'Uit');}
function devInterlocks(k){
  const v=devMeta(k).kind==='valve';
  const list=[{ok:!state.estop,txt:'Noodstop vrij',bad:'Noodstop ingedrukt'}];
  if(v)list.push({ok:state.air,txt:'Luchtdruk OK',bad:'Luchtdruk te laag — klep stuurt niet'});
  if(k==='fcs')list.push({ok:!state.fcsFlt,txt:'Geen pompstoring',bad:'Pompstoring actief'});
  return list;
}
function devInterlockOK(k){return devInterlocks(k).every(i=>i.ok);}
function devsInHand(){return ALL_DEVS.filter(d=>devMode(d)==='hand');}

/* ---- faceplate ---- */
function fpTitle(dev){const m=devMeta(dev);return `<span style="display:inline-flex;align-items:center;gap:9px">${ic(m.icon,19,2)} ${m.name}</span>`;}
function fpInterlockHTML(dev){
  return `<div class="eyebrow" style="margin:16px 0 8px">Vergrendelingen</div>
   <div class="fp-il">${devInterlocks(dev).map(i=>`<div class="il-item ${i.ok?'ok':'bad'}"><span class="ico">${ic(i.ok?'check':'warn',16,2.2)}</span><span>${i.ok?i.txt:i.bad}</span></div>`).join('')}</div>`;
}
function fpBody(dev){
  const m=devMeta(dev);const v=m.kind==='valve';
  const mode=devMode(dev),hand=mode==='hand';
  const cmd=devCommanded(dev),act=devActual(dev),mismatch=cmd!==act;
  const ilok=devInterlockOK(dev);const svc=state.role!=='klant';
  let s=`<div class="fp-status">
     <span class="mode-badge ${mode}">${hand?'HANDBEDIENING':'AUTOMAAT'}</span>
     ${pill(act?'run':'idle',devStateLabel(dev,act))}
     <span class="mono muted-2" style="font-size:12px;margin-left:auto">${m.tag}</span></div>`;
  if(!svc){
    s+=`<div class="fp-note">${ic('lock',15,2)} <span>Alleen-lezen. Handbediening is beschikbaar in de rol <strong>Service</strong>.</span></div>`;
    return s+fpInterlockHTML(dev);
  }
  s+=`<div class="eyebrow" style="margin-bottom:8px">Bedrijfsmodus</div>
   <div class="fp-mode"><button data-m="auto" aria-pressed="${!hand}">${ic('check',16,2)} Auto</button><button class="hand" data-m="hand" aria-pressed="${hand}">${ic('hand',16,2)} Hand</button></div>`;
  s+=`<div class="cmp"><div><div class="c-k">Aangestuurd</div><div class="c-v">${devStateLabel(dev,cmd)}</div></div>
      <div><div class="c-k">Werkelijk</div><div class="c-v">${devStateLabel(dev,act)}</div></div>
      ${mismatch?`<div style="margin-left:auto">${pill('warn','In beweging / geblokkeerd')}</div>`:''}</div>`;
  const dis=!hand||!ilok;
  if(v){
    s+=`<div class="fp-cmd">
      <button class="fp-btn on" data-cmd="open" ${dis?'disabled':''}><span class="fill"></span>${ic('check',20,2.2)}<span>Openen</span><span class="hint">ingedrukt houden</span></button>
      <button class="fp-btn off" data-cmd="close" ${dis?'disabled':''}><span class="fill"></span>${ic('x',20,2.4)}<span>Sluiten</span><span class="hint">ingedrukt houden</span></button></div>`;
  }else{
    s+=`<div class="fp-cmd">
      <button class="fp-btn on" data-cmd="start" ${dis?'disabled':''}><span class="fill"></span>${ic('play',20,2.2)}<span>Starten</span><span class="hint">ingedrukt houden</span></button>
      <button class="fp-btn off" data-cmd="stop" ${dis?'disabled':''}><span class="fill"></span>${ic('x',20,2.4)}<span>Stoppen</span><span class="hint">ingedrukt houden</span></button></div>`;
    if(dev==='fcs'){
      const hzEn=hand&&act;
      s+=`<div class="eyebrow" style="margin-bottom:8px">Toerental</div>
       <div class="seg" style="width:100%;margin-bottom:16px"><button data-hz="lo" aria-pressed="${!state.fcsHi}" ${hzEn?'':'disabled'} style="flex:1;min-height:48px">Laag · 30 Hz</button><button data-hz="hi" aria-pressed="${state.fcsHi}" ${hzEn?'':'disabled'} style="flex:1;min-height:48px">Hoog · 50 Hz</button></div>`;
    }
  }
  if(!hand)s+=`<div class="fp-note">${ic('info',15,2)} <span>Staat in <strong>Auto</strong>. Schakel naar <strong>Hand</strong> om handmatig te bedienen.</span></div>`;
  else if(!ilok)s+=`<div class="fp-note" style="background:var(--alarm-bg);border-color:var(--alarm-line);color:#8f352b"><span class="ico" style="color:var(--alarm)">${ic('warn',15,2)}</span><span>Commando geblokkeerd door een vergrendeling — zie hieronder.</span></div>`;
  return s+fpInterlockHTML(dev);
}
function openFaceplate(dev){fpDev=dev;openModal(fpTitle(dev),fpBody(dev));wireFaceplate(dev);}
function wireFaceplate(dev){
  const m=devMeta(dev),hk=dev==='fcs'?'fcs-run':dev;
  $$('#modal-body [data-m]').forEach(b=>b.onclick=()=>{
    const mode=b.dataset.m;
    if(mode==='auto'){delete state.hand[hk];if(dev==='fcs')delete state.hand['fcs-hi'];}
    else{state.hand[hk]={mode:'hand',on:devActual(dev)};}
    applyStepEffects();openFaceplate(dev);haRefresh();
    toast(m.name+' → '+(mode==='hand'?'handbediening':'automaat'),mode==='hand'?'hand':'check');
  });
  $$('#modal-body [data-cmd]').forEach(b=>holdButton(b,()=>{
    const on=(b.dataset.cmd==='open'||b.dataset.cmd==='start');
    state.hand[hk]={mode:'hand',on};applyStepEffects();openFaceplate(dev);haRefresh();
    toast(m.name+': '+(on?(m.kind==='valve'?'geopend':'gestart'):(m.kind==='valve'?'gesloten':'gestopt')),on?'play':'x');
  }));
  $$('#modal-body [data-hz]').forEach(b=>b.onclick=()=>{
    state.hand['fcs-hi']={mode:'hand',on:b.dataset.hz==='hi'};applyStepEffects();openFaceplate(dev);haRefresh();
  });
}
function holdButton(el,done){
  if(el.disabled)return;
  let raf,start;const fill=el.querySelector('.fill');const DUR=750;
  const step=()=>{const p=Math.min(1,(performance.now()-start)/DUR);if(fill)fill.style.width=(p*100)+'%';if(p<1){raf=requestAnimationFrame(step);}else{cancel();done();}};
  const begin=e=>{e.preventDefault();fpHolding=true;start=performance.now();raf=requestAnimationFrame(step);};
  const cancel=()=>{fpHolding=false;cancelAnimationFrame(raf);if(fill)fill.style.width='0%';};
  el.addEventListener('pointerdown',begin);
  ['pointerup','pointerleave','pointercancel'].forEach(ev=>el.addEventListener(ev,cancel));
}
function updateFaceplate(){
  if(!fpDev||fpHolding)return;
  const sc=$('#modal-scrim');if(!sc||!sc.classList.contains('show'))return;
  const b=$('#modal-body');const top=b.scrollTop;b.innerHTML=fpBody(fpDev);wireFaceplate(fpDev);b.scrollTop=top;
}
function haRefresh(){updateMimic();if(state.screen==='handauto')mountHandAuto();}

function tileHTML(k,label,icon,dz){
  const mode=devMode(k),act=devActual(k);
  return `<button class="tile ${mode==='hand'?'hand':''}${dz?' dz':''}" data-dev="${k}">
    <div class="t-top"><span class="t-ic">${ic(icon,18,2)}</span><span class="mode-badge ${mode}">${mode==='hand'?'HAND':'AUTO'}</span></div>
    <div class="t-nm">${label}</div>
    <div class="t-state"><span class="dot ${act?'run':'idle'}"></span> <span>${devStateLabel(k,act)}</span></div></button>`;
}
function mountHandAuto(){
  HA_DEV_GROUPS.forEach(([g,items])=>{if(items.some(([k])=>devMode(k)==='hand'))haOpenSet.add(g);});
  $('#ha-acc').innerHTML=HA_DEV_GROUPS.map(([g,items])=>{
    const hands=items.filter(([k])=>devMode(k)==='hand').length;
    const open=haOpenSet.has(g);const dose=g.startsWith('Doseer');
    const gi=dose?'beaker':g.startsWith('Pomp')?'pump':'drop';
    return `<div class="acc ${open?'open':''}" data-g="${g}">
      <div class="acc-h"><div class="lft"><span class="ic">${ic(gi,20,2)}</span><h3>${g}</h3></div>
        <div class="rgt"><span class="cnt-pill">${items.length}</span>${hands?`<span class="cnt-pill hand">${hands} in hand</span>`:''}<span class="acc-chev">${ic('chev',18,2.4)}</span></div></div>
      <div class="acc-body"><div class="tiles ${dose?'dose':''}">${items.map(([k,l,i])=>tileHTML(k,l,i,dose)).join('')}</div></div></div>`;
  }).join('');
  $$('#ha-acc .acc-h').forEach(h=>h.onclick=()=>{const g=h.parentElement.dataset.g;haOpenSet.has(g)?haOpenSet.delete(g):haOpenSet.add(g);mountHandAuto();});
  $$('#ha-acc .tile').forEach(t=>t.onclick=()=>openFaceplate(t.dataset.dev));
  const aa=$('#ha-allauto');if(aa)aa.onclick=()=>{state.hand={};applyStepEffects();mountHandAuto();updateMimic();toast('Alle actuatoren teruggezet naar Auto','check');};
}
function updateHandAuto(){
  if(state.screen!=='handauto')return;
  $$('#ha-acc .tile').forEach(t=>{const k=t.dataset.dev;const mode=devMode(k),act=devActual(k);
    t.classList.toggle('hand',mode==='hand');
    const mb=t.querySelector('.mode-badge');if(mb){mb.className='mode-badge '+mode;mb.textContent=mode==='hand'?'HAND':'AUTO';}
    const st=t.querySelector('.t-state');if(st)st.innerHTML=`<span class="dot ${act?'run':'idle'}"></span> <span>${devStateLabel(k,act)}</span>`;});
}

let hwMode='live';
let hwSel=null;
function idu(s){return uidOf(s).replace(':','_');}
function sevIcon(sev){return sev==='ok'?'check':sev==='warn'?'warn':sev==='alarm'?'alarm':sev==='run'?'play':'clock';}
function abbrev(s){const k=s.k;
  if(k.indexOf('dose-')===0){const n=+k.slice(5);if(n===12)return 'Water';const src=SOURCES.find(x=>x.n===n);return src?src.name:('Dos '+n);}
  if(k.indexOf('kl-')===0)return 'KL '+k.slice(3);
  if(k==='inlet-A')return 'Inlaat A';if(k==='inlet-B')return 'Inlaat B';
  if(k==='recirc-A')return 'Recirc A';if(k==='recirc-B')return 'Recirc B';
  if(k==='fcs-run')return s.type==='DO'?'FCS run':'FCS bedrijf';
  if(k==='fcs-hi')return s.type==='DO'?'FCS 50 Hz':'FCS hoog';
  if(k==='fcs-flt')return 'FCS storing';
  if(k==='vp02')return 'VP 02';if(k==='vp03')return 'VP 03';
  if(k==='flow')return 'Flow FC01';if(k==='estop')return 'Noodstop';if(k==='air')return 'Luchtdruk';
  if(k==='lvl-tA')return 'Niveau tk A';if(k==='lvl-tB')return 'Niveau tk B';
  if(k==='A1'||k==='A2'||k==='B1'||k==='B2')return 'Bak '+k;
  return s.nm;}
function aiMA(s){const f=sigFault(s);if(f){if(f.code==='8002')return '‹ 3,6 mA';if(f.code==='8001')return '› 21 mA';}const c=state.cal[s.k];if(!c)return '—';return fix(c.raw,1)+' mA';}
function ioStatus(s){const v=ioVals(s);const f=sigFault(s);if(f){return {raw:s.type==='AI'?'—':v.raw,scaled:s.type==='AI'?aiMA(s):v.scaled,sev:'alarm',lbl:f.cond.nm,fault:f};}return {raw:v.raw,scaled:v.scaled,sev:v.sev,lbl:v.lbl,fault:null};}

function ledClass(color,st){let c='led';if(st==='on')c+=' on '+color;else if(st==='blink'||st==='blink05'||st==='blink4')c+=' on '+color+' blink'+(st==='blink05'?' f05':st==='blink4'?' f4':'');return c;}
function ledHTML(color,st,extra){return '<span class="'+ledClass(color,st)+(extra?(' '+extra):'')+'"></span>';}
function getLed(id){return hwCtrlLeds().find(l=>l.id===id)||{id,state:'off',color:'info',meaning:''};}
function qrSVG(){let r='<rect width="21" height="21" fill="#fff"/>';
  const fnd=(x,y)=>`<rect x="${x}" y="${y}" width="7" height="7" fill="#1d241f"/><rect x="${x+1}" y="${y+1}" width="5" height="5" fill="#fff"/><rect x="${x+2}" y="${y+2}" width="3" height="3" fill="#1d241f"/>`;
  r+=fnd(0,0)+fnd(14,0)+fnd(0,14);
  let s=7;for(let y=0;y<21;y++)for(let x=0;x<21;x++){if((x<8&&y<8)||(x>12&&y<8)||(x<8&&y>12))continue;s=(s*1103515245+12345)&0x7fffffff;if((s>>9)&1)r+=`<rect x="${x}" y="${y}" width="1" height="1" fill="#1d241f"/>`;}
  return `<svg width="100%" height="100%" viewBox="0 0 21 21" shape-rendering="crispEdges">${r}</svg>`;}
const ARRDOWN='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M6 13l6 6 6-6"/></svg>';

function buildCtrl(){
  const c=hwCtrl();const sd=hwSd();const n=hwSlotCount();
  const L=['BF-C','BF-D','SF','BOOT','EXT'],R=['RUN','FAIL','DBG','D','E'];
  let leds='';for(let i=0;i<5;i++){const a=getLed(L[i]),b=getLed(R[i]);
    leds+=`<button class="hw-led-row" data-led="${L[i]}">${ledHTML(a.color,a.state,'xs')}<span class="lbl">${L[i]}</span></button>`;
    leds+=`<button class="hw-led-row" data-led="${R[i]}">${ledHTML(b.color,b.state,'xs')}<span class="lbl">${R[i]}</span></button>`;}
  let dcl='';for(let i=0;i<n;i++){const st=hwSlotState(i);const led=st==='empty'?ledHTML('ok','off','xs'):st==='ok'?ledHTML('ok','on','xs'):st==='missing'?ledHTML('alarm','blink','xs'):st==='warn'?ledHTML('warn','on','xs'):ledHTML('alarm','on','xs');
    dcl+=`<button class="hw-dled" data-slot="${i}">${led}<span class="dn">${i+1}</span></button>`;}
  let eth='';for(let i=0;i<c.ports;i++){eth+=`<div class="hw-port${i===0?' up':''}"><div class="jack"><span class="lk"></span></div><span class="pn">X${i+1}</span></div>`;}
  const sdInner=sd.id==='none'?`<div class="slot"></div>`:`<div class="slot has"><span class="sdsz">${sd.size}${sd.lic?' · LIC':''}</span></div>`;
  const editCtrl=hwMode==='edit'?' hw-pick" data-pick="ctrl':'';
  const editSd=hwMode==='edit'?' hw-pick" data-pick="sd':'';
  return `<div class="hw-ctrl">
    <div class="hw-ctrl-side${editCtrl}"><span>${c.name}</span></div>
    <div class="hw-ctrl-col">
      <div class="cz"><button class="hw-sd${editSd}" ${hwMode==='edit'?'':'disabled'}><div class="l"><span>SD-CARD</span><span class="r">R ${ledHTML('alarm','off','xs')}</span></div>${sdInner}</button></div>
      <div class="cz hw-ident"><div><b>Ord.No</b> ${c.art}</div><div><b>MAC</b> 00·A0·45·9D·13·BC</div><div>plcnext-community.net</div></div>
      <div class="cz hw-brand"><span class="pcmark">PC</span><span class="pc">PLCnext Technology<small>Designed by PHOENIX CONTACT</small></span></div>
      <div class="cz hw-leds">${leds}</div>
      <div class="cz hw-busd"><span class="ttl">D</span><div class="hw-dgrid">${dcl}</div><span class="hw-up">UP ${ledHTML('ok','on','xs')}</span></div>
      <div class="cz hw-qr"><div class="q">${qrSVG()}</div><div class="cap">scan here for<br>easy start up</div></div>
      <div class="hw-window"><span class="x3">SVC</span></div>
      <div class="cz hw-supply"><div class="ulrow">UL ${ledHTML('ok','on','xs')}<span style="margin-left:auto;font-weight:600;color:#5a635e">24 V</span></div><div class="hw-terms"><span class="hw-tm"><i class="rd"></i>a1</span><span class="hw-tm"><i class="bl"></i>b1</span><span class="hw-tm"><i class="gy"></i>U+</span><span class="hw-tm"><i class="rd"></i>a2</span><span class="hw-tm"><i class="bl"></i>b2</span><span class="hw-tm"><i class="gy"></i>U−</span></div></div>
      <div class="cz hw-eth">${eth}</div>
      <div class="hw-rel"><span class="lever"></span><span class="arr">${ARRDOWN}</span></div>
    </div></div>`;
}
/* links-aanbouwbare AXC F XT-uitbreidingen (links van de controller) */
function buildLeftExt(){
  const c=hwCtrl();const list=state.hw.leftExt||[];
  let cards='';
  list.forEach((id,i)=>{const xt=XT_MODULES[id];if(!xt)return;const flt=(state.hw.diag['xt.'+i]);
    cards+=`<div class="hw-xt${flt?' flt':''}${hwMode==='edit'?' hw-pick':''}" data-xt="${i}">
      <div class="hw-xt-tab"><span class="ic">${ic(xt.icon,13,2)}</span></div>
      <div class="hw-xt-body"><div class="hw-xt-pc"><span class="pcmk">PC</span></div>
        <div class="hw-xt-nm">${xt.name.replace('AXC F XT ','XT ')}</div>
        <div class="hw-xt-if">${xt.iface}</div>
        <div class="hw-xt-de">${ledHTML(flt?'alarm':'ok','on','xs')}<span>${flt?'EXT':'OK'}</span></div>
        <div class="hw-xt-art">${xt.art}</div></div></div>`;});
  const cap=xtCapacity();const canAdd=hwMode==='edit'&&c.leftExt&&list.length<cap;
  const addBtn=canAdd?`<button class="hw-xt add" data-pick="xt"><span class="plus">+</span><span class="t">XT toevoegen</span></button>`:'';
  if(!list.length&&!addBtn)return '';
  return `<div class="hw-bsl"><div class="hw-bsl-spine"><span>AXC BS L 2 · 1064312</span></div><div class="hw-xt-row">${cards}${addBtn}</div></div>`;
}
function buildTypeSelect(slot){const cur=state.hw.slots[slot]?state.hw.slots[slot].type:null;
  let opts='<option value="">— leeg (slotafdekking) —</option>';
  ELEMENT_ORDER.forEach(id=>{opts+=`<option value="${id}"${cur===id?' selected':''}>${ELEMENTS[id].name}</option>`;});
  return `<select class="hw-sel-type" data-slot="${slot}">${opts}</select>`;}
function elemGlyph(kind){
  const a='<svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">';
  if(kind==='DI')return a+'<path d="M2 8h7"/><path d="M6 5l3 3-3 3"/><path d="M13 3v10"/></svg>';
  if(kind==='DO')return a+'<path d="M3 3v10"/><path d="M7 8h7"/><path d="M11 5l3 3-3 3"/></svg>';
  if(kind==='AI')return a+'<path d="M1.5 8c1.3-3.4 2.6-3.4 3.9 0s2.6 3.4 3.9 0"/><path d="M13 3v10"/></svg>';
  if(kind==='AO')return a+'<path d="M3 3v10"/><path d="M6.2 8c1.3-3.4 2.6-3.4 3.9 0s2.6 3.4 3.9 0"/></svg>';
  return a+'</svg>';
}
function buildElem(slot,ctx){ctx=ctx||state.hw;const isPlc=(ctx===state.hw);
  const conf=ctx.slots[slot];const el=conf&&conf.type?ELEMENTS[conf.type]:null;
  if(!el){const cover=hwMode==='edit'
      ? `<button class="cover hw-pick add-slot" data-pickslot="${slot}"><span class="plus">+</span><span>Kies module</span><span class="sub">slot ${slot+1}</span></button>`
      : `<div class="cover">Slot ${slot+1}<br>vrij<br><span style="font-size:9px">AXL SE slotafdekking</span></div>`;
    return `<div class="hw-elem empty" data-slot="${slot}"><div class="hw-tab" data-slot="${slot}"><span class="n">${slot+1}</span></div><div class="hw-ebody">${cover}</div></div>`;}
  const dg=ctx.diag||{};const chCode=c=>dg[slot+'.'+c]||null;
  const fault=Object.keys(dg).some(k=>{const p=k.split('.');return /^\d+$/.test(p[0])&&+p[0]===slot;});
  const eState=hwElemE(slot,ctx);const eLed=ledHTML('alarm',eState==='off'?'off':eState,'xs');
  const tab=`<div class="hw-tab ${el.kind}" data-slot="${slot}"><span class="n">${slot+1}</span><span class="fn">${elemGlyph(el.kind)}</span></div>`;
  const head=`<div class="hw-head"><div class="pcrow"><span class="pcmk">PC</span><span class="pcw">PHOENIX CONTACT</span></div><div class="nm">${el.name}</div><div class="art">Ord.No ${el.art}</div></div>`;
  const headEdit=`<button class="hw-head hw-pick" data-pickslot="${slot}"><div class="pcrow"><span class="pcmk">PC</span><span class="pcw">PHOENIX CONTACT</span><span class="pick-chip">wijzig ▾</span></div><div class="nm">${el.name}</div><div class="art">Ord.No ${el.art}</div></button>`;
  const deStrip=`<div class="hw-de"><span class="dd">${ledHTML('ok','on','xs')}D</span><span class="hw-ef">${eLed}E</span><span class="tylbl">${el.ch}× ${el.kind}</span></div>`;
  const potStrip=`<div class="hw-pot"><span class="pl">UP · 24 V</span><span class="pt"></span><span class="pt"></span></div>`;
  let chs='';
  if(el.led){let cells='';for(let c=1;c<=el.ch;c++){const s=isPlc?sigAt(slot,c):null;const flt=!!chCode(c);const hd=s&&handState(s)==='hand';
      cells+=`<button class="hw-ch${s?'':' free'}${flt?' flt':''}${hd?' hand':''}" data-slot="${slot}" data-ch="${c}">${ledHTML('amber',chOn(s)?'on':'off')}<span class="cn">${String(c).padStart(2,'0')}</span><span class="ab">${s?abbrev(s):'—'}</span><span class="hbadge">H</span><span class="pin"></span></button>`;
      if(c===8&&el.ch>=16)cells+=potStrip;}
    chs=`<div class="hw-chs">${cells}</div>`;
  }else{let cells='';for(let c=1;c<=el.ch;c++){const s=isPlc?sigAt(slot,c):null;const flt=!!chCode(c);
      cells+=`<button class="hw-ch${s?'':' free'}${flt?' flt':''}" data-slot="${slot}" data-ch="${c}">${ledHTML('ok',s?'on':'off')}<span class="cn">${String(c).padStart(2,'0')}</span><span class="ab">${s?abbrev(s):'—'}</span><span class="mA">${s?aiMA(s):''}</span><span class="pin"></span></button>`;}
    let spare='';for(let i=0;i<8;i++)spare+='<i></i>';
    chs=`<div class="hw-chs">${cells}${potStrip}<div class="hw-spare">${spare}</div></div>`;}
  const typeRow=hwMode==='edit'?headEdit:head;
  const footer=`<div class="hw-ef"><span class="ty2">${el.name.replace('AXL SE ','')}</span></div>`;
  return `<div class="hw-elem ${el.kind}${fault?' flt':''}${hwMode==='edit'?' edit':''}" data-slot="${slot}">${tab}<div class="hw-ebody">${typeRow}${deStrip}${chs}${footer}</div></div>`;
}
function buildSeHolder(seg,ri,start,count,ctx){ctx=ctx||state.hw;
  const bp=BACKPLANES[seg.bp]||BACKPLANES.SE6;let cells='';for(let i=0;i<count;i++)cells+=buildElem(start+i,ctx);
  const cols=Math.max(1,Math.ceil(count/2));
  const spineExtra=hwMode==='edit'?`<span class="seg-chip">wijzig</span>`:'';
  return `<div class="hw-bp${hwMode==='edit'?' hw-pick':''}" ${hwMode==='edit'?`data-segedit="${ri}"`:''}><div class="hw-spine"><span>${bp.name} · ${bp.art} · HW 00</span>${spineExtra}</div><div class="hw-grid" style="grid-template-columns:repeat(${cols},162px)">${cells}</div></div>`;
}
function buildRailMod(ri,ctx){ctx=ctx||state.hw;
  const seg=ctx.rail[ri];const m=AXLF_MODULES[seg.type];if(!m)return '';
  const flt=!!(ctx.diag||{})['mod.'+seg.uid];
  const isPwr=m.kind==='PWR',isAdapt=m.kind==='ADAPT';
  const kindCls=isPwr?'PWR':isAdapt?'ADAPT':m.kind;
  const glyph=isPwr?'<svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 1L3 9h4l-1 6 7-9H9z"/></svg>'
    :isAdapt?'<svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 5h6v6H3zM9 8h4M13 6v4"/></svg>'
    :elemGlyph(m.kind==='DIO'?'DO':m.kind);
  const tab=`<div class="hw-tab ${kindCls}"><span class="fn">${glyph}</span></div>`;
  const wijzig=hwMode==='edit'?'<span class="pick-chip">wijzig ▾</span>':'';
  const head=`<div class="hw-head"><div class="pcrow"><span class="pcmk">PC</span><span class="pcw">PHOENIX CONTACT</span>${wijzig}</div><div class="nm">${m.name.replace('AXL F ','').replace('AXC F ','')}</div><div class="art">Ord.No ${m.art}</div></div>`;
  const eLed=ledHTML('alarm',flt?'on':'off','xs');
  const deStrip=`<div class="hw-de"><span class="dd">${ledHTML('ok','on','xs')}D</span><span class="hw-ef">${eLed}E</span><span class="tylbl">${m.ch?(m.ch+'× '+m.kind):'Axioline F'}</span></div>`;
  const potStrip=`<div class="hw-pot"><span class="pl">UP · 24 V</span><span class="pt"></span><span class="pt"></span></div>`;
  let body='';
  if(isPwr){
    body=`<div class="hw-chs hw-pwrbody"><div class="hw-pwr-row"><span class="led on ok"></span><span>UL 24 V</span></div><div class="hw-pwr-row"><span class="led on ok"></span><span>US 4 A</span></div>
      <div class="hw-pwr-terms"><span class="t rd">1.1</span><span class="t bl">2.1</span><span class="t rd">1.2</span><span class="t bl">2.2</span><span class="t rd">1.3</span><span class="t bl">2.3</span><span class="t rd">1.4</span><span class="t bl">2.4</span></div>
      <div class="hw-pwr-note">Voedt de UBus voor volgende modules</div></div>`;
  }else if(isAdapt){
    body=`<div class="hw-chs hw-adaptbody"><div class="hw-pwr-note" style="text-align:center;padding-top:8px">Overgang Axioline → Inline-klemmen</div><div class="hw-spare" style="opacity:.55">${Array.from({length:12}).map(()=>'<i></i>').join('')}</div></div>`;
  }else{
    const nCh=Math.min(m.ch||0,16);let cells='';
    for(let c=1;c<=nCh;c++){const isAI=m.kind==='AI';
      cells+=`<button class="hw-ch free" tabindex="-1">${ledHTML(isAI?'ok':'amber','off')}<span class="cn">${String(c).padStart(2,'0')}</span><span class="ab">—</span>${isAI?'<span class="mA"></span>':'<span class="hbadge">H</span>'}<span class="pin"></span></button>`;
      if(c===8&&nCh>=16)cells+=potStrip;}
    body=`<div class="hw-chs">${cells}</div>`;
  }
  const footer=`<div class="hw-ef"><span class="ty2">${m.name.replace('AXL F ','').replace('AXC F ','')}</span></div>`;
  return `<div class="hw-elem axlf ${kindCls}${flt?' flt':''}${hwMode==='edit'?' hw-pick edit':''}" data-segedit="${ri}">${tab}<div class="hw-ebody">${head}${deStrip}${body}${footer}</div></div>`;
}
function buildRailSegments(ctx){ctx=ctx||state.hw;
  const segs=seSegs(ctx);let html='';
  (ctx.rail||[]).forEach((seg,ri)=>{
    if(seg.kind==='se'){const sg=segs.find(s=>s.ri===ri);html+=buildSeHolder(seg,ri,sg.start,sg.count,ctx);}
    else html+=buildRailMod(ri,ctx);
  });
  return html;
}
function buildRack(){

function hwListRowHTML(s){const v=ioStatus(s);const flt=!!v.fault;const addr=hwAddr(s)||'—';const id=idu(s);

function buildHwList(){let rows='';
  for(let i=0;i<hwSlotCount();i++){const conf=state.hw.slots[i];if(!conf||!conf.type)continue;const el=ELEMENTS[conf.type];
    const sigs=[];for(let c=1;c<=el.ch;c++){const s=sigAt(i,c);if(s)sigs.push(s);}
    rows+=`<tr class="grp"><td colspan="6"><span class="smono">S${i+1}</span> · ${el.name} <span class="muted-2" style="font-weight:500">· ${el.desc} · ${el.art}</span></td></tr>`;
    if(sigs.length)sigs.forEach(s=>rows+=hwListRowHTML(s));else rows+=`<tr><td colspan="6" class="muted-2" style="font-size:12px;font-style:italic">geen signalen toegewezen</td></tr>`;}
  const un=SIGNALS.filter(s=>!state.hw.map[uidOf(s)]);
  if(un.length){rows+=`<tr class="grp"><td colspan="6">Niet toegewezen <span class="muted-2" style="font-weight:500">· ${un.length} signaal${un.length>1?'en':''}</span></td></tr>`;un.forEach(s=>rows+=hwListRowHTML(s));}
  return `<table class="tbl hw-tbl"><thead><tr><th style="width:84px">Adres</th><th style="width:64px">Type</th><th>Signaal</th><th class="r" style="width:90px">Ruw</th><th class="r" style="width:116px">Geschaald</th><th style="width:150px">Status</th></tr></thead><tbody id="hw-list">${rows}</tbody></table>`;}

function openHwFaceplate(slot,ch){

function shiftSlotKeys(fn,ctx){ctx=ctx||state.hw;
  const nm={};Object.keys(ctx.map||{}).forEach(uid=>{const p=ctx.map[uid];const ns=fn(p.slot);if(ns!=null)nm[uid]={slot:ns,ch:p.ch};});ctx.map=nm;
  const nd={};Object.keys(ctx.diag||{}).forEach(k=>{const parts=k.split('.');if(!/^\d+$/.test(parts[0])){nd[k]=ctx.diag[k];return;}const ns=fn(+parts[0]);if(ns!=null)nd[ns+'.'+parts[1]]=ctx.diag[k];});ctx.diag=nd;
}
function removeSlotsRange(start,n,ctx){ctx=ctx||state.hw;ctx.slots.splice(start,n);shiftSlotKeys(s=>s<start?s:(s<start+n?null:s-n),ctx);}
function insertSlotsRange(start,n,ctx){ctx=ctx||state.hw;const add=[];for(let i=0;i<n;i++)add.push({type:null});ctx.slots.splice(start,0,...add);shiftSlotKeys(s=>s<start?s:s+n,ctx);}
