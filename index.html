/* ============================================================ SCHERM: LOGBOEK (dubbel bewijs) */
let logSel=null, logFilter='alle';
function buildLogRec(rcp,ts,status,reden,opts){opts=opts||{};let steps=[],tot={doel:0,flow:0,echo:0},afwMax=0;
  if(status==='gereed'){
    steps=(rcp.steps||[]).map(([prod,doel],i)=>{
      let flow=Math.round(doel*(1+(Math.random()*0.006-0.003))*10)/10;       // flowmeter FC 01  ±0,3%
      let echo=Math.round(flow*(1+(Math.random()*0.012-0.006))*10)/10;       // radar LW2120    ±0,6%
      if(opts.divStep===i)echo=Math.round(flow*1.035*10)/10;                 // gesimuleerde afwijking
      const d=doel>0?Math.abs(flow-echo)/doel*100:0;
      return {prod,doel,flow,echo,d:Math.round(d*10)/10};});
    steps.forEach(s=>{tot.doel+=s.doel;tot.flow+=s.flow;tot.echo+=s.echo;afwMax=Math.max(afwMax,s.d);});
  }
  return {id:'b-'+ts+'-'+Math.floor(Math.random()*1e4),ts,bak:rcp.bak,recept:rcp.name,batchL:(rcp.batch||800)-2+Math.round(Math.random()*4),
    ec:rcp.ec,operator:opts.op||'Teler',status,reden:reden||'',steps,
    tot:{doel:Math.round(tot.doel),flow:Math.round(tot.flow),echo:Math.round(tot.echo)},afwMax:Math.round(afwMax*10)/10};}
function logBatch(status,Lbatch,reden){const op={klant:'Teler',service:'Servicemonteur',oem:'OEM'}[state.role]||state.role;
  const rec=buildLogRec(state.rcp,Date.now(),status,reden,{op});if(Lbatch)rec.batchL=Lbatch;
  state.log.unshift(rec);if(state.log.length>80)state.log.pop();}
function seedLog(){const H=3600e3,A=RECIPES.find(r=>r.id==='std-a'),B=RECIPES.find(r=>r.id==='std-b'),T=RECIPES.find(r=>r.id==='tom-gen-a')||A;
  state.log=[
    buildLogRec(B,Date.now()-2*H,'gereed','',{op:'Teler'}),
    buildLogRec(A,Date.now()-5*H,'gereed','',{op:'Teler',divStep:2}),
    buildLogRec(B,Date.now()-9*H,'afgekeurd','Lektest gefaald — restflow na Baskal (waarschijnlijke veroorzaker, niet zeker)',{op:'Servicemonteur'}),
    buildLogRec(T,Date.now()-26*H,'gereed','',{op:'Teler'}),
    buildLogRec(A,Date.now()-30*H,'gereed','',{op:'Teler'})
  ];}
function logKpisHTML(){const n=state.log.length,ger=state.log.filter(r=>r.status==='gereed');
  const pct=n?Math.round(ger.length/n*100):0, avg=ger.length?(ger.reduce((s,r)=>s+r.afwMax,0)/ger.length):0;
  return `<div class="grid cols-4" style="margin-bottom:16px">
    <div class="card kpi"><div class="k">${ic('history',15,2)} Batches gelogd</div><div class="v">${n}</div><div class="s">onveranderbaar bewaard</div></div>
    <div class="card kpi"><div class="k">${ic('check',15,2)} Geslaagd</div><div class="v">${pct}<small>%</small></div><div class="s">${ger.length} van ${n}</div></div>
    <div class="card kpi"><div class="k">${ic('gauge',15,2)} Afwijking flow↔radar</div><div class="v">${fix(avg,1)}<small>%</small></div><div class="s">gemiddeld (max per batch)</div></div>
    <div class="card kpi"><div class="k">${ic('shield',15,2)} Opslag</div><div class="v" style="font-size:19px">SD-kaart</div><div class="s">PLCnext DataLogger</div></div>
  </div>`;}
function logDetailHTML(r){
  const meta=`<div class="log-meta"><span>Operator: <b>${r.operator}</b></span><span>Streef-EC: <b>${fix(r.ec,1)}</b></span><span>Batch: <b>${fix(r.batchL)} l</b></span>${r.status==='gereed'?`<span>Max afwijking: <b class="${r.afwMax>2?'dev-t':''}">${fix(r.afwMax,1)}%</b></span>`:''}</div>`;
  if(r.status==='afgekeurd')return `<div class="log-detail">${meta}
    <div class="check-banner error" style="margin-top:10px"><div class="cb-h">${ic('alarm',16,2)} Batch afgekeurd vóór voltooiing</div><div style="margin-top:4px">${r.reden}</div><div class="muted-2" style="margin-top:6px">Geen geldige dosering — niet uitgeleverd aan de voorraadbak.</div></div></div>`;
  const rows=r.steps.map((s,i)=>`<tr class="${s.d>2?'dev':''}"><td class="mono">${i+1}</td><td>${s.prod}</td><td class="r mono">${fix(s.doel,1)}</td><td class="r mono">${fix(s.flow,1)}</td><td class="r mono">${fix(s.echo,1)}</td><td class="r mono">${fix(s.d,1)}%</td></tr>`).join('');
  return `<div class="log-detail">${meta}
    <div class="eyebrow" style="margin:12px 0 6px">Dubbel bewijs per dosering <span style="text-transform:none;font-weight:500;color:var(--ink-3)">· flowmeter FC 01 én radar LW2120 — onafhankelijk gemeten</span></div>
    <div style="overflow:auto"><table class="tbl log-tbl"><thead><tr><th style="width:34px">#</th><th>Product</th><th class="r">Doel (l)</th><th class="r">Flowmeter FC 01 (l)</th><th class="r">Radar LW2120 (l)</th><th class="r">Afwijking</th></tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr><td></td><td>Totaal</td><td class="r mono">${fix(r.tot.doel)}</td><td class="r mono">${fix(r.tot.flow)}</td><td class="r mono">${fix(r.tot.echo)}</td><td class="r mono">${fix(Math.abs(r.tot.flow-r.tot.echo)/Math.max(1,r.tot.doel)*100,1)}%</td></tr></tfoot></table></div>
    ${r.afwMax>2?`<div class="check-banner warn" style="margin-top:10px"><div class="cb-h">${ic('warn',16,2)} Afwijking flow↔radar boven 2%</div><div style="margin-top:4px">Eén of meer doseringen wijken af tussen flowmeter en radar — controleer de betreffende klep of sensor. De batch is geregistreerd; beoordeel of hij goedgekeurd blijft.</div></div>`:''}</div>`;}
function logListHTML(){
  const list=state.log.filter(r=>logFilter==='afgekeurd'?r.status==='afgekeurd':true);
  if(!list.length)return '<div class="vat-empty" style="padding:22px">Nog geen batches in deze weergave.</div>';
  return list.map(r=>{const open=logSel===r.id,cls=r.bak==='A'?'a':'b';
    const st=r.status==='gereed'?(r.afwMax>2?pill('warn','Gereed · controleer'):pill('ok','Gereed')):pill('alarm','Afgekeurd');
    return `<div class="log-item ${open?'open':''}" data-log="${r.id}">
      <div class="log-row">
        <div class="log-when"><b>${dateStr(r.ts)}</b><span class="muted-2">${clockStr(r.ts)}</span></div>
        <div class="log-rec">${r.recept}<span class="chip ${cls}">${r.bak}</span></div>
        <div class="log-st">${st}</div>
        <div class="log-tot mono">${r.status==='gereed'?fix(r.tot.flow)+' l':'—'}</div>
        <div class="log-dev mono ${r.afwMax>2?'hi':''}">${r.status==='gereed'?'Δ '+fix(r.afwMax,1)+'%':'—'}</div>
        <div class="log-exp">${open?'▾':'▸'}</div>
      </div>${open?logDetailHTML(r):''}</div>`;}).join('');}
function wireLogItems(){$$('#log-list .log-item').forEach(e=>{const row=e.querySelector('.log-row');if(row)row.onclick=()=>{logSel=logSel===e.dataset.log?null:e.dataset.log;$('#log-list').innerHTML=logListHTML();wireLogItems();};});}
function exportLogCSV(){try{
    const head=['batch_id','tijd','bak','recept','status','operator','stap','product','doel_l','flowmeter_fc01_l','radar_lw2120_l','afwijking_pct'];
    const lines=[head.join(';')];
    state.log.forEach(r=>{const base=[r.id,new Date(r.ts).toISOString(),r.bak,'"'+r.recept+'"',r.status,r.operator];
      if(r.steps.length)r.steps.forEach((s,i)=>lines.push([...base,i+1,'"'+s.prod+'"',fix(s.doel,1),fix(s.flow,1),fix(s.echo,1),fix(s.d,1)].join(';')));
      else lines.push([...base,'','','','','',''].join(';'));});
    const blob=new Blob([lines.join('\n')],{type:'text/csv'}),url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='cogas_batchlogboek.csv';document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
    toast('CSV geëxporteerd','check');
  }catch(e){toast('Export hier niet beschikbaar — op de PLC schrijft de DataLogger automatisch naar SD','info');}}
function viewLogboek(){
  return `<div class="page-head"><div class="titles"><h1>Logboek</h1><p>Onveranderbaar bewijs per batch — flowmeter én radar, weggeschreven naar de SD-kaart</p></div>
    <div class="page-actions">
      <div class="tabs" id="log-tabs"><button data-f="alle" aria-selected="${logFilter==='alle'}">Alle</button><button data-f="afgekeurd" aria-selected="${logFilter==='afgekeurd'}">Afgekeurd</button></div>
      <button class="btn sm" id="log-export">${ic('history',15,2)} Exporteer CSV</button></div></div>
    ${logKpisHTML()}
    <div class="card sd-note">${ic('shield',16,2)}<div>Elke batch wordt onveranderbaar weggeschreven naar de lokale <b>SD-kaart</b> (PLCnext DataLogger — CSV + tijdreeks). De <b>flowmeter (FC 01)</b> en de <b>radar (ifm LW2120)</b> staan naast elkaar als <b>dubbel bewijs</b>: de radar verving de niveaupennen en meet contactloos de niveaustijging in de tussenbak, onafhankelijk van de flowmeting.</div></div>
    <div class="card" style="padding:0;overflow:hidden"><div id="log-list"></div></div>`;}
function mountLogboek(){
  state._logLen=state.log.length;
  $('#log-list').innerHTML=logListHTML();wireLogItems();
  $$('#log-tabs button').forEach(b=>b.onclick=()=>{logFilter=b.dataset.f;render();});
  const ex=$('#log-export');if(ex)ex.onclick=()=>exportLogCSV();}
function updateLog(){if(state.screen!=='logboek')return;if(state._logLen===state.log.length)return;state._logLen=state.log.length;$('#log-list').innerHTML=logListHTML();wireLogItems();}

const VIEWS={overzicht:[viewOverzicht,mountOverzicht],recepten:[viewRecepten,mountRecepten],verbruik:[viewVerbruik,mountVerbruik],logboek:[viewLogboek,mountLogboek],
 alarmen:[viewAlarmen,mountAlarmen],sequentie:[viewSequentie,mountSequentie],io:[viewIO,mountIO],handauto:[viewHandAuto,mountHandAuto],kalibratie:[viewKalibratie,mountKalibratie],onderhoud:[viewOnderhoud,mountOnderhoud],hardware:[viewHardware,mountHardware]};
const SVC_SCREENS=['alarmen','sequentie','io','hardware','handauto','kalibratie','onderhoud'];
function go(screen){
  if(SVC_SCREENS.includes(screen)&&state.role==='klant'){toast('Servicetoegang vereist — wissel naar de rol Service','lock');return;}
  state.screen=screen;document.body.classList.remove('nav-open');
  renderNav();render();window.scrollTo(0,0);$('#main').scrollTop=0;
}
function render(){
  const [v,m]=VIEWS[state.screen]||VIEWS.overzicht;
  const main=$('#main');
  main.innerHTML=v();
  if(m)m();
  main.classList.remove('reveal');void main.offsetWidth;main.classList.add('reveal');
}

/* ============================================================ SIMULATIE */
function applyStepEffects(){
  state.openValves=new Set();state.activeFlow=null;state.mixing=false;
  state.fcsRun=false;state.fcsHi=false;state.flow=0;state.hz=0;
  const s=curStep();const bak=state.rcp.bak;
  if(s){
    if(s.dose){const n=srcByName(s.dose)?.n;if(n)state.openValves.add('dose-'+n);state.openValves.add('inlet-'+bak);
      state.fcsRun=true;state.hz=30;state.flow=27+Math.round(Math.random()*4);
      const col=s.dose==='Water'?'fl-w':(bak==='A'?'fl-a':'fl-b');state.activeFlow={feed:1,src:n,in:bak,col};
    } else if(s.leaktest){state.fcsRun=true;state.hz=30;state.flow=state.leak?state.leak.restflow:0;
    } else if(s.recirc){state.openValves.add('recirc-'+bak);state.openValves.add(bak==='A'?'vp02':'vp03');state.mixing=true;state.activeFlow={rec:bak};
    } else if(s.transfer){state.openValves.add('kl-'+bak+'1');state.openValves.add('kl-'+bak+'2');state.openValves.add(bak==='A'?'vp02':'vp03');
      state.activeFlow={tr:bak};
    } else if(s.flush){state.openValves.add('dose-12');state.openValves.add('inlet-'+bak);state.fcsRun=true;state.hz=30;state.flow=22+Math.round(Math.random()*3);state.activeFlow={feed:1,src:12,in:bak,col:'fl-w'};
    } else {state.openValves.add('inlet-'+bak);}
  }
  if(state.fcsRun)state.openValves.add('fcs-run');if(state.fcsHi)state.openValves.add('fcs-hi');
  for(const k in state.hand){const o=state.hand[k];if(o&&o.mode==='hand'){if(o.on&&interlockOK(k))state.openValves.add(k);else state.openValves.delete(k);}}
  state.fcsRun=state.openValves.has('fcs-run');state.fcsHi=state.openValves.has('fcs-hi');
  if(!state.fcsRun){state.flow=0;state.hz=0;if(state.activeFlow&&state.activeFlow.feed)state.activeFlow=null;}
  else if(!state.hz)state.hz=state.fcsHi?50:30;
}
function stepLevels(){const s=curStep();const bak=state.rcp.bak;if(!s)return;
  if(s.dose)state.lvl['t'+bak]=Math.min(88,state.lvl['t'+bak]+2.2);
  else if(s.transfer){state.lvl['t'+bak]=Math.max(4,state.lvl['t'+bak]-4.0);['1','2'].forEach(d=>{const k=bak+d;state.lvl[k]=Math.min(99,state.lvl[k]+1.35);});}
}
function drain(){const s=curStep();const bak=state.rcp.bak;['A1','A2','B1','B2'].forEach(k=>{const tr=s&&s.transfer&&k[0]===bak;if(!tr)state.lvl[k]=Math.max(3,state.lvl[k]-(0.10+Math.random()*0.08));});}
function syncRaw(){['lvl-tA','lvl-tB','A1','A2','B1','B2'].forEach(k=>{const lk=k==='lvl-tA'?'tA':k==='lvl-tB'?'tB':k;state.cal[k].raw=4+Math.max(0,Math.min(100,state.lvl[lk]))/100*16;});}
function maybeLeakCheck(){const s=curStep();if(s&&s.leaktest&&state.leakArm&&!state.leak)triggerLeak(s);}
function triggerLeak(s){
  state.leakArm=false;
  const name=s.after||'laatste klep';
  const src=srcByName(name);
  const key=name==='Water'?'dose-12':(src?('dose-'+src.n):null);
  const sig=key?SIGNALS.find(x=>x.type==='DO'&&x.k===key):null;
  const p=sig?state.hw.map[uidOf(sig)]:null;
  const restflow=+(1.4+Math.random()*1.1).toFixed(1);
  const id='E-204-'+Date.now();
  state.leak={restflow,suspectName:name,suspectKey:key,slot:p?p.slot:null,ch:p?p.ch:null,time:Date.now(),alarmId:id,stepIdx:state.seqIdx};
  state.alarms.unshift({id,sev:'alarm',code:'E-204',time:Date.now(),ack:false,leak:true,
    suspect:p?{slot:p.slot,ch:p.ch}:null,
    ti:'Lektest gefaald — restflow '+fix(restflow,1)+' L/min',
    loc:'Doseerstraat · FC 01'+(name?(' · verdachte klep: '+name):''),
    cause:'Bij de dichtheidstest na het sluiten van '+name+' meet FC 01 nog '+fix(restflow,1)+' L/min, terwijl alle kleppen dicht horen te staan. Omdat de test direct na deze klep draait, is '+name+' de waarschijnlijke veroorzaker — zeker is dit niet; een eerder gebruikte klep kan ook lekken of traag sluiten.',
    check:'Controleer eerst '+name+' (klepzitting, aandrukking, persluchtdruk). Test zo nodig de overige in deze batch gebruikte kleppen afzonderlijk. De batch is afgekeurd; bevestig de melding na herstel om opnieuw te starten.'});
  if(state.screen!=='alarmen')toast('Lektest gefaald — restflow '+fix(restflow,1)+' L/min · verdachte klep: '+name,'alarm','alarm big');
}
function resolveLeak(){
  if(!state.leak)return;const lk=state.leak;
  state.alarms=state.alarms.filter(a=>!a.leak);
  state.history.unshift({sev:'alarm',code:'E-204',time:Date.now(),ti:'Lektest gefaald — restflow na '+lk.suspectName+' (afgehandeld · batch afgekeurd)'});
  logBatch('afgekeurd',null,'Lektest gefaald — restflow na '+lk.suspectName+' (waarschijnlijke veroorzaker, niet zeker)');
  if(state.history.length>40)state.history.pop();
  state.leak=null;
  state.seq=buildSequence(state.rcp);state.seqIdx=0;state.stepT=0;
  toast('Batch afgekeurd · doseerstraat opnieuw gestart','info');
}
function tick(){
  updateClock();
  if(!state.leak){
  state.stepT++;
  const step=curStep();
  if(step&&state.stepT>=step.dur){
    state.stepT=0;state.seqIdx++;
    maybeLeakCheck();
    if(!state.leak&&state.seqIdx>=state.seq.length){
      const fin=state.rcp;state.batchesToday++;state.lastBatch=fin.bak+' · '+fin.name;
      const Lbatch=fin.batch-2+Math.round(Math.random()*4);
      state.history.unshift({sev:'info',code:'I-050',time:Date.now(),ti:'Batch gereed — '+fin.bak+' · '+fin.name+' ('+Lbatch+' L)'});
      logBatch('gereed',Lbatch);
      if(state.history.length>40)state.history.pop();
      if(state.screen!=='alarmen')toast('Vulcyclus voltooid · '+fin.bak+' · '+fin.name+' · '+Lbatch+' L afgeleverd','check','ok big');
      {const bc=$('#kpi-batch-card');if(bc)flash(bc);}
      const avgA=(state.lvl.A1+state.lvl.A2)/2,avgB=(state.lvl.B1+state.lvl.B2)/2;const side=avgA<=avgB?'A':'B';
      state.rcp=RECIPES.find(r=>r.bak===side&&r.id.startsWith('std'))||RECIPES[0];state.seq=buildSequence(state.rcp);state.seqIdx=0;
    }
  }
  }
  applyStepEffects();stepLevels();drain();syncRaw();
  state.flowHist.push(state.flow);if(state.flowHist.length>40)state.flowHist.shift();
  // light runtime creep
  if(state.fcsRun)state.runtime.FCS1+=0.01;if(state.openValves.has('vp02'))state.runtime.VP02+=0.01;if(state.openValves.has('vp03'))state.runtime.VP03+=0.01;
  updateBell();
  refreshOverzicht();refreshSequentie();updateIO();updateHardware();updateHandAuto();updateKal();updateOnd();updateFaceplate();updateLog();
}

/* ============================================================ EVENTS + INIT */
function wire(){
  $('#roles').addEventListener('click',e=>{const b=e.target.closest('[data-role]');if(!b)return;state.role=b.dataset.role;renderRoles();renderNav();
    if(SVC_SCREENS.includes(state.screen)&&state.role==='klant')go('overzicht');else render();
    toast('Rol: '+({klant:'Klant',service:'Service',oem:'OEM'}[state.role]),state.role==='klant'?'user':'wrench');});
  $('#rail').addEventListener('click',e=>{const b=e.target.closest('.nav-item');if(!b)return;if(b.dataset.locked){toast('Servicetoegang vereist — wissel naar de rol Service','lock');return;}go(b.dataset.screen);});
  $('#burger').onclick=()=>document.body.classList.toggle('nav-open');
  $('#scrim').onclick=()=>document.body.classList.remove('nav-open');
  $('#bell').onclick=()=>{if(state.role==='klant'){toast('Alarmdetails via de rol Service','lock');go('overzicht');}else go('alarmen');};
  $('#modal-x').onclick=closeModal;
  $('#modal-scrim').onclick=e=>{if(e.target.id==='modal-scrim')closeModal();};
  document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();document.body.classList.remove('nav-open');}});
}
function init(){
  seedAlarms();
  initWear();
  loadDraft(state.schemas[0]?state.schemas[0].id:null);
  seedLog();
  state.seq=buildSequence(state.rcp);state.seqIdx=2;state.stepT=0; // start midden in een batch zodat het meteen leeft
  renderRoles();renderNav();wire();
  applyStepEffects();syncRaw();updateClock();updateBell();
  state.flowHist=Array.from({length:30},()=>Math.max(0,Math.round(state.flow+(Math.random()*6-3))));
  render();
  const boot=$('#boot');
  if(boot){
    const reduce=(window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches);
    setTimeout(()=>{const bs=$('#bstat');if(bs)bs.innerHTML='<span class="dotg"></span><span>Systeem gereed</span>';},reduce?120:880);
    setTimeout(()=>boot.classList.add('hide'),reduce?350:1320);
    setTimeout(()=>{if(boot.parentNode)boot.parentNode.removeChild(boot);},reduce?700:1900);
  }
  setInterval(tick,1000);
}
document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
