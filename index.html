<!DOCTYPE html>
<html lang="nl">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Interactieve trainings-omgeving voor service-monteurs op het Connext klimaatcomputer- en Operator-platform. Climate, Water, Energy en General met live simulatie, alarmen en zoekfunctie voor I-nummers.">

<style>
:root{--topbar:#1B4D2A;--topbar-2:#143820;--topbar-text:#E8F5E9;--topbar-mute:rgba(232,245,233,.65);--topbar-hover:rgba(255,255,255,.08);--topbar-active:#4FC3A1;--sidebar-bg:#FFF;--sidebar-border:#E5E7E5;--sidebar-text:#3A3F3A;--sidebar-active-bg:#E8F0E9;--sidebar-active:#1B4D2A;--content-bg:#F3F5F3;--card-bg:#FFF;--border:#E0E3E0;--border-strong:#C8CCC8;--text-primary:#1F2420;--text-secondary:#6A706A;--text-tertiary:#9CA09C;--accent:#2E7D32;--accent-hover:#1B5E20;--accent-bg:#E8F5E9;--accent-light:#C8E6C9;--link:#1976D2;--link-bg:#E3F2FD;--warn:#E67E22;--warn-bg:#FFF4E0;--alarm:#C62828;--alarm-bg:#FFEBEE;--t-green:#D4E9C0;--t-blue:#C5E2F2;--t-pink:#F5C8D4;--t-purple:#DCD0EA;--t-orange:#FBD9A8;--t-cream:#FAEFC1;--t-red:#F5B7B1;--t-grey:#DDE0DC;--shadow-sm:0 1px 2px rgba(0,0,0,.05);--shadow-md:0 2px 8px rgba(0,0,0,.07);--shadow-lg:0 8px 24px rgba(0,0,0,.12)}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'IBM Plex Sans',sans-serif;font-size:13px;color:var(--text-primary);background:var(--content-bg);overflow:hidden}
.app{display:grid;grid-template-rows:48px 1fr;height:100vh}
.topbar{background:var(--topbar);color:var(--topbar-text);display:flex;align-items:center;padding:0 16px;z-index:100;height:48px}
.brand{display:flex;align-items:center;gap:10px;margin-right:12px;font-weight:600;font-size:14px}
.brand-mark{background:var(--topbar-text);color:var(--topbar);padding:3px 7px;border-radius:3px;font-weight:800;font-size:11px;letter-spacing:1.5px}
.brand-name{opacity:.92;font-weight:500}
.brand-divider{color:var(--topbar-mute);margin:0 6px}
.topnav{display:flex;height:48px;margin-left:16px}
.tnitem{display:flex;align-items:center;gap:6px;padding:0 14px;color:var(--topbar-text);opacity:.78;cursor:pointer;font-weight:500;font-size:13px;user-select:none;border-bottom:2px solid transparent}
.tnitem:hover{opacity:1;background:var(--topbar-hover)}
.tnitem.active{opacity:1;border-bottom-color:var(--topbar-active)}
.tnitem .icon{width:14px;height:14px}
.top-right{margin-left:auto;display:flex;align-items:center;gap:4px}
.iconbtn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:4px;cursor:pointer;color:var(--topbar-text);opacity:.85;position:relative}
.iconbtn:hover{background:var(--topbar-hover);opacity:1}
.iconbtn svg{width:16px;height:16px}
.iconbtn .dot{position:absolute;top:7px;right:7px;width:7px;height:7px;border-radius:50%;background:var(--alarm);display:none}
.iconbtn .dot.active{display:block}
.loc{display:flex;align-items:center;gap:6px;padding:0 10px;color:var(--topbar-text);font-size:13px;opacity:.9;cursor:pointer;height:32px;border-radius:4px}
.loc:hover{background:var(--topbar-hover)}
.loc svg{width:14px;height:14px}
.body{display:grid;grid-template-columns:200px 1fr;overflow:hidden}
.sidebar{background:var(--sidebar-bg);border-right:1px solid var(--sidebar-border);padding:12px 0;overflow-y:auto}
.side-item{padding:7px 18px;color:var(--sidebar-text);font-size:13px;cursor:pointer;user-select:none}
.side-item:hover{background:var(--sidebar-active-bg)}
.side-item.active{color:var(--sidebar-active);font-weight:600;background:var(--sidebar-active-bg)}
.content-wrap{display:flex;flex-direction:column;overflow:hidden;background:var(--content-bg)}
.crumb{padding:14px 24px 0;font-size:12px;color:var(--text-secondary)}
.crumb .sep{margin:0 6px}
.page-h{padding:4px 24px 14px;display:flex;align-items:center;gap:12px}
.page-title{font-size:22px;font-weight:600}
.tab-strip{padding:0 24px;border-bottom:1px solid var(--border);display:flex;background:var(--content-bg)}
.tab{padding:10px 16px;cursor:pointer;font-size:13px;color:var(--text-secondary);border-bottom:2px solid transparent;font-weight:500;user-select:none;margin-bottom:-1px}
.tab:hover{color:var(--text-primary)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.content{flex:1;overflow-y:auto;padding:20px 24px 60px}
.view{animation:fadeIn .18s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:4px;padding:16px 18px;margin-bottom:14px}
.card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.card-h h3{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px}
.pill{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px}
.pill-ok{background:var(--accent-bg);color:var(--accent)}
.pill-warn{background:var(--warn-bg);color:var(--warn)}
.pill-alarm{background:var(--alarm-bg);color:var(--alarm)}
.pill-info{background:var(--link-bg);color:var(--link)}
.priva-table{width:100%;border-collapse:collapse;font-size:12px}
.priva-table th,.priva-table td{padding:6px 10px;text-align:left;border:1px solid var(--border)}
.priva-table th{background:#F8FAF8;font-weight:600;color:var(--text-secondary);font-size:11px}
.priva-table td.lab{background:#FAFBFA;font-weight:500}
.priva-table td.val{font-family:'JetBrains Mono',monospace;text-align:center;white-space:nowrap}
.priva-table td.editable{cursor:text;text-decoration:underline;text-decoration-color:var(--text-tertiary);text-underline-offset:3px}
.priva-table td.editable:hover{background:var(--accent-bg)}
.cell{display:inline-block;padding:3px 7px;border-radius:3px;font-family:'JetBrains Mono',monospace;font-weight:600;font-size:11px;min-width:42px;text-align:center}
.cell-green{background:var(--t-green);color:#1B4D2A}
.cell-blue{background:var(--t-blue);color:#0D47A1}
.cell-pink{background:var(--t-pink);color:#880E4F}
.cell-purple{background:var(--t-purple);color:#4527A0}
.cell-orange{background:var(--t-orange);color:#6E2C00}
.cell-cream{background:var(--t-cream);color:#6E5C00}
.cell-red{background:var(--t-red);color:#6E0000}
.cell-grey{background:var(--t-grey);color:#3A3F3A}
.li-row{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;background:#FFF;border:1px solid var(--border);border-radius:4px;margin-bottom:6px;font-size:13px;cursor:pointer}
.li-row:hover{border-color:var(--accent);background:var(--accent-bg)}
.li-row .arrow{color:var(--text-tertiary)}
.li-group-h{padding:10px 0 6px;font-size:12px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.6px;display:flex;align-items:center;gap:6px}
.overlay{position:fixed;inset:0;background:rgba(20,40,30,.55);display:none;align-items:flex-start;justify-content:center;z-index:1000;padding-top:80px}
.overlay.show{display:flex;animation:fadeIn .15s}
.search-dialog{background:#FFF;border-radius:6px;width:600px;max-width:90vw;box-shadow:var(--shadow-lg);overflow:hidden}
.search-head{background:var(--topbar-2);padding:16px 20px}
.search-head h3{color:var(--topbar-text);font-size:16px;font-weight:600;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.search-head h3 .close{cursor:pointer;opacity:.7;font-size:22px;font-weight:300;line-height:1}
.search-box{background:var(--topbar);border:1px solid rgba(255,255,255,.18);border-radius:4px;padding:10px 14px;display:flex;align-items:center;gap:10px}
.search-box svg{width:16px;height:16px;color:var(--topbar-text);opacity:.7}
.search-box input{background:transparent;border:none;outline:none;color:var(--topbar-text);font-family:inherit;font-size:14px;flex:1}
.search-box input::placeholder{color:rgba(232,245,233,.5)}
.search-hint{padding:10px 20px;font-size:11px;color:var(--text-secondary);background:#F8FAF8;border-bottom:1px solid var(--border)}
.search-hint kbd{background:#FFF;border:1px solid var(--border);padding:1px 5px;border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:10px}
.search-results{max-height:380px;overflow-y:auto}
.search-result{padding:12px 20px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:13px}
.search-result:hover{background:var(--accent-bg)}
.search-result .path{color:var(--text-secondary)}
.search-empty{padding:32px 20px;text-align:center;color:var(--text-secondary);font-size:13px}
.visual-wrap{display:grid;grid-template-columns:220px 1fr;gap:16px}
.outside-panel{background:#FFF;border:1px solid var(--border);border-radius:4px;padding:14px;height:fit-content}
.outside-panel h3{font-size:13px;font-weight:600;margin-bottom:12px}
.op-tile{background:var(--t-green);padding:8px 10px;border-radius:4px;margin-bottom:8px;font-size:12px}
.op-tile.blue{background:var(--t-blue)}.op-tile.orange{background:var(--t-orange)}.op-tile.purple{background:var(--t-purple)}.op-tile.cream{background:var(--t-cream)}.op-tile.pink{background:var(--t-pink)}
.op-tile .lab{font-size:10px;color:rgba(0,0,0,.6);margin-bottom:1px}
.op-tile .val{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px}
.op-tile-2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.op-tile-2 .op-tile{margin-bottom:0}
.gh-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.gh{background:#FFF;border:1px solid var(--border);border-radius:4px;padding:12px;min-height:280px;position:relative}
.gh-svg{position:relative;height:240px}
.gh-svg svg.gh-bg{width:100%;height:100%;display:block}
.gh-num{position:absolute;top:12px;left:16px;font-size:28px;font-weight:300;color:var(--text-secondary);z-index:2}
.gh-tile{position:absolute;padding:4px 7px;border-radius:3px;background:var(--t-blue);font-size:10.5px;line-height:1.15;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.1);user-select:none;z-index:3;min-width:48px}
.gh-tile:hover{transform:scale(1.08);z-index:10}
.gh-tile .lab{font-size:9.5px;color:rgba(0,0,0,.62)}
.gh-tile .val{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:11.5px}
.gh-tile.green{background:var(--t-green)}.gh-tile.blue{background:var(--t-blue)}.gh-tile.pink{background:var(--t-pink)}.gh-tile.purple{background:var(--t-purple)}.gh-tile.orange{background:var(--t-orange)}.gh-tile.cream{background:var(--t-cream)}.gh-tile.red{background:var(--t-red)}.gh-tile.grey{background:var(--t-grey)}
.gh-tile.alarm{outline:2px solid var(--alarm);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 1px 2px rgba(0,0,0,.1),0 0 0 0 rgba(198,40,40,.5)}50%{box-shadow:0 1px 2px rgba(0,0,0,.1),0 0 0 6px rgba(198,40,40,0)}}
.widget-pop{background:#FFF;width:600px;max-width:90vw;border-radius:6px;box-shadow:var(--shadow-lg);overflow:hidden}
.wp-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start}
.wp-head h3{font-size:18px;font-weight:600}
.wp-head .sub{font-size:12px;color:var(--text-secondary);margin-top:2px}
.wp-body{padding:16px 20px;display:grid;grid-template-columns:1.6fr 1fr;gap:24px}
.wp-chart{height:180px}
.wp-chart svg{width:100%;height:100%}
.wp-side .lab{font-size:11px;color:var(--text-secondary);margin-bottom:4px}
.wp-side .now{background:var(--accent-bg);border:1px solid var(--accent-light);padding:8px 12px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-weight:600;margin-bottom:16px}
.wp-side h4{font-size:12px;color:var(--text-secondary);text-transform:uppercase;margin:14px 0 8px}
.wp-shortcut{padding:8px 10px;background:#FAFBFA;border:1px solid var(--border);border-radius:4px;margin-bottom:6px;font-size:12px;cursor:pointer;display:flex;justify-content:space-between}
.wp-shortcut:hover{background:var(--accent-bg);border-color:var(--accent)}
.alm{display:grid;grid-template-columns:70px 90px 1fr 160px 80px;gap:10px;align-items:center;padding:10px 14px;background:#FFF;border:1px solid var(--border);border-left:3px solid var(--alarm);border-radius:3px;margin-bottom:4px;font-size:12px}
.alm.warn{border-left-color:var(--warn)}
.alm.status{border-left-color:var(--link)}
.alm.acked{opacity:.55}
.alm .code{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--alarm);font-size:13px}
.alm.warn .code{color:var(--warn)}
.alm.status .code{color:var(--link)}
.alm .time{font-family:'JetBrains Mono',monospace;color:var(--text-secondary)}
.btn{padding:6px 12px;border:none;border-radius:3px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:500}
.btn-primary{background:var(--accent);color:#FFF}
.btn-primary:hover{background:var(--accent-hover)}
.btn-secondary{background:#FFF;color:var(--accent);border:1px solid var(--accent)}
.btn-secondary:hover{background:var(--accent-bg)}
#toast{position:fixed;bottom:20px;right:20px;background:var(--text-primary);color:#FFF;padding:10px 18px;border-radius:4px;font-size:12px;font-weight:500;opacity:0;transform:translateY(10px);transition:all .2s;pointer-events:none;z-index:2000;max-width:360px}
#toast.show{opacity:1;transform:translateY(0)}
#toast.alarm{background:var(--alarm)}
#toast.warn{background:var(--warn);color:#432}
#toast.ok{background:var(--accent)}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#C8CCC8;border-radius:4px}
.dash-tabs{display:flex;gap:0;margin-bottom:16px;border-bottom:1px solid var(--border)}
.dash-tab{padding:10px 14px;cursor:pointer;font-size:13px;color:var(--text-secondary);border-bottom:2px solid transparent;margin-bottom:-1px;user-select:none}
.dash-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.dash-tab:hover{color:var(--text-primary)}
.kv{display:grid;grid-template-columns:1fr auto;padding:6px 0;border-bottom:1px solid #F0F2F0;font-size:12px}
.kv .k{color:var(--text-secondary)}
.kv .v{font-family:'JetBrains Mono',monospace;font-weight:600}
</style>
</head>
<body>

  <div class="body">

      <div class="tab-strip" id="tabStrip"></div>
      <div class="content" id="contentArea"></div>
    </div>
  </div>
</div>

<div class="overlay" id="searchOverlay" onclick="if(event.target===this) closeSearch()">
  <div class="search-dialog">

      <h3><span>Search</span><span class="close" onclick="closeSearch()">&times;</span></h3>
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input type="text" id="searchInput" placeholder="Zoek op I-nummer (bv. I120), alarmcode (bv. 154) of naam…" autocomplete="off">

// === ALARMEN ===
function spawnAlarm(code, source) {
  const def = ALARM_DEFS[code]; if (!def) return;
  if (state.alarms.some(a => a.code===code && a.source===source)) return;
  state.alarms.unshift({id:state.nextAlarmId++, code, source, text:def.text, sev:def.sev, time:new Date(), acked:false});
  $('alarmDot').classList.add('active');
  toast(`⚠ ${code} — ${def.text} (${source})`, def.sev==='alarm'?'alarm':'warn');
}
function ackAlarm(id) {
  const a = state.alarms.find(x => x.id===id); if (!a) return;
  state.alarmHistory.unshift({...a, closedAt:new Date()});
  state.alarms = state.alarms.filter(x => x.id!==id);
  if (state.alarms.length===0) $('alarmDot').classList.remove('active');
  toast('Alarm gewist.','ok'); render();
}
function ackAll() {
  state.alarms.forEach(a => state.alarmHistory.unshift({...a, closedAt:new Date()}));
  state.alarms = []; $('alarmDot').classList.remove('active');
  toast('Alle alarmen geacknowledged.','ok'); render();
}

// === SIMULATIE TICK ===
function tick() {
  const h = new Date().getHours() + new Date().getMinutes()/60;
  state.outdoor.temp = 18 + 5*Math.sin((h-7)*Math.PI/12) + (Math.random()-0.5)*0.4;
  state.outdoor.rad = clamp((h>5 && h<21) ? 600*Math.sin((h-6)*Math.PI/14) + (Math.random()-0.5)*40 : 0, 0, 900);
  state.outdoor.par = Math.round(state.outdoor.rad * 2.2);
  state.outdoor.parSumToday = clamp(state.outdoor.parSumToday + state.outdoor.par * 0.00002, 0, 60);
  state.outdoor.windSp = clamp(3.6 + (Math.random()-0.5)*1.6, 0, 12);
  state.compartments.forEach(c => {
    const heatD = (c.mwatT1 - 18) * 0.012;
    const ventD = -((c.ventNo + c.ventSo)/200) * Math.max(0, c.grhT - state.outdoor.temp) * 0.1;
    const radD = state.outdoor.rad * 0.0004;
    c.grhT = clamp(c.grhT + heatD + ventD + radD + (Math.random()-0.5)*0.08, 14, 35);
    c.rh = clamp(c.rh + (Math.random()-0.5)*0.6 + (c.grhT > c.sp_vent ? -0.3 : 0.3), 40, 95);
    c.ah = clamp(c.ah + (Math.random()-0.5)*0.2, 6, 22);
    c.hd = clamp(c.hd + (Math.random()-0.5)*0.2, 1, 18);
    c.co2 = clamp(c.co2 + (Math.random()-0.5)*8 - ((c.ventNo+c.ventSo)*0.4) + (h>=7&&h<19?30:0), 350, 1200);
    c.par = Math.round(state.outdoor.par * 0.85);
    c.parSum = clamp(c.parSum + c.par * 0.00002, 0, 60);
    c.ventT = clamp(c.sp_vent + (Math.random()-0.5)*0.4, 18, 30);
    if (c.grhT > c.sp_vent+1) { c.ventNo = clamp(c.ventNo+2, 0, 100); c.ventSo = clamp(c.ventSo+1, 0, 100); }
    else if (c.grhT < c.sp_vent-1) { c.ventNo = clamp(c.ventNo-2, 0, 100); c.ventSo = clamp(c.ventSo-1, 0, 100); }
    if (c.grhT < c.sp_heat) c.mwatT1 = clamp(c.mwatT1+0.4, 18, 70);
    else c.mwatT1 = clamp(c.mwatT1-0.2, 18, 70);
    c.history.push({t:Date.now(), v:c.co2});
    if (c.history.length > 60) c.history.shift();
    if (c.grhT > c.sp_vent+4) spawnAlarm(154, c.name);
    if (c.rh > 92) spawnAlarm(156, c.name);
    if (c.co2 < 400) spawnAlarm(159, c.name);
  });
  render();
}

function closeWidget() { $('widgetOverlay').classList.remove('show'); }
function renderMiniChart(history) {
  if (!history || history.length<2) return '<text x="200" y="90" text-anchor="middle" fill="#999" font-size="12">Verzamelt data...</text>';
  const W=400,H=180,pad=20;
  const vals = history.map(p => p.v);
  const mn=Math.min(...vals)-20, mx=Math.max(...vals)+20;
  const xs = history.map((_,i)=> pad + i*(W-2*pad)/(history.length-1||1));
  const ys = history.map(p => H-pad - (p.v-mn)/(mx-mn)*(H-2*pad));
  let grid=''; for(let i=0;i<=4;i++){const y=pad+i*(H-2*pad)/4; grid+=`<line x1="${pad}" x2="${W-pad}" y1="${y}" y2="${y}" stroke="#E8EBE8"/>`;}
  return `${grid}<path d="${ys.map((y,i)=>(i?'L':'M')+xs[i]+' '+y).join(' ')}" fill="none" stroke="#1976D2" stroke-width="2"/>`;
}

// === RENDER MASTER ===
function render() {
  const sec = state.section, side = state.sideItem;
  const nav = SECTION_NAV[sec];
  const sideLabel = nav.side.find(s => s.id===side)?.label || '';
  $('crumb').innerHTML = `<a>${nav.label}</a><span class="sep">/</span><a>${sideLabel}</a>`;
  $('pageTitle').textContent = sideLabel==='Dashboard' ? nav.label : sideLabel;

  // Tab strip
  const tb = $('tabStrip');
  let tabs = [];
  if (sec==='climate' && side==='dashboard') {
    tabs = [{id:'overview',label:'Climate overview'},{id:'modlight',label:'Modulating light control'},{id:'visual',label:'Climate visual'},{id:'strategies',label:'Strategies'}];
    if (!tabs.find(t => t.id===state.innerTab)) state.innerTab='visual';
  } else if (sec==='water' && side==='dashboard') {
    tabs = [{id:'overview',label:'Water overview'}]; state.innerTab='overview';
  } else if (sec==='energy' && side==='dashboard') {
    tabs = [{id:'overview',label:'Energy overview'}]; state.innerTab='overview';
  } else if (sec==='general' && (side==='dashboard'||side==='weather')) {
    tabs = [{id:'overview',label:'Weather overview'}]; state.innerTab='overview';
  }
  if (tabs.length) {
    tb.style.display='flex';
    tb.innerHTML = tabs.map(t => `<div class="tab ${t.id===state.innerTab?'active':''}" data-tab="${t.id}">${t.label}</div>`).join('');
    tb.querySelectorAll('.tab').forEach(el => el.addEventListener('click', () => { state.innerTab=el.dataset.tab; render(); }));
  } else { tb.style.display='none'; }

  // Content
  const area = $('contentArea');
  if (sec==='home') area.innerHTML = renderHome();
  else if (sec==='climate') {
    if (side==='dashboard') {
      if (state.innerTab==='visual') area.innerHTML = renderClimateVisual();
      else if (state.innerTab==='overview') area.innerHTML = renderClimateOverview();
      else if (state.innerTab==='modlight') area.innerHTML = renderModLight();
      else area.innerHTML = renderStrategies();
    }
    else if (side==='modlight') area.innerHTML = renderModLight();
    else if (['ventilation','heating','curtain','co2','h24','lighting'].includes(side)) area.innerHTML = renderCropsList(sideLabel);
    else area.innerHTML = renderGenericSettings(sideLabel);
  }
  else if (sec==='water') {
    if (side==='dashboard') area.innerHTML = renderWaterOverview();
    else if (side==='recipe') area.innerHTML = renderRecipes();
    else area.innerHTML = renderGenericSettings(sideLabel);
  }
  else if (sec==='energy') {
    if (side==='dashboard') area.innerHTML = renderEnergyOverview();
    else area.innerHTML = renderGenericSettings(sideLabel);
  }
  else if (sec==='general') {
    if (side==='dashboard'||side==='weather') area.innerHTML = renderWeather();
    else if (side==='alarms') area.innerHTML = renderAlarmsView();
    else if (side==='periodshift') area.innerHTML = renderPeriodShift();
    else area.innerHTML = renderGenericSettings(sideLabel);
  }

  // Event handlers voor list-rows
  area.querySelectorAll('.li-row[data-comp]').forEach(el => {
    el.addEventListener('click', () => {
      area.innerHTML = renderCompartmentDetail(parseInt(el.dataset.comp), $('pageTitle').textContent);
    });
  });
  area.querySelectorAll('.li-row[data-crop]').forEach(el => {
    el.addEventListener('click', () => {
      area.innerHTML = renderCropDetail(el.dataset.crop, $('pageTitle').textContent);
    });
  });
  area.querySelectorAll('.li-row[data-recipe]').forEach(el => {
    el.addEventListener('click', () => {
      area.innerHTML = renderRecipeDetail(parseInt(el.dataset.recipe));
    });
  });
}

    ${state.alarms.length===0 ?
      '<div style="padding:20px;text-align:center;color:var(--text-secondary);font-size:13px;">Geen actieve alarmen 🎉</div>' :
      state.alarms.map(a => `<div class="alm ${a.sev}"><div class="code">${a.code}</div><div class="time">${timeStr(a.time)}</div><div>${a.text}</div><div style="color:var(--text-secondary);font-size:11px;">${a.source}</div><div><button class="btn btn-secondary" onclick="ackAlarm(${a.id})">Ack</button></div></div>`).join('')
    }
  </div>
  <div class="card"><div class="card-h"><h3>📜 Geschiedenis (vandaag)</h3></div>
    ${state.alarmHistory.length===0 ?
      '<div style="padding:20px;text-align:center;color:var(--text-secondary);font-size:13px;">Nog geen geschiedenis</div>' :
      state.alarmHistory.slice(0,15).map(a => `<div class="alm ${a.sev} acked"><div class="code">${a.code}</div><div class="time">${timeStr(a.time)}</div><div>${a.text}</div><div style="color:var(--text-secondary);font-size:11px;">${a.source}</div><div style="color:var(--text-tertiary);font-size:11px;">ack</div></div>`).join('')
    }
  </div>`;
}

// === PERIOD SHIFT ===
function renderPeriodShift() {
  return `<div class="card"><div class="card-h"><h3>📆 Period shift (I107)</h3></div>
    <table class="priva-table">
      <thead><tr><th></th><th>Period 1</th><th>Period 2</th><th>Period 3</th><th>Period 4</th><th>Period 5</th></tr></thead>
      <tbody>
        <tr><td class="lab">Start time</td><td class="val editable">05:00</td><td class="val editable">07:30</td><td class="val editable">12:00</td><td class="val editable">17:00</td><td class="val editable">22:00</td></tr>
        <tr><td class="lab">Adjustment radiation</td><td class="val editable">0 min</td><td class="val editable">−30 min</td><td class="val editable">0 min</td><td class="val editable">+15 min</td><td class="val editable">0 min</td></tr>
        <tr><td class="lab">Linked to sunrise/sunset</td><td class="val editable">Sunrise</td><td class="val editable">NO</td><td class="val editable">NO</td><td class="val editable">NO</td><td class="val editable">Sunset</td></tr>
      </tbody>
    </table>
    <div style="font-size:12px;color:var(--text-secondary);margin-top:10px;">Period shift past de start van klimaatperiodes aan op basis van sunrise/sunset en straling. Belangrijk voor lange dag/korte dag teelten.</div>
  </div>`;
}

// === GENERIC SETTINGS (placeholder voor minder belangrijke pagina's) ===
function renderGenericSettings(label) {
  return `<div class="card"><div class="card-h"><h3>⚙ ${label}</h3></div>
    <p style="color:var(--text-secondary);font-size:13px;margin-bottom:12px;">Deze sectie toont de instellingen voor <b>${label}</b>. In het echte Connext-systeem opent dit een gedetailleerde instellingen-pagina met crop/compartment selectie.</p>
    <div class="li-group-h">Compartments</div>
    ${state.compartments.map(c => `<div class="li-row" data-comp="${c.id}"><span>${c.name}</span><span class="arrow">›</span></div>`).join('')}
  </div>`;
}

// === INIT ===
document.querySelectorAll('.tnitem').forEach(n => n.addEventListener('click', () => setSection(n.dataset.sec)));
document.addEventListener('keydown', e => {
  if (e.key==='/' && !e.target.matches('input,textarea')) { e.preventDefault(); openSearch(); }
  if (e.key==='Escape') { closeSearch(); closeWidget(); }
});
$('searchInput').addEventListener('input', e => renderSearchResults(e.target.value));

setSection('climate');
setInterval(tick, 2500);
setTimeout(()=>toast('Welkom — gebruik de zoekfunctie (vergrootglas of "/") voor I-nummers en alarmcodes.','ok'),700);

</script>
</body>
</html>
