<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Interactieve trainings-omgeving voor service-monteurs op het Connext klimaatcomputer- en Operator-platform. Climate, Water, Energy en General met live simulatie, alarmen en zoekfunctie voor I-nummers.">
<meta name="theme-color" content="#1B4D2A">
<title>Greenhouse Operator — Trainingsomgeving</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%231B4D2A'/%3E%3Cpath d='M50 22c-12 0-18 12-18 22 0 8 6 14 6 22h24c0-8 6-14 6-22 0-10-6-22-18-22z' fill='%237CB342'/%3E%3Cpath d='M50 34v32M40 44l10 6M60 44l-10 6M44 56l6-3M56 56l-6-3' stroke='%23558B2F' stroke-width='1.5' fill='none'/%3E%3C/svg%3E">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{--topbar:#1B4D2A;--topbar-2:#143820;--topbar-text:#E8F5E9;--topbar-mute:rgba(232,245,233,.65);--topbar-hover:rgba(255,255,255,.08);--topbar-active:#4FC3A1;--sidebar-bg:#FFF;--sidebar-border:#E5E7E5;--sidebar-text:#3A3F3A;--sidebar-active-bg:#E8F0E9;--sidebar-active:#1B4D2A;--content-bg:#F3F5F3;--card-bg:#FFF;--border:#E0E3E0;--border-strong:#C8CCC8;--text-primary:#1F2420;--text-secondary:#6A706A;--text-tertiary:#9CA09C;--accent:#2E7D32;--accent-hover:#1B5E20;--accent-bg:#E8F5E9;--accent-light:#C8E6C9;--link:#1976D2;--link-bg:#E3F2FD;--warn:#E67E22;--warn-bg:#FFF4E0;--alarm:#C62828;--alarm-bg:#FFEBEE;--t-green:#D4E9C0;--t-blue:#C5E2F2;--t-pink:#F5C8D4;--t-purple:#DCD0EA;--t-orange:#FBD9A8;--t-cream:#FAEFC1;--t-red:#F5B7B1;--t-grey:#DDE0DC;--shadow-sm:0 1px 2px rgba(0,0,0,.05);--shadow-md:0 2px 8px rgba(0,0,0,.07);--shadow-lg:0 8px 24px rgba(0,0,0,.12)}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'IBM Plex Sans',sans-serif;font-size:13px;color:var(--text-primary);background:var(--content-bg);overflow:hidden}
.app{display:grid;grid-template-rows:48px 1fr;height:100vh}
.topbar{background:var(--topbar);color:var(--topbar-text);display:flex;align-items:center;padding:0 16px;z-index:100;height:48px}
.brand{display:flex;align-items:center;gap:10px;margin-right:12px;font-weight:600;font-size:14px}
.brand-mark{background:var(--topbar-text);color:var(--topbar);padding:3px 7px;border-radius:3px;font-weight:800;font-size:11px;letter-spacing:1.5px}
.brand-name{opacity:.92;font-weight:500}
.brand-divider{color:var(--topbar-mute);margin:0 6px}
.topnav{display:flex;height:48px;margin-left:16px}
.tnitem{display:flex;align-items:center;gap:6px;padding:0 14px;color:var(--topbar-text);opacity:.78;cursor:pointer;font-weight:500;font-size:13px;user-select:none;border-bottom:2px solid transparent}
.tnitem:hover{opacity:1;background:var(--topbar-hover)}
.tnitem.active{opacity:1;border-bottom-color:var(--topbar-active)}
.tnitem .icon{width:14px;height:14px}
.top-right{margin-left:auto;display:flex;align-items:center;gap:4px}
.iconbtn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:4px;cursor:pointer;color:var(--topbar-text);opacity:.85;position:relative}
.iconbtn:hover{background:var(--topbar-hover);opacity:1}
.iconbtn svg{width:16px;height:16px}
.iconbtn .dot{position:absolute;top:7px;right:7px;width:7px;height:7px;border-radius:50%;background:var(--alarm);display:none}
.iconbtn .dot.active{display:block}
.loc{display:flex;align-items:center;gap:6px;padding:0 10px;color:var(--topbar-text);font-size:13px;opacity:.9;cursor:pointer;height:32px;border-radius:4px}
.loc:hover{background:var(--topbar-hover)}
.loc svg{width:14px;height:14px}
.body{display:grid;grid-template-columns:200px 1fr;overflow:hidden}
.sidebar{background:var(--sidebar-bg);border-right:1px solid var(--sidebar-border);padding:12px 0;overflow-y:auto}
.side-item{padding:7px 18px;color:var(--sidebar-text);font-size:13px;cursor:pointer;user-select:none}
.side-item:hover{background:var(--sidebar-active-bg)}
.side-item.active{color:var(--sidebar-active);font-weight:600;background:var(--sidebar-active-bg)}
.content-wrap{display:flex;flex-direction:column;overflow:hidden;background:var(--content-bg)}
.crumb{padding:14px 24px 0;font-size:12px;color:var(--text-secondary)}
.crumb .sep{margin:0 6px}
.page-h{padding:4px 24px 14px;display:flex;align-items:center;gap:12px}
.page-title{font-size:22px;font-weight:600}
.tab-strip{padding:0 24px;border-bottom:1px solid var(--border);display:flex;background:var(--content-bg)}
.tab{padding:10px 16px;cursor:pointer;font-size:13px;color:var(--text-secondary);border-bottom:2px solid transparent;font-weight:500;user-select:none;margin-bottom:-1px}
.tab:hover{color:var(--text-primary)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.content{flex:1;overflow-y:auto;padding:20px 24px 60px}
.view{animation:fadeIn .18s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:4px;padding:16px 18px;margin-bottom:14px}
.card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.card-h h3{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px}
.pill{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px}
.pill-ok{background:var(--accent-bg);color:var(--accent)}
.pill-warn{background:var(--warn-bg);color:var(--warn)}
.pill-alarm{background:var(--alarm-bg);color:var(--alarm)}
.pill-info{background:var(--link-bg);color:var(--link)}
.priva-table{width:100%;border-collapse:collapse;font-size:12px}
.priva-table th,.priva-table td{padding:6px 10px;text-align:left;border:1px solid var(--border)}
.priva-table th{background:#F8FAF8;font-weight:600;color:var(--text-secondary);font-size:11px}
.priva-table td.lab{background:#FAFBFA;font-weight:500}
.priva-table td.val{font-family:'JetBrains Mono',monospace;text-align:center;white-space:nowrap}
.priva-table td.editable{cursor:text;text-decoration:underline;text-decoration-color:var(--text-tertiary);text-underline-offset:3px}
.priva-table td.editable:hover{background:var(--accent-bg)}
.cell{display:inline-block;padding:3px 7px;border-radius:3px;font-family:'JetBrains Mono',monospace;font-weight:600;font-size:11px;min-width:42px;text-align:center}
.cell-green{background:var(--t-green);color:#1B4D2A}
.cell-blue{background:var(--t-blue);color:#0D47A1}
.cell-pink{background:var(--t-pink);color:#880E4F}
.cell-purple{background:var(--t-purple);color:#4527A0}
.cell-orange{background:var(--t-orange);color:#6E2C00}
.cell-cream{background:var(--t-cream);color:#6E5C00}
.cell-red{background:var(--t-red);color:#6E0000}
.cell-grey{background:var(--t-grey);color:#3A3F3A}
.li-row{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;background:#FFF;border:1px solid var(--border);border-radius:4px;margin-bottom:6px;font-size:13px;cursor:pointer}
.li-row:hover{border-color:var(--accent);background:var(--accent-bg)}
.li-row .arrow{color:var(--text-tertiary)}
.li-group-h{padding:10px 0 6px;font-size:12px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.6px;display:flex;align-items:center;gap:6px}
.overlay{position:fixed;inset:0;background:rgba(20,40,30,.55);display:none;align-items:flex-start;justify-content:center;z-index:1000;padding-top:80px}
.overlay.show{display:flex;animation:fadeIn .15s}
.search-dialog{background:#FFF;border-radius:6px;width:600px;max-width:90vw;box-shadow:var(--shadow-lg);overflow:hidden}
.search-head{background:var(--topbar-2);padding:16px 20px}
.search-head h3{color:var(--topbar-text);font-size:16px;font-weight:600;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.search-head h3 .close{cursor:pointer;opacity:.7;font-size:22px;font-weight:300;line-height:1}
.search-box{background:var(--topbar);border:1px solid rgba(255,255,255,.18);border-radius:4px;padding:10px 14px;display:flex;align-items:center;gap:10px}
.search-box svg{width:16px;height:16px;color:var(--topbar-text);opacity:.7}
.search-box input{background:transparent;border:none;outline:none;color:var(--topbar-text);font-family:inherit;font-size:14px;flex:1}
.search-box input::placeholder{color:rgba(232,245,233,.5)}
.search-hint{padding:10px 20px;font-size:11px;color:var(--text-secondary);background:#F8FAF8;border-bottom:1px solid var(--border)}
.search-hint kbd{background:#FFF;border:1px solid var(--border);padding:1px 5px;border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:10px}
.search-results{max-height:380px;overflow-y:auto}
.search-result{padding:12px 20px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:13px}
.search-result:hover{background:var(--accent-bg)}
.search-result .path{color:var(--text-secondary)}
.search-empty{padding:32px 20px;text-align:center;color:var(--text-secondary);font-size:13px}
.visual-wrap{display:grid;grid-template-columns:220px 1fr;gap:16px}
.outside-panel{background:#FFF;border:1px solid var(--border);border-radius:4px;padding:14px;height:fit-content}
.outside-panel h3{font-size:13px;font-weight:600;margin-bottom:12px}
.op-tile{background:var(--t-green);padding:8px 10px;border-radius:4px;margin-bottom:8px;font-size:12px}
.op-tile.blue{background:var(--t-blue)}.op-tile.orange{background:var(--t-orange)}.op-tile.purple{background:var(--t-purple)}.op-tile.cream{background:var(--t-cream)}.op-tile.pink{background:var(--t-pink)}
.op-tile .lab{font-size:10px;color:rgba(0,0,0,.6);margin-bottom:1px}
.op-tile .val{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px}
.op-tile-2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.op-tile-2 .op-tile{margin-bottom:0}
.gh-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.gh{background:#FFF;border:1px solid var(--border);border-radius:4px;padding:12px;min-height:280px;position:relative}
.gh-svg{position:relative;height:240px}
.gh-svg svg.gh-bg{width:100%;height:100%;display:block}
.gh-num{position:absolute;top:12px;left:16px;font-size:28px;font-weight:300;color:var(--text-secondary);z-index:2}
.gh-tile{position:absolute;padding:4px 7px;border-radius:3px;background:var(--t-blue);font-size:10.5px;line-height:1.15;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.1);user-select:none;z-index:3;min-width:48px}
.gh-tile:hover{transform:scale(1.08);z-index:10}
.gh-tile .lab{font-size:9.5px;color:rgba(0,0,0,.62)}
.gh-tile .val{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:11.5px}
.gh-tile.green{background:var(--t-green)}.gh-tile.blue{background:var(--t-blue)}.gh-tile.pink{background:var(--t-pink)}.gh-tile.purple{background:var(--t-purple)}.gh-tile.orange{background:var(--t-orange)}.gh-tile.cream{background:var(--t-cream)}.gh-tile.red{background:var(--t-red)}.gh-tile.grey{background:var(--t-grey)}
.gh-tile.alarm{outline:2px solid var(--alarm);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 1px 2px rgba(0,0,0,.1),0 0 0 0 rgba(198,40,40,.5)}50%{box-shadow:0 1px 2px rgba(0,0,0,.1),0 0 0 6px rgba(198,40,40,0)}}
.widget-pop{background:#FFF;width:600px;max-width:90vw;border-radius:6px;box-shadow:var(--shadow-lg);overflow:hidden}
.wp-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start}
.wp-head h3{font-size:18px;font-weight:600}
.wp-head .sub{font-size:12px;color:var(--text-secondary);margin-top:2px}
.wp-body{padding:16px 20px;display:grid;grid-template-columns:1.6fr 1fr;gap:24px}
.wp-chart{height:180px}
.wp-chart svg{width:100%;height:100%}
.wp-side .lab{font-size:11px;color:var(--text-secondary);margin-bottom:4px}
.wp-side .now{background:var(--accent-bg);border:1px solid var(--accent-light);padding:8px 12px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-weight:600;margin-bottom:16px}
.wp-side h4{font-size:12px;color:var(--text-secondary);text-transform:uppercase;margin:14px 0 8px}
.wp-shortcut{padding:8px 10px;background:#FAFBFA;border:1px solid var(--border);border-radius:4px;margin-bottom:6px;font-size:12px;cursor:pointer;display:flex;justify-content:space-between}
.wp-shortcut:hover{background:var(--accent-bg);border-color:var(--accent)}
.alm{display:grid;grid-template-columns:70px 90px 1fr 160px 80px;gap:10px;align-items:center;padding:10px 14px;background:#FFF;border:1px solid var(--border);border-left:3px solid var(--alarm);border-radius:3px;margin-bottom:4px;font-size:12px}
.alm.warn{border-left-color:var(--warn)}
.alm.status{border-left-color:var(--link)}
.alm.acked{opacity:.55}
.alm .code{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--alarm);font-size:13px}
.alm.warn .code{color:var(--warn)}
.alm.status .code{color:var(--link)}
.alm .time{font-family:'JetBrains Mono',monospace;color:var(--text-secondary)}
.btn{padding:6px 12px;border:none;border-radius:3px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:500}
.btn-primary{background:var(--accent);color:#FFF}
.btn-primary:hover{background:var(--accent-hover)}
.btn-secondary{background:#FFF;color:var(--accent);border:1px solid var(--accent)}
.btn-secondary:hover{background:var(--accent-bg)}
#toast{position:fixed;bottom:20px;right:20px;background:var(--text-primary);color:#FFF;padding:10px 18px;border-radius:4px;font-size:12px;font-weight:500;opacity:0;transform:translateY(10px);transition:all .2s;pointer-events:none;z-index:2000;max-width:360px}
#toast.show{opacity:1;transform:translateY(0)}
#toast.alarm{background:var(--alarm)}
#toast.warn{background:var(--warn);color:#432}
#toast.ok{background:var(--accent)}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#C8CCC8;border-radius:4px}
.dash-tabs{display:flex;gap:0;margin-bottom:16px;border-bottom:1px solid var(--border)}
.dash-tab{padding:10px 14px;cursor:pointer;font-size:13px;color:var(--text-secondary);border-bottom:2px solid transparent;margin-bottom:-1px;user-select:none}
.dash-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.dash-tab:hover{color:var(--text-primary)}
.kv{display:grid;grid-template-columns:1fr auto;padding:6px 0;border-bottom:1px solid #F0F2F0;font-size:12px}
.kv .k{color:var(--text-secondary)}
.kv .v{font-family:'JetBrains Mono',monospace;font-weight:600}
/* ===== Water Unit testdashboard ===== */
.op-tile.green{background:var(--t-green)}
.wu-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.wu-btn{padding:8px 13px;border:none;border-radius:6px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600}
.wu-btn.start{background:#2e7d32;color:#fff}.wu-btn.start:hover{background:#1b5e20}
.wu-btn.stop{background:#fff;color:#444;border:1px solid var(--border-strong)}.wu-btn.stop:hover{background:#f3f5f3}
.wu-btn.estop{background:#c62828;color:#fff;box-shadow:0 2px 0 #8e1c1c}.wu-btn.estop:hover{background:#b71c1c}
.wu-btn.estop.armed{background:#fff;color:#c62828;border:2px solid #c62828;box-shadow:none}
.wu-btn.ghost{background:#fff;color:var(--accent);border:1px solid var(--accent)}.wu-btn.ghost:hover{background:var(--accent-bg)}
.wu-status{font-family:'JetBrains Mono',monospace;font-weight:800;letter-spacing:1.5px;padding:0 18px;border-radius:8px;font-size:15px}
.wu-status.ok{background:var(--accent-bg);color:var(--accent)}
.wu-status.warn{background:var(--warn-bg);color:var(--warn)}
.wu-status.alarm{background:var(--alarm-bg);color:var(--alarm);animation:pulse 1.2s infinite}
.wu-status.status{background:var(--link-bg);color:var(--link)}
.wu-grid{display:grid;grid-template-columns:1.15fr .85fr;gap:14px;margin-bottom:14px}
@media(max-width:1100px){.wu-grid{grid-template-columns:1fr}}
.wu-3d{height:420px;border-radius:8px;background:radial-gradient(120% 120% at 50% 8%,#22404d 0%,#0e1b22 70%);position:relative;overflow:hidden;cursor:grab;border:1px solid #0a141a}
.wu-3d:active{cursor:grabbing}
.wu-3d canvas{display:block}
.wu-fallback{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#9fb4bd;font-size:13px;text-align:center;padding:20px}
.wu-tanks{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.wu-tank{display:flex;gap:12px;background:#fafbfa;border:1px solid var(--border);border-radius:8px;padding:10px}
.wu-gauge{width:42px;height:150px;border-radius:6px;background:#eceff1;border:1px solid var(--border-strong);position:relative;overflow:hidden;flex-shrink:0}
.wu-gauge .fill{position:absolute;left:0;right:0;bottom:0;transition:height .5s ease}
.wu-valves{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.wu-valve{aspect-ratio:1.5;border-radius:7px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:11px;cursor:pointer;border:1px solid var(--border);transition:transform .1s}
.wu-valve:hover{transform:translateY(-2px)}
.wu-valve.closed{background:#eceff1;color:#607d8b}
.wu-valve.open{background:linear-gradient(180deg,#d3f5dd,#b6edc6);color:#1b7a37;border-color:#5cc97d}
.wu-valve.fault{background:#ffd9d9;color:#b71c1c;border-color:#ef4444;animation:pulse 1.2s infinite}
.wu-valve .dot{width:9px;height:9px;border-radius:50%;margin-bottom:4px}
.wu-led{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:middle}
.wu-led.off{background:#cfd8dc}.wu-led.on-r{background:var(--alarm);box-shadow:0 0 6px var(--alarm)}
.wu-fault{display:grid;grid-template-columns:78px 84px 1fr 92px;gap:8px;align-items:center;padding:9px 12px;background:#fff;border:1px solid var(--border);border-left:3px solid var(--alarm);border-radius:5px;margin-bottom:5px;font-size:12px}
.wu-fault.acked{opacity:.6}
.wu-fcode{font-family:'JetBrains Mono',monospace;font-weight:700}
.wu-ftime{font-family:'JetBrains Mono',monospace;color:var(--text-secondary)}
.wu-rec-grid{display:grid;grid-template-columns:.8fr 1.2fr;gap:14px}
@media(max-width:900px){.wu-rec-grid{grid-template-columns:1fr}}
.wu-rec{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border:1px solid var(--border);border-radius:7px;margin-bottom:7px;cursor:pointer;background:#fff}
.wu-rec:hover{border-color:var(--accent);background:var(--accent-bg)}
.wu-rec.editing{border-color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent)}
.wu-rec.active{background:var(--accent-bg)}
.wu-rec .arrow{color:var(--text-tertiary)}
.wu-step{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #f0f2f0}
.wu-step-lab{flex:1;font-weight:600;color:var(--text-secondary);font-size:13px}
.wu-step-val{min-width:96px;text-align:center;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:16px}
.wu-step-unit{font-size:10px;color:var(--text-secondary);margin-left:3px}
.wu-stepbtn{width:40px;height:40px;border-radius:8px;border:1px solid var(--border-strong);background:#fff;font-size:20px;font-weight:700;cursor:pointer;color:var(--accent);line-height:1}
.wu-stepbtn:hover{background:var(--accent-bg);border-color:var(--accent)}
.wu-rec-name{flex:1.6;padding:9px 10px;border:1px solid var(--border-strong);border-radius:6px;font-family:inherit;font-size:14px}
.wu-range{width:100%}
.wu-zones{display:grid;grid-template-columns:repeat(8,1fr);gap:5px;flex:1.6}
.wu-zone{text-align:center;padding:5px 0;border-radius:5px;border:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;cursor:pointer;background:#eceff1;color:#90a4ae;user-select:none}
.wu-zone.on{background:#c8f2d4;color:#1b7a37;border-color:#5cc97d}

}

function openSearch() {

}
function closeSearch() { $('searchOverlay').classList.remove('show'); }
function renderSearchResults(query) {
  const q = (query||'').trim().toLowerCase();
  const wrap = $('searchResults');
  if (!q) {
    wrap.innerHTML = '<div class="search-empty"><div style="font-weight:600;color:var(--text-primary);margin-bottom:6px;">Snel naar een instelling</div>Typ een I-nummer (bv. <kbd style="background:#F0F2F0;padding:1px 5px;border-radius:3px;font-family:monospace">I120</kbd>), alarmcode (bv. <kbd style="background:#F0F2F0;padding:1px 5px;border-radius:3px;font-family:monospace">154</kbd>) of onderwerp.</div>';
    return;
  }
  const hits = SEARCH_INDEX.filter(i => i.q.toLowerCase().includes(q) || i.label.toLowerCase().includes(q)).slice(0,15);
  if (hits.length===0) { wrap.innerHTML = `<div class="search-empty">Geen resultaten voor "${query}".</div>`; return; }
  wrap.innerHTML = hits.map((h,i) => `
    <div class="search-result" data-idx="${i}">
      <div>
        <div class="path">${h.isAlarm ?
          `<span style="font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--${h.sev});">${h.q}</span> · ${h.label.replace(/^Alarm \d+: /,'')}` :
          `<span style="font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--accent);">${h.q}</span> · <span style="color:var(--text-primary);font-weight:600;">${h.label}</span>`}</div>
        <div style="font-size:11px;color:var(--text-tertiary);margin-top:2px;">${h.path}</div>
      </div>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text-secondary);"><path d="M9 18l6-6-6-6"/></svg>
    </div>`).join('');
  wrap.querySelectorAll('.search-result').forEach((el,i) => el.addEventListener('click', () => gotoSearchHit(hits[i])));
}
function gotoSearchHit(h) { closeSearch(); setSection(h.sec); setTimeout(()=>setSide(h.side),50); toast(`Naar: ${h.label}`,'ok'); }

// === ALARMEN ===
function spawnAlarm(code, source) {
  const def = ALARM_DEFS[code]; if (!def) return;
  if (state.alarms.some(a => a.code===code && a.source===source)) return;
  state.alarms.unshift({id:state.nextAlarmId++, code, source, text:def.text, sev:def.sev, time:new Date(), acked:false});
  $('alarmDot').classList.add('active');
  toast(`⚠ ${code} — ${def.text} (${source})`, def.sev==='alarm'?'alarm':'warn');
}
function ackAlarm(id) {
  const a = state.alarms.find(x => x.id===id); if (!a) return;
  state.alarmHistory.unshift({...a, closedAt:new Date()});
  state.alarms = state.alarms.filter(x => x.id!==id);
  if (state.alarms.length===0) $('alarmDot').classList.remove('active');
  toast('Alarm gewist.','ok'); render();
}

// === SIMULATIE TICK ===
function tick() {
  const h = new Date().getHours() + new Date().getMinutes()/60;
  state.outdoor.temp = 18 + 5*Math.sin((h-7)*Math.PI/12) + (Math.random()-0.5)*0.4;
  state.outdoor.rad = clamp((h>5 && h<21) ? 600*Math.sin((h-6)*Math.PI/14) + (Math.random()-0.5)*40 : 0, 0, 900);
  state.outdoor.par = Math.round(state.outdoor.rad * 2.2);
  state.outdoor.parSumToday = clamp(state.outdoor.parSumToday + state.outdoor.par * 0.00002, 0, 60);
  state.outdoor.windSp = clamp(3.6 + (Math.random()-0.5)*1.6, 0, 12);
  state.compartments.forEach(c => {
    const heatD = (c.mwatT1 - 18) * 0.012;
    const ventD = -((c.ventNo + c.ventSo)/200) * Math.max(0, c.grhT - state.outdoor.temp) * 0.1;
    const radD = state.outdoor.rad * 0.0004;
    c.grhT = clamp(c.grhT + heatD + ventD + radD + (Math.random()-0.5)*0.08, 14, 35);
    c.rh = clamp(c.rh + (Math.random()-0.5)*0.6 + (c.grhT > c.sp_vent ? -0.3 : 0.3), 40, 95);
    c.ah = clamp(c.ah + (Math.random()-0.5)*0.2, 6, 22);
    c.hd = clamp(c.hd + (Math.random()-0.5)*0.2, 1, 18);
    c.co2 = clamp(c.co2 + (Math.random()-0.5)*8 - ((c.ventNo+c.ventSo)*0.4) + (h>=7&&h<19?30:0), 350, 1200);
    c.par = Math.round(state.outdoor.par * 0.85);
    c.parSum = clamp(c.parSum + c.par * 0.00002, 0, 60);
    c.ventT = clamp(c.sp_vent + (Math.random()-0.5)*0.4, 18, 30);
    if (c.grhT > c.sp_vent+1) { c.ventNo = clamp(c.ventNo+2, 0, 100); c.ventSo = clamp(c.ventSo+1, 0, 100); }
    else if (c.grhT < c.sp_vent-1) { c.ventNo = clamp(c.ventNo-2, 0, 100); c.ventSo = clamp(c.ventSo-1, 0, 100); }
    if (c.grhT < c.sp_heat) c.mwatT1 = clamp(c.mwatT1+0.4, 18, 70);
    else c.mwatT1 = clamp(c.mwatT1-0.2, 18, 70);
    c.history.push({t:Date.now(), v:c.co2});
    if (c.history.length > 60) c.history.shift();
    if (c.grhT > c.sp_vent+4) spawnAlarm(154, c.name);
    if (c.rh > 92) spawnAlarm(156, c.name);
    if (c.co2 < 400) spawnAlarm(159, c.name);
  });
  if (state.section!=='waterunit' || state.sideItem==='dashboard') render();
}

function closeWidget() { $('widgetOverlay').classList.remove('show'); }
function renderMiniChart(history) {
  if (!history || history.length<2) return '<text x="200" y="90" text-anchor="middle" fill="#999" font-size="12">Verzamelt data...</text>';
  const W=400,H=180,pad=20;
  const vals = history.map(p => p.v);
  const mn=Math.min(...vals)-20, mx=Math.max(...vals)+20;
  const xs = history.map((_,i)=> pad + i*(W-2*pad)/(history.length-1||1));
  const ys = history.map(p => H-pad - (p.v-mn)/(mx-mn)*(H-2*pad));
  let grid=''; for(let i=0;i<=4;i++){const y=pad+i*(H-2*pad)/4; grid+=`<line x1="${pad}" x2="${W-pad}" y1="${y}" y2="${y}" stroke="#E8EBE8"/>`;}
  return `${grid}<path d="${ys.map((y,i)=>(i?'L':'M')+xs[i]+' '+y).join(' ')}" fill="none" stroke="#1976D2" stroke-width="2"/>`;
}

// === RENDER MASTER ===
function render() {
  const sec = state.section, side = state.sideItem;
  const nav = SECTION_NAV[sec];
  const sideLabel = nav.side.find(s => s.id===side)?.label || '';
  $('crumb').innerHTML = `<a>${nav.label}</a><span class="sep">/</span><a>${sideLabel}</a>`;
  $('pageTitle').textContent = sideLabel==='Dashboard' ? nav.label : sideLabel;

  // Tab strip
  const tb = $('tabStrip');
  let tabs = [];
  if (sec==='climate' && side==='dashboard') {
    tabs = [{id:'overview',label:'Climate overview'},{id:'modlight',label:'Modulating light control'},{id:'visual',label:'Climate visual'},{id:'strategies',label:'Strategies'}];
    if (!tabs.find(t => t.id===state.innerTab)) state.innerTab='visual';
  } else if (sec==='water' && side==='dashboard') {
    tabs = [{id:'overview',label:'Water overview'}]; state.innerTab='overview';
  } else if (sec==='energy' && side==='dashboard') {
    tabs = [{id:'overview',label:'Energy overview'}]; state.innerTab='overview';
  } else if (sec==='general' && (side==='dashboard'||side==='weather')) {
    tabs = [{id:'overview',label:'Weather overview'}]; state.innerTab='overview';
  }
  if (tabs.length) {
    tb.style.display='flex';
    tb.innerHTML = tabs.map(t => `<div class="tab ${t.id===state.innerTab?'active':''}" data-tab="${t.id}">${t.label}</div>`).join('');
    tb.querySelectorAll('.tab').forEach(el => el.addEventListener('click', () => { state.innerTab=el.dataset.tab; render(); }));
  } else { tb.style.display='none'; }

  // Content
  const area = $('contentArea');
  if (sec==='home') area.innerHTML = renderHome();
  else if (sec==='climate') {
    if (side==='dashboard') {
      if (state.innerTab==='visual') area.innerHTML = renderClimateVisual();
      else if (state.innerTab==='overview') area.innerHTML = renderClimateOverview();
      else if (state.innerTab==='modlight') area.innerHTML = renderModLight();
      else area.innerHTML = renderStrategies();
    }
    else if (side==='modlight') area.innerHTML = renderModLight();
    else if (['ventilation','heating','curtain','co2','h24','lighting'].includes(side)) area.innerHTML = renderCropsList(sideLabel);
    else area.innerHTML = renderGenericSettings(sideLabel);
  }
  else if (sec==='water') {
    if (side==='dashboard') area.innerHTML = renderWaterOverview();
    else if (side==='recipe') area.innerHTML = renderRecipes();
    else area.innerHTML = renderGenericSettings(sideLabel);
  }
  else if (sec==='energy') {
    if (side==='dashboard') area.innerHTML = renderEnergyOverview();
    else area.innerHTML = renderGenericSettings(sideLabel);
  }
  else if (sec==='general') {
    if (side==='dashboard'||side==='weather') area.innerHTML = renderWeather();
    else if (side==='alarms') area.innerHTML = renderAlarmsView();
    else if (side==='periodshift') area.innerHTML = renderPeriodShift();
    else area.innerHTML = renderGenericSettings(sideLabel);
  }
  else if (sec==='waterunit') {
    area.innerHTML = renderWaterUnit(side);
  }

  // Event handlers voor list-rows
  area.querySelectorAll('.li-row[data-comp]').forEach(el => {
    el.addEventListener('click', () => {
      area.innerHTML = renderCompartmentDetail(parseInt(el.dataset.comp), $('pageTitle').textContent);
    });
  });
  area.querySelectorAll('.li-row[data-crop]').forEach(el => {
    el.addEventListener('click', () => {
      area.innerHTML = renderCropDetail(el.dataset.crop, $('pageTitle').textContent);
    });
  });
  area.querySelectorAll('.li-row[data-recipe]').forEach(el => {
    el.addEventListener('click', () => {
      area.innerHTML = renderRecipeDetail(parseInt(el.dataset.recipe));
    });
  });
  if (state.section==='waterunit' && state.sideItem==='dashboard') mountWU3D();
}

// ===================== WATER UNIT — visueel testdashboard =====================
const WU_FAULTDEF = [
  {code:'E01', sev:'alarm', text:'Noodstop actief — installatie veilig gestopt'},
  {code:'E10', sev:'alarm', text:'Niveausensor Tank A: signaal < 4 mA (kabelbreuk)'},
  {code:'E11', sev:'alarm', text:'Niveausensor Tank B: signaal < 4 mA (kabelbreuk)'},
  {code:'W20', sev:'warn',  text:'Tank A: max-levelswitch actief'},
  {code:'W21', sev:'warn',  text:'Tank B: max-levelswitch actief'},
  {code:'E20', sev:'alarm', text:'Tank A: TE VOL — overloopbeveiliging'},
  {code:'E21', sev:'alarm', text:'Tank B: TE VOL — overloopbeveiliging'},
  {code:'W30', sev:'warn',  text:'Tank A: laag niveau'},
  {code:'W31', sev:'warn',  text:'Tank B: laag niveau'},
  {code:'E30', sev:'alarm', text:'Tank A: LEEG — droogloopgevaar'},
  {code:'E31', sev:'alarm', text:'Tank B: LEEG — droogloopgevaar'},
  {code:'E60', sev:'alarm', text:'Pomp A: overbelasting / motorstoring'},
  {code:'E61', sev:'alarm', text:'Pomp B: overbelasting / motorstoring'},
  {code:'E70', sev:'alarm', text:'Doseertijd overschreden — klep te lang open (lek/sensorfout)'},
  {code:'W80', sev:'warn',  text:'EC buiten bereik'},
  {code:'W81', sev:'warn',  text:'pH buiten bereik'}
];
const WU_SEV_BORDER = {alarm:'var(--alarm)', warn:'var(--warn)', status:'var(--link)'};
let WU3 = {inited:false, ok:false, valves:[]};

function WU_INIT(){
  const valves=[];
  for(let i=1;i<=16;i++) valves.push({id:i,name:'V'+String(i).padStart(2,'0'),st:'closed'});
  return {
    mode:'stop', estop:false, demo:true, phase:'fill', seq:-1,
    valves,
    tankA:{label:'Meststof A', lvl:48, mA:0, max:false, over:false, empty:false, hold:false, sensorFault:false},
    tankB:{label:'Meststof B', lvl:39, mA:0, max:false, over:false, empty:false, hold:false, sensorFault:false},
    pumpA:{on:false,fault:false,freq:0},
    pumpB:{on:false,fault:false,freq:0},
    ec:2.1, ph:5.8, flow:0,
    recipes:[
      {id:1,name:'Standaard groei', ec:2.1, ph:5.8, ratioA:60, volume:250, flow:6.0, zones:Array(16).fill(true)},
      {id:2,name:'Stek / jong gewas', ec:1.4, ph:5.9, ratioA:55, volume:150, flow:4.5, zones:Array.from({length:16},(_,i)=>i<8)},
      {id:3,name:'Bloei / hoog EC', ec:2.7, ph:5.6, ratioA:65, volume:300, flow:7.0, zones:Array(16).fill(true)}
    ],
    activeRecipe:1, editId:1, recId:4,
    faults:[], log:[]
  };
}

function wuMA(t){ t.mA = t.sensorFault ? 0 : +(4 + t.lvl/100*16).toFixed(1); }
function wuTankAlarm(t){ return t.over || t.empty; }

function wuFdef(code){
  const d=WU_FAULTDEF.find(x=>x.code===code); if(d) return d;
  const i=parseInt(code.slice(1))-40; const v=state.wu.valves[i];
  return {code, sev:'alarm', text:'Klep '+(v?v.name:'?')+': geen terugkoppeling / klepstoring'};
}
function wuSetFault(code, active){
  const w=state.wu, idx=w.faults.findIndex(f=>f.code===code);
  if(active && idx<0){ const d=wuFdef(code); const f={code:d.code,sev:d.sev,text:d.text,t:new Date()}; w.faults.unshift(f); w.log.unshift({...f}); if(w.log.length>50)w.log.pop(); }
  else if(!active && idx>=0) w.faults.splice(idx,1);
}
function wuEvalFaults(){
  const w=state.wu, A=w.tankA, B=w.tankB;
  wuSetFault('E01', w.estop);
  wuSetFault('E10', A.sensorFault);
  wuSetFault('E11', B.sensorFault);
  wuSetFault('W20', !A.sensorFault && A.max && !A.over);
  wuSetFault('W21', !B.sensorFault && B.max && !B.over);
  wuSetFault('E20', A.over);
  wuSetFault('E21', B.over);
  wuSetFault('W30', !w.estop && !A.sensorFault && !A.empty && A.lvl<15 && A.lvl>6);
  wuSetFault('W31', !w.estop && !B.sensorFault && !B.empty && B.lvl<15 && B.lvl>6);
  wuSetFault('E30', A.empty);
  wuSetFault('E31', B.empty);
  wuSetFault('E60', w.pumpA.fault);
  wuSetFault('E61', w.pumpB.fault);
  wuSetFault('W80', !w.estop && (w.ec>2.8 || w.ec<1.5));
  wuSetFault('W81', !w.estop && (w.ph>6.4 || w.ph<5.2));
  w.valves.forEach((v,i)=> wuSetFault('E'+(40+i), v.st==='fault'));
}
function wuStatus(){
  const w=state.wu;
  if(w.estop) return {t:'NOODSTOP',cls:'alarm'};
  if(w.faults.some(f=>f.sev==='alarm')) return {t:'STORING',cls:'alarm'};
  if(w.faults.some(f=>f.sev==='warn')) return {t:'WAARSCHUWING',cls:'warn'};
  if(w.mode==='stop') return {t:'GESTOPT',cls:'status'};
  return {t:'IN BEDRIJF',cls:'ok'};
}

function wuStep(){
  const w=state.wu, A=w.tankA, B=w.tankB;
  wuMA(A); wuMA(B);
  if(w.estop || w.mode==='stop'){
    w.valves.forEach(v=>{ if(v.st!=='fault') v.st='closed'; });
    w.pumpA.on=false; w.pumpB.on=false; w.pumpA.freq=0; w.pumpB.freq=0; w.flow=0;
  } else if(w.mode==='run' && w.demo){
    if(w.phase==='fill'){
      // VULLEN: pomp aan, kleppen openen OM DE BEURT en vullen zo de bakken geleidelijk
      w.pumpA.on=!w.pumpA.fault; w.pumpB.on=!w.pumpB.fault;
      w.pumpA.freq=w.pumpA.on?46+Math.round(Math.random()*6):0;
      w.pumpB.freq=w.pumpB.on?45+Math.round(Math.random()*6):0;
      w.seq=(w.seq+1)%w.valves.length;
      w.valves.forEach((v,idx)=>{ if(v.st==='fault') return; v.st=(idx===w.seq)?'open':'closed'; });
      const pumping=w.pumpA.on||w.pumpB.on;
      if(pumping && !A.hold && !A.sensorFault && A.lvl<95) A.lvl=clamp(A.lvl+2.0,0,100);
      if(pumping && !B.hold && !B.sensorFault && B.lvl<95) B.lvl=clamp(B.lvl+1.8,0,100);
      const _arf=wuRec(w.activeRecipe); w.flow=pumping?+((_arf?_arf.flow:6)+(Math.random()-0.5)*0.6).toFixed(1):0;
      if(A.lvl>=92 && B.lvl>=92) w.phase='drain';
    } else {
      // AFNAME: kleppen dicht, pompen uit, bakken zakken door verbruik — daarna opnieuw vullen
      w.valves.forEach(v=>{ if(v.st!=='fault') v.st='closed'; });
      w.pumpA.on=false; w.pumpB.on=false; w.pumpA.freq=0; w.pumpB.freq=0;
      if(!A.hold && !A.sensorFault && A.lvl>8) A.lvl=clamp(A.lvl-2.2,0,100);
      if(!B.hold && !B.sensorFault && B.lvl>8) B.lvl=clamp(B.lvl-2.0,0,100);
      w.flow=+(2+Math.random()*1).toFixed(1);
      if(A.lvl<=22 && B.lvl<=22) w.phase='fill';
    }
    const _ar=wuRec(w.activeRecipe), _ect=_ar?_ar.ec:2.1, _pht=_ar?_ar.ph:5.8;
    w.ec=clamp(w.ec+(_ect-w.ec)*0.15+(Math.random()-0.5)*0.04,1.0,3.4);
    w.ph=clamp(w.ph+(_pht-w.ph)*0.15+(Math.random()-0.5)*0.04,4.6,6.9);
  }
  // niveau-condities
  A.over=A.lvl>=98; A.empty=A.lvl<=4; A.max=A.lvl>=95;
  B.over=B.lvl>=98; B.empty=B.lvl<=4; B.max=B.lvl>=95;
  wuEvalFaults();
  if(state.section==='waterunit' && state.sideItem==='dashboard') render();
}

// --- controls ---
function wuStart(){ state.wu.estop=false; state.wu.mode='run'; toast('Water Unit gestart','ok'); wuEvalFaults(); render(); }
function wuStop(){ state.wu.mode='stop'; toast('Water Unit gestopt','warn'); render(); }
function wuEstop(){ const w=state.wu; w.estop=!w.estop; if(w.estop) w.mode='stop'; toast(w.estop?'NOODSTOP ingedrukt':'Noodstop gereset', w.estop?'alarm':'ok'); wuEvalFaults(); render(); }
function wuToggleDemo(){ state.wu.demo=!state.wu.demo; toast('Auto-demo '+(state.wu.demo?'AAN':'UIT'),'ok'); render(); }
function wuResetFaults(){ const w=state.wu;
  w.valves.forEach(v=>{ if(v.st==='fault') v.st='closed'; });
  w.pumpA.fault=false; w.pumpB.fault=false;
  w.tankA.sensorFault=false; w.tankB.sensorFault=false; w.tankA.hold=false; w.tankB.hold=false;
  if(w.tankA.lvl>=96) w.tankA.lvl=80; if(w.tankA.lvl<=6) w.tankA.lvl=40;
  if(w.tankB.lvl>=96) w.tankB.lvl=65; if(w.tankB.lvl<=6) w.tankB.lvl=35;
  w.estop=false; w.tankA.over=w.tankA.empty=false; w.tankB.over=w.tankB.empty=false;
  wuEvalFaults(); toast('Storingen gereset','ok'); render(); }
function wuInject(){ const w=state.wu; const opts=['valve','pumpA','pumpB','sensorA','sensorB','tankAvol','tankBleeg']; const p=opts[Math.floor(Math.random()*opts.length)];
  if(p==='valve'){ const i=Math.floor(Math.random()*16); w.valves[i].st='fault'; }
  else if(p==='pumpA') w.pumpA.fault=true; else if(p==='pumpB') w.pumpB.fault=true;
  else if(p==='sensorA') w.tankA.sensorFault=true; else if(p==='sensorB') w.tankB.sensorFault=true;
  else if(p==='tankAvol'){ w.tankA.lvl=100; w.tankA.hold=true; }
  else if(p==='tankBleeg'){ w.tankB.lvl=1; w.tankB.hold=true; }
  w.tankA.over=w.tankA.lvl>=98; w.tankA.empty=w.tankA.lvl<=4; w.tankB.over=w.tankB.lvl>=98; w.tankB.empty=w.tankB.lvl<=4;
  wuEvalFaults(); toast('Demo-storing geinjecteerd','warn'); render(); }
function wuToggleValve(i){ const v=state.wu.valves[i]; if(v.st==='fault') v.st='closed'; else v.st=v.st==='open'?'closed':'open'; wuEvalFaults(); render(); }

function renderWaterUnit(side){

function renderWUDash(){
  const w=state.wu, s=wuStatus(), ar=wuRec(w.activeRecipe);
  const alarms=w.faults.filter(f=>f.sev==='alarm').length, warns=w.faults.filter(f=>f.sev==='warn').length;
  const tank=(t,key)=>{
    const alarm=wuTankAlarm(t), grey=t.sensorFault;
    const fillBg = alarm ? 'linear-gradient(180deg,#ff6b6b,#c62828)' : grey ? 'linear-gradient(180deg,#cfd8dc,#90a4ae)' : (key==='A'?'linear-gradient(180deg,#66bb6a,#2e7d32)':'linear-gradient(180deg,#42a5f5,#1565c0)');
    const tag = t.over?'<span style="color:var(--alarm);font-weight:700;"> · TE VOL</span>' : t.empty?'<span style="color:var(--alarm);font-weight:700;"> · LEEG</span>' : grey?'<span style="color:var(--alarm);font-weight:700;"> · SENSORFOUT</span>' : '';
    return `<div class="wu-tank" style="${(alarm||grey)?'border-color:var(--alarm);box-shadow:inset 0 0 0 1px var(--alarm);':''}">
      <div class="wu-gauge"><div class="fill" style="height:${grey?0:t.lvl}%;background:${fillBg};"></div>
        ${[25,50,75].map(m=>`<div style="position:absolute;left:0;right:0;bottom:${m}%;border-top:1px dashed rgba(0,0,0,.12);"></div>`).join('')}
        <div style="position:absolute;left:0;right:0;bottom:95%;border-top:1px solid var(--alarm);opacity:.5;"></div></div>
      <div style="flex:1;">
        <div style="font-weight:700;margin-bottom:4px;">Tank ${key} <span style="color:var(--text-secondary);font-weight:500;">· ${t.label}</span>${tag}</div>
        <div class="kv"><span class="k">Niveau</span><span class="v" style="${alarm?'color:var(--alarm)':''}">${grey?'—':Math.round(t.lvl)+' %'}</span></div>
        <div class="kv"><span class="k">Hoogte</span><span class="v">${grey?'—':Math.round(t.lvl/100*1000)+' mm'}</span></div>
        <div class="kv"><span class="k">Sensor 4-20 mA</span><span class="v" style="${grey?'color:var(--alarm)':''}">${t.mA.toFixed(1)} mA</span></div>
        <div class="kv" style="border:none;"><span class="k">Max-levelswitch</span><span class="v"><span class="wu-led ${t.max?'on-r':'off'}"></span>${t.max?'ACTIEF':'open'}</span></div>
      </div>

// --- recepten ---
function wuRec(id){ return state.wu.recipes.find(r=>r.id===id); }
function wuRecEdit(id){ state.wu.editId=id; render(); }
function wuRecField(field,d,min,max){ const r=wuRec(state.wu.editId); if(!r) return; r[field]=clamp(+( (r[field]+d).toFixed(2) ),min,max); render(); }
function wuRecRatio(v){ const r=wuRec(state.wu.editId); if(r){ r.ratioA=clamp(Math.round(+v),0,100); render(); } }
function wuRecName(v){ const r=wuRec(state.wu.editId); if(r) r.name=v; }
function wuRecZone(i){ const r=wuRec(state.wu.editId); if(!r) return; r.zones[i]=!r.zones[i]; render(); }
function wuRecActivate(id){ state.wu.activeRecipe=id; const r=wuRec(id); toast('Recept "'+(r?r.name:'')+'" geactiveerd','ok'); render(); }
function wuRecNew(){ const w=state.wu, b=wuRec(w.editId)||w.recipes[0];
  const nr={id:w.recId++, name:'Nieuw recept', ec:b?b.ec:2.0, ph:b?b.ph:5.8, ratioA:b?b.ratioA:60, volume:b?b.volume:200, flow:b?b.flow:6.0, zones:b?b.zones.slice():Array(16).fill(true)};
  w.recipes.push(nr); w.editId=nr.id; toast('Nieuw recept — pas aan en activeer','ok'); render(); }
function wuRecDup(id){ const w=state.wu, b=wuRec(id); const nr={...b, id:w.recId++, name:b.name+' (kopie)', zones:b.zones.slice()}; w.recipes.push(nr); w.editId=nr.id; toast('Recept gekopieerd','ok'); render(); }
function wuRecDelete(id){ const w=state.wu; if(w.recipes.length<=1){ toast('Minimaal één recept vereist','warn'); return; }
  w.recipes=w.recipes.filter(r=>r.id!==id); if(w.activeRecipe===id) w.activeRecipe=w.recipes[0].id; if(w.editId===id) w.editId=w.recipes[0].id; toast('Recept verwijderd','ok'); render(); }

// --- 3D scene (Three.js) ---
function initWU3D(){
  if(WU3.inited) return; WU3.inited=true;
  if(typeof THREE==='undefined'){ WU3.ok=false; return; }
  try{
    const renderer=new THREE.WebGLRenderer({antialias:true, alpha:true});
    renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,2));
    renderer.setSize(600,300);
    const scene=new THREE.Scene();
    const camera=new THREE.PerspectiveCamera(40,2,0.1,100);
    camera.position.set(3.0,2.8,9.0); camera.lookAt(0,1.55,0.5);
    scene.add(new THREE.AmbientLight(0xffffff,0.7));
    const d1=new THREE.DirectionalLight(0xffffff,0.85); d1.position.set(6,10,6); scene.add(d1);
    const d2=new THREE.DirectionalLight(0x88bbff,0.35); d2.position.set(-6,4,-5); scene.add(d2);
    const grp=new THREE.Group(); scene.add(grp);
    const frameMat=new THREE.MeshStandardMaterial({color:0xb9c2ca, metalness:0.6, roughness:0.4});
    const FW=6, FD=3.2, FH=4, t=0.12;
    function bar(x,y,z,w,h,dd){ const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,dd),frameMat); m.position.set(x,y,z); grp.add(m); }
    [[-FW/2,-FD/2],[FW/2,-FD/2],[-FW/2,FD/2],[FW/2,FD/2]].forEach(p=>bar(p[0],FH/2,p[1],t,FH,t));
    [-FD/2,FD/2].forEach(z=>{ bar(0,FH,z,FW,t,t); bar(0,0.02,z,FW,t,t); });
    [-FW/2,FW/2].forEach(x=>{ bar(x,FH,0,t,t,FD); bar(x,0.02,0,t,t,FD); });
    [[-FW/2,-FD/2],[FW/2,-FD/2],[-FW/2,FD/2],[FW/2,FD/2]].forEach(p=>bar(p[0],-0.45,p[1],t,0.9,t));
    const pipeMat=new THREE.MeshStandardMaterial({color:0x9aa6b0,metalness:0.7,roughness:0.35});
    function tank(x){
      const g=new THREE.Group();
      g.add(new THREE.Mesh(new THREE.BoxGeometry(2.2,2.6,2.4), new THREE.MeshStandardMaterial({color:0xffffff,transparent:true,opacity:0.15,roughness:0.05})));
      const fill=new THREE.Mesh(new THREE.BoxGeometry(2.0,1,2.2), new THREE.MeshStandardMaterial({color:0x43a047,transparent:true,opacity:0.82,roughness:0.3}));
      g.add(fill);
      const surf=new THREE.Mesh(new THREE.PlaneGeometry(2.0,2.2,16,16), new THREE.MeshStandardMaterial({color:0x43a047,transparent:true,opacity:0.92,roughness:0.15,side:THREE.DoubleSide}));
      surf.rotation.x=-Math.PI/2; g.add(surf);
      g.position.set(x,1.55,0); grp.add(g);
      return {fill,surf};
    }
    const tA=tank(-1.45), tB=tank(1.45);
    WU3.fillA=tA.fill; WU3.surfA=tA.surf; WU3.fillB=tB.fill; WU3.surfB=tB.surf;
    const pipe=new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.12,FW-0.5,16),pipeMat);
    pipe.rotation.z=Math.PI/2; pipe.position.set(0,0.55,FD/2-0.25); grp.add(pipe);
    WU3.valves=[];
    const n=16, span=FW-0.9;
    for(let i=0;i<n;i++){
      const x=-span/2 + i*(span/(n-1));
      const body=new THREE.Mesh(new THREE.CylinderGeometry(0.085,0.085,0.5,12), new THREE.MeshStandardMaterial({color:0x5a6b7a,roughness:0.5}));
      body.position.set(x,0.28,FD/2-0.25); grp.add(body);
      const tip=new THREE.Mesh(new THREE.SphereGeometry(0.075,10,10), new THREE.MeshStandardMaterial({color:0x5a6b7a}));
      tip.position.set(x,0.0,FD/2-0.25); grp.add(tip);
      WU3.valves.push({body,tip});
    }
    function pump(x){
      const g=new THREE.Group();
      const body=new THREE.Mesh(new THREE.CylinderGeometry(0.27,0.27,0.78,20), new THREE.MeshStandardMaterial({color:0x37474f,metalness:0.5,roughness:0.45,emissive:0x000000}));
      body.rotation.z=Math.PI/2; g.add(body);
      const cap=new THREE.Mesh(new THREE.SphereGeometry(0.28,16,12), new THREE.MeshStandardMaterial({color:0x2b363c,metalness:0.4,roughness:0.5}));
      cap.position.set(-0.42,0,0); g.add(cap);
      const fp=new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.06,0.95,12), pipeMat);
      fp.position.set(0,-0.6,0); g.add(fp);
      g.position.set(x,1.5,FD/2-0.05); grp.add(g);
      return body;
    }
    WU3.pumpA=pump(-1.45); WU3.pumpB=pump(1.45);
    WU3.renderer=renderer; WU3.scene=scene; WU3.camera=camera; WU3.grp=grp; WU3.canvas=renderer.domElement;
    WU3.rot=0; WU3.ok=true;
    let drag=false, px=0;
    renderer.domElement.style.touchAction='none';
    renderer.domElement.addEventListener('pointerdown',e=>{drag=true;px=e.clientX;});
    window.addEventListener('pointerup',()=>{drag=false;});
    window.addEventListener('pointermove',e=>{ if(drag){ WU3.rot=Math.max(-0.55,Math.min(0.55, WU3.rot+(e.clientX-px)*0.008)); px=e.clientX; }});
    animateWU3D();
  }catch(err){ WU3.ok=false; }
}
function wuTankCol(t, base){ if(t.over||t.empty) return 0xef4444; if(t.sensorFault) return 0x9e9e9e; return base; }
function wuRipple(surf, dispLvl, col, time){
  const fh=Math.max(0.04, dispLvl/100*2.4);
  surf.position.y = -1.2 + fh;
  const pos=surf.geometry.attributes.position;
  for(let i=0;i<pos.count;i++){
    const x=pos.getX(i), y=pos.getY(i);
    pos.setZ(i, Math.sin(x*1.9+time*1.7)*0.035 + Math.cos(y*1.6+time*1.25)*0.03);
  }
  pos.needsUpdate=true;
  surf.material.color.setHex(col);
}
function wuSetFill(mesh,lvl,col){ const fh=Math.max(0.04, lvl/100*2.4); mesh.scale.y=fh; mesh.position.y=-1.2+fh/2; mesh.material.color.setHex(col); }
function animateWU3D(){
  WU3.raf=requestAnimationFrame(animateWU3D);
  if(!WU3.ok) return;
  if(state.section!=='waterunit' || state.sideItem!=='dashboard') return;
  WU3.grp.rotation.y=WU3.rot;
  const w=state.wu, time=performance.now()/1000;
  const lvA=w.tankA.sensorFault?6:w.tankA.lvl, lvB=w.tankB.sensorFault?6:w.tankB.lvl;
  const cA=wuTankCol(w.tankA,0x43a047), cB=wuTankCol(w.tankB,0x1e88e5);
  wuSetFill(WU3.fillA, lvA, cA); wuSetFill(WU3.fillB, lvB, cB);
  wuRipple(WU3.surfA, lvA, cA, time); wuRipple(WU3.surfB, lvB, cB, time);
  w.valves.forEach((v,i)=>{ const m=WU3.valves[i]; if(!m) return;
    const c = v.st==='open'?0x35d07f : v.st==='fault'?0xef4444 : 0x5a6b7a;
    const e = v.st==='open'?0x0c3d22 : v.st==='fault'?0x4a0a0a : 0x000000;
    m.body.material.color.setHex(c); m.tip.material.color.setHex(c);
    if(m.body.material.emissive) m.body.material.emissive.setHex(e);
  });
  const pglow=(m,p)=>{ const c=p.fault?0xef4444:p.on?0x35d07f:0x37474f; const e=p.fault?0x5a0a0a:p.on?0x0c3d22:0x000000; m.material.color.setHex(c); if(m.material.emissive) m.material.emissive.setHex(e); };
  pglow(WU3.pumpA,w.pumpA); pglow(WU3.pumpB,w.pumpB);
  WU3.renderer.render(WU3.scene,WU3.camera);
}
function mountWU3D(){
  const host=$('wu3d'); if(!host) return;
  if(!WU3.inited) initWU3D();
  if(WU3.ok && WU3.canvas){
    if(WU3.canvas.parentNode!==host){ host.innerHTML=''; host.appendChild(WU3.canvas); }
    const ww=host.clientWidth||600, hh=host.clientHeight||420;
    WU3.renderer.setSize(ww,hh); WU3.camera.aspect=ww/hh; WU3.camera.updateProjectionMatrix();
  } else if(!WU3.ok){
    host.innerHTML='<div class="wu-fallback">3D-weergave niet beschikbaar in deze browser — gebruik het visuele klep- en tankoverzicht hieronder.</div>';
  }
}
