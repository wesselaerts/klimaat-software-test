<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Cogas AutoFill — Bedieningsdashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   COGAS AUTOFILL — DESIGN TOKENS
   Licht thema. Koel-getinte neutralen. Kleur = betekenis.
   Merkrood alleen in het logo; functioneel accent = blauw.
   ============================================================ */
:root{
  /* neutralen (koel) */
  --c-canvas:#EBF0EC;
  --c-surface:#FFFFFF;
  --c-sunken:#F1F6F1;
  --c-line:#E0E7E0;
  --c-line-2:#C7D1C7;
  --ink:#19241D;
  --ink-2:#506159;
  --ink-3:#86958B;
  --ink-inv:#FFFFFF;

  /* functioneel accent (blauw) */
  --acc:#1C6E45;
  --acc-600:#155737;
  --acc-700:#0F4429;
  --acc-100:#CDE7D6;
  --acc-50:#E9F4ED;

  /* merk (Cogas rood) — uitsluitend logo-accent */
  --brand:#1F6B4A;
  --brand-dark:#154833;
  --brand-mid:#2A6F50;
  --brand-light:#4D8E6E;
  --brand-grad:linear-gradient(135deg,#154833 0%,#27674A 52%,#4D8E6E 100%);

  /* status — altijd met icoon + label (kleurenblind-veilig) */
  --ok:#1C7A4D;      --ok-bg:#E9F4ED;   --ok-line:#BBE0C8;
  --warn:#B26A00;    --warn-bg:#FBF0DC;  --warn-line:#F0D49A;
  --alarm:#CE3A2C;   --alarm-bg:#FBE7E4; --alarm-line:#F2C0B9;
  --info:#2E6E8E;    --info-bg:#E8F0F4;  --info-line:#C3DAE6;
  --idle:#94A3B4;    --idle-bg:#EEF2F6;

  /* proceskleuren A / B (rustig, onderscheidbaar, ≠ status) */
  --a:#2E6E8E;  --a-soft:#9CC1D1;  --a-bg:#E7F0F4;
  --b:#6A5FB0;  --b-soft:#BDB4E2;  --b-bg:#EDEBF7;

  /* radii */
  --r-sm:7px; --r-md:11px; --r-lg:16px; --r-xl:22px; --r-pill:999px;

  /* schaduw (gelaagd, subtiel) */
  --sh-1:0 1px 2px rgba(18,38,26,.06);
  --sh-2:0 1px 2px rgba(18,38,26,.06), 0 2px 6px rgba(18,38,26,.05);
  --sh-3:0 2px 5px rgba(18,38,26,.06), 0 10px 24px rgba(18,38,26,.09);
  --sh-4:0 8px 18px rgba(18,38,26,.12), 0 28px 60px rgba(18,38,26,.22);
  /* motion */
  --dur-fast:120ms; --dur:200ms; --dur-slow:300ms;
  --ease:cubic-bezier(.4,0,.2,1);
  --ease-out:cubic-bezier(.16,1,.3,1);
  --ease-in:cubic-bezier(.4,0,1,1);
  --spring:cubic-bezier(.34,1.4,.64,1);

  /* maatvoering */
  --topbar-h:60px;
  --rail-w:248px;
  --rail-w-collapsed:76px;

  --font:"IBM Plex Sans", ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
  --mono:"IBM Plex Mono", ui-monospace, "SF Mono", Menlo, monospace;
}

*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  font-family:var(--font);
  font-size:14px;
  line-height:1.45;
  color:var(--ink);
  background:var(--c-canvas);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
.num{font-family:var(--mono);font-variant-numeric:tabular-nums}
h1,h2,h3,h4{margin:0;font-weight:600;letter-spacing:-.01em}
button{font-family:inherit}
::selection{background:var(--acc-100)}

/* scrollbars */
*{scrollbar-width:thin;scrollbar-color:var(--c-line-2) transparent}
*::-webkit-scrollbar{width:10px;height:10px}
*::-webkit-scrollbar-thumb{background:var(--c-line-2);border-radius:99px;border:3px solid var(--c-canvas)}
*::-webkit-scrollbar-thumb:hover{background:var(--ink-3)}

/* ============================================================ TOPBAR */
.topbar{
  position:fixed; inset:0 0 auto 0; height:var(--topbar-h); z-index:60;
  display:flex; align-items:center; gap:14px;
  padding:0 16px;
  background:rgba(255,255,255,.86);
  backdrop-filter:saturate(1.4) blur(10px);
  border-bottom:1px solid var(--c-line);
}
.topbar.estop{box-shadow:inset 0 -3px 0 var(--alarm)}
.tb-burger{
  display:none; width:42px;height:42px;border:none;background:transparent;
  border-radius:var(--r-sm); color:var(--ink-2); cursor:pointer; align-items:center;justify-content:center;
}
.tb-burger:hover{background:var(--c-sunken)}
.brand{display:flex;align-items:center;gap:11px;min-width:0;flex:0 1 auto;overflow:hidden}
.brand-logo{display:flex;align-items:center;gap:2px;font-weight:700;font-size:19px;letter-spacing:-.03em;color:var(--ink)}
.brand-logo .dot{width:9px;height:9px;border-radius:2px;background:var(--brand);display:inline-block;transform:translateY(1px);margin-left:3px}
.brand-sep{width:1px;height:24px;background:var(--c-line-2);margin:0 2px}
.brand-machine{display:flex;flex-direction:column;line-height:1.15;min-width:0}
.brand-machine .m{font-weight:600;font-size:13.5px}
.brand-machine .u{font-size:11px;color:var(--ink-3)}
.brand-machine .u .mono{font-size:11px}
.tb-spacer{flex:1}
.tb-cluster{display:flex;align-items:center;gap:8px;flex-shrink:0}
.tb-conn{display:flex;align-items:center;gap:7px;padding:6px 11px;border:1px solid var(--c-line);border-radius:var(--r-pill);background:var(--c-surface);font-size:12.5px;color:var(--ink-2);white-space:nowrap}
.tb-conn .pulse{width:8px;height:8px;border-radius:50%;background:var(--ok);position:relative}
.tb-conn .pulse::after{content:"";position:absolute;inset:-4px;border-radius:50%;border:1px solid var(--ok);opacity:.6;animation:ping 2.4s ease-out infinite}
@keyframes ping{0%{transform:scale(.6);opacity:.6}80%,100%{transform:scale(1.7);opacity:0}}
.tb-conn.off .pulse{background:var(--alarm)} .tb-conn.off .pulse::after{border-color:var(--alarm)}
.tb-clock{font-size:12.5px;color:var(--ink-2);text-align:right;line-height:1.15;white-space:nowrap}
.tb-clock .t{font-weight:600;color:var(--ink);font-size:14px}
.tb-clock .d{font-size:11px;color:var(--ink-3)}
.tb-bell{position:relative;width:42px;height:42px;border:1px solid var(--c-line);background:var(--c-surface);border-radius:var(--r-sm);color:var(--ink-2);cursor:pointer;display:flex;align-items:center;justify-content:center}
.tb-bell:hover{background:var(--c-sunken);color:var(--ink)}
.tb-bell .cnt{position:absolute;top:-6px;right:-6px;min-width:19px;height:19px;padding:0 5px;border-radius:99px;background:var(--alarm);color:#fff;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;border:2px solid var(--c-surface)}
.tb-bell.q .cnt{background:var(--warn)}
.tb-bell.none .cnt{display:none}

/* role segmented */
.roles{display:inline-flex;background:var(--c-sunken);border:1px solid var(--c-line);border-radius:var(--r-pill);padding:3px}
.roles button{border:none;background:transparent;padding:7px 13px;border-radius:var(--r-pill);font-size:12.5px;font-weight:500;color:var(--ink-2);cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap}
.roles button .ic{display:flex}
.roles button[aria-pressed="true"]{background:var(--c-surface);color:var(--ink);box-shadow:var(--sh-1);font-weight:600}
.roles button:not([aria-pressed="true"]):hover{color:var(--ink)}

/* ============================================================ LAYOUT */
.shell{display:flex;min-height:100vh;padding-top:var(--topbar-h)}
.rail{
  position:fixed;left:0;top:var(--topbar-h);bottom:0;width:var(--rail-w);z-index:40;
  background:var(--c-surface);border-right:1px solid var(--c-line);
  display:flex;flex-direction:column;padding:14px 12px;gap:3px;overflow-y:auto;
  transition:transform .25s ease;
}
.rail-group-label{font-size:10.5px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-3);padding:14px 12px 6px}
.nav-item{
  display:flex;align-items:center;gap:12px;width:100%;
  padding:11px 12px;border-radius:var(--r-md);border:none;background:transparent;
  color:var(--ink-2);font-size:14px;font-weight:500;cursor:pointer;text-align:left;position:relative;
  min-height:46px;
}
.nav-item .ic{display:flex;flex:0 0 22px;color:var(--ink-3)}
.nav-item .lbl{flex:1;white-space:nowrap;overflow:hidden}
.nav-item .tag{font-size:10.5px;font-weight:600;color:var(--ink-3)}
.nav-item:hover{background:var(--c-sunken);color:var(--ink)}
.nav-item:hover .ic{color:var(--ink-2)}
.nav-item[aria-current="page"]{background:var(--acc-50);color:var(--acc-700);font-weight:600}
.nav-item[aria-current="page"] .ic{color:var(--acc)}
.nav-item[aria-current="page"]::before{content:"";position:absolute;left:0;top:9px;bottom:9px;width:3px;border-radius:0 3px 3px 0;background:var(--acc)}
.nav-item.locked{color:var(--ink-3);cursor:not-allowed}
.nav-item.locked:hover{background:transparent;color:var(--ink-3)}
.nav-item.locked .lock{margin-left:auto;color:var(--ink-3);display:flex}
.nav-badge{margin-left:auto;min-width:20px;height:20px;padding:0 6px;border-radius:99px;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;background:var(--alarm);color:#fff}
.nav-badge.warn{background:var(--warn)}
.rail-foot{margin-top:auto;padding:12px 10px 4px;border-top:1px solid var(--c-line);font-size:11px;color:var(--ink-3);display:flex;flex-direction:column;gap:3px}
.rail-foot .row{display:flex;justify-content:space-between;gap:8px}

.main{flex:1;margin-left:var(--rail-w);min-width:0;padding:24px 28px 64px;transition:margin .25s ease}
.scrim{display:none;position:fixed;inset:var(--topbar-h) 0 0 0;background:rgba(16,33,46,.4);z-index:35}

/* ============================================================ PAGE HEAD */
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.page-head .titles h1{font-size:22px}
.page-head .titles p{margin:3px 0 0;color:var(--ink-2);font-size:13.5px}
.page-actions{display:flex;gap:10px;flex-wrap:wrap}

/* ============================================================ COMPONENTS */
.card{background:var(--c-surface);border:1px solid var(--c-line);border-radius:var(--r-lg);box-shadow:var(--sh-2)}
.card-pad{padding:18px}
.card-h{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:15px 18px;border-bottom:1px solid var(--c-line)}
.card-h h3{font-size:14.5px}
.card-h .sub{font-size:12px;color:var(--ink-3)}
.muted{color:var(--ink-2)} .muted-2{color:var(--ink-3)}
.eyebrow{font-size:10.5px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-3)}

.grid{display:grid;gap:16px}
.cols-2{grid-template-columns:repeat(2,1fr)}
.cols-3{grid-template-columns:repeat(3,1fr)}
.cols-4{grid-template-columns:repeat(4,1fr)}
.split-2{display:grid;gap:16px;grid-template-columns:1.6fr 1fr;align-items:start}
.split-seq{display:grid;gap:16px;grid-template-columns:1fr 320px;align-items:start}

/* buttons */
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border-radius:var(--r-md);border:1px solid var(--c-line-2);background:var(--c-surface);color:var(--ink);font-size:13.5px;font-weight:600;cursor:pointer;min-height:46px;white-space:nowrap;transition:background .12s,border-color .12s,box-shadow .12s,transform .04s}
.btn .ic{display:flex}
.btn:hover{background:var(--c-sunken);border-color:var(--ink-3)}
.btn:active{transform:translateY(1px)}
.btn.primary{background:var(--acc);border-color:var(--acc);color:#fff;box-shadow:var(--sh-1)}
.btn.primary:hover{background:var(--acc-600);border-color:var(--acc-600)}
.btn.danger{background:var(--alarm);border-color:var(--alarm);color:#fff}
.btn.danger:hover{filter:brightness(.95)}
.btn.ghost{border-color:transparent;background:transparent;color:var(--ink-2)}
.btn.ghost:hover{background:var(--c-sunken);color:var(--ink)}
.btn.sm{padding:7px 11px;min-height:34px;font-size:12.5px}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn:disabled:active{transform:none}

/* status pill (icon + label) */
.pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px 4px 8px;border-radius:var(--r-pill);font-size:12px;font-weight:600;border:1px solid transparent;line-height:1}
.pill .ic{display:flex}
.pill.ok{background:var(--ok-bg);color:var(--ok);border-color:var(--ok-line)}
.pill.warn{background:var(--warn-bg);color:var(--warn);border-color:var(--warn-line)}
.pill.alarm{background:var(--alarm-bg);color:var(--alarm);border-color:var(--alarm-line)}
.pill.info{background:var(--info-bg);color:var(--info);border-color:var(--info-line)}
.pill.idle{background:var(--idle-bg);color:var(--ink-2);border-color:var(--c-line-2)}
.pill.run{background:var(--acc-50);color:var(--acc-700);border-color:var(--acc-100)}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex:0 0 auto}
.dot.ok{background:var(--ok)} .dot.warn{background:var(--warn)} .dot.alarm{background:var(--alarm)} .dot.idle{background:var(--idle)} .dot.run{background:var(--acc)} .dot.a{background:var(--a)} .dot.b{background:var(--b)}

/* tables */
table.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-3);text-align:left;padding:10px 14px;border-bottom:1px solid var(--c-line);background:var(--c-sunken);position:sticky;top:0}
.tbl td{padding:11px 14px;border-bottom:1px solid var(--c-line);vertical-align:middle}
.tbl tr:last-child td,.tbl tbody tr:last-child td{border-bottom:none}
.tbl tbody tr:hover{background:var(--c-sunken)}
.tbl td.r,.tbl th.r{text-align:right}
.tbl .tag{font-family:var(--mono);font-size:12px;color:var(--ink-2)}
.tbl .val{font-family:var(--mono);font-variant-numeric:tabular-nums;font-weight:600}

/* kpi tiles */
.kpi{padding:16px 18px;display:flex;flex-direction:column}
.kpi .k{font-size:12px;color:var(--ink-3);font-weight:500;display:flex;align-items:center;gap:7px}
.kpi .v{margin-top:7px;font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:30px;font-weight:600;letter-spacing:-.02em;line-height:1}
.kpi .v small{font-family:var(--font);font-size:14px;color:var(--ink-3);font-weight:500;letter-spacing:0}
.kpi .s{margin-top:auto;padding-top:8px;font-size:12px;color:var(--ink-2)}

/* level bar (linear) */
.lvl{height:9px;border-radius:99px;background:var(--c-line);overflow:hidden;position:relative}
.lvl > i{position:absolute;left:0;top:0;bottom:0;border-radius:99px;transition:width .8s cubic-bezier(.22,.61,.36,1)}
.lvl.a > i{background:linear-gradient(90deg,var(--a-soft),var(--a))}
.lvl.b > i{background:linear-gradient(90deg,var(--b-soft),var(--b))}
.lvl .min{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--alarm);opacity:.55}

/* tank tile (customer) */
.tank{display:flex;gap:14px;align-items:stretch}
.tank .glass{position:relative;width:54px;flex:0 0 54px;border:2px solid var(--c-line-2);border-radius:10px;background:var(--c-sunken);overflow:hidden}
.tank .glass > i{position:absolute;left:0;right:0;bottom:0;transition:height .9s cubic-bezier(.22,.61,.36,1)}
.tank.a .glass > i{background:linear-gradient(180deg,var(--a-soft),var(--a))}
.tank.b .glass > i{background:linear-gradient(180deg,var(--b-soft),var(--b))}
.tank .glass .mark{position:absolute;left:0;right:0;height:0;border-top:2px dashed var(--alarm);opacity:.5}
.tank .meta{flex:1;display:flex;flex-direction:column;justify-content:center;gap:2px;min-width:0}
.tank .meta .nm{font-weight:600;display:flex;align-items:center;gap:8px}
.tank .meta .pc{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:26px;font-weight:600;line-height:1.05}
.tank .meta .lt{font-size:12px;color:var(--ink-3);font-family:var(--mono)}
.chip{font-size:10.5px;font-weight:700;letter-spacing:.02em;padding:2px 7px;border-radius:6px;line-height:1.5}
.chip.a{background:var(--a-bg);color:var(--a)} .chip.b{background:var(--b-bg);color:var(--b)}

/* tabs */
.tabs{display:inline-flex;gap:2px;background:var(--c-sunken);border:1px solid var(--c-line);border-radius:var(--r-md);padding:3px}
.tabs button{border:none;background:transparent;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:500;color:var(--ink-2);cursor:pointer;min-height:36px}
.tabs button[aria-selected="true"]{background:var(--c-surface);color:var(--ink);box-shadow:var(--sh-1);font-weight:600}

/* toggle (hand/auto etc) */
.seg{display:inline-flex;border:1px solid var(--c-line-2);border-radius:var(--r-pill);overflow:hidden}
.seg button{border:none;background:var(--c-surface);padding:7px 14px;font-size:12.5px;font-weight:600;color:var(--ink-2);cursor:pointer;min-height:36px}
.seg button+button{border-left:1px solid var(--c-line-2)}
.seg button[aria-pressed="true"]{background:var(--ink);color:#fff}
.seg.amber button[aria-pressed="true"]{background:var(--warn)}

/* alarm row */
.al-row{display:grid;grid-template-columns:30px 76px 1fr auto;gap:14px;align-items:start;padding:14px 18px;border-bottom:1px solid var(--c-line);cursor:pointer}
.al-row:last-child{border-bottom:none}
.al-row:hover{background:var(--c-sunken)}
.al-ic{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center}
.al-ic.alarm{background:var(--alarm-bg);color:var(--alarm)} .al-ic.warn{background:var(--warn-bg);color:var(--warn)} .al-ic.info{background:var(--info-bg);color:var(--info)}
.al-meta{min-width:0}
.al-meta .ti{font-weight:600;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.al-meta .lo{font-size:12.5px;color:var(--ink-2);margin-top:2px}
.al-meta .det{margin-top:10px;display:none;background:var(--c-sunken);border:1px solid var(--c-line);border-radius:var(--r-md);padding:12px 14px;font-size:13px}
.al-row.open .al-meta .det{display:block}
.al-det-row{display:flex;gap:8px;margin-bottom:7px}
.al-det-row:last-child{margin-bottom:0}
.al-det-row .k{flex:0 0 116px;font-size:11px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;color:var(--ink-3);padding-top:1px}
.al-time{font-family:var(--mono);font-size:11.5px;color:var(--ink-3);text-align:right;white-space:nowrap}
.badge-fo{font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;background:var(--alarm);color:#fff;padding:2px 6px;border-radius:5px}
.badge-sup{font-size:10px;font-weight:600;background:var(--idle-bg);color:var(--ink-2);padding:2px 6px;border-radius:5px;border:1px solid var(--c-line-2)}
.badge-ack{font-size:10px;font-weight:600;background:var(--ok-bg);color:var(--ok);padding:2px 6px;border-radius:5px}

/* stepper (sequence) */
.steps{position:relative;padding:4px 0}
.step{display:grid;grid-template-columns:34px 1fr;gap:14px;padding:4px 0 4px;position:relative}
.step .marker{display:flex;flex-direction:column;align-items:center}
.step .knob{width:26px;height:26px;border-radius:50%;border:2px solid var(--c-line-2);background:var(--c-surface);display:flex;align-items:center;justify-content:center;color:var(--ink-3);font-size:12px;font-weight:600;z-index:1}
.step .stem{flex:1;width:2px;background:var(--c-line);margin:2px 0}
.step:last-child .stem{display:none}
.step .body{padding-bottom:18px}
.step .nm{font-weight:600;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.step .meta{font-size:12.5px;color:var(--ink-2);margin-top:3px}
.step.done .knob{background:var(--ok);border-color:var(--ok);color:#fff}
.step.active .knob{background:var(--acc);border-color:var(--acc);color:#fff;box-shadow:0 0 0 5px var(--acc-50)}
.step.active .nm{color:var(--acc-700)}
.step.todo .nm{color:var(--ink-3)} .step.todo .knob{color:var(--ink-3)}
.step.wait .knob{border-color:var(--warn);color:var(--warn)}
.wait-tag{font-size:11.5px;font-weight:600;color:var(--warn);background:var(--warn-bg);border:1px solid var(--warn-line);padding:3px 9px;border-radius:99px;display:inline-flex;gap:6px;align-items:center}
.step.fail .knob{background:var(--alarm);border-color:var(--alarm);color:#fff;box-shadow:0 0 0 5px var(--alarm-bg)}
.step.fail .nm{color:var(--alarm)}
.fail-tag{font-size:11.5px;font-weight:600;color:var(--alarm);background:var(--alarm-bg);border:1px solid var(--alarm-line);padding:3px 9px;border-radius:99px;display:inline-flex;gap:6px;align-items:center}
.seq-banner{display:flex;gap:10px;align-items:flex-start;padding:12px 15px;border-radius:var(--r-lg);background:var(--alarm-bg);border:1px solid var(--alarm-line);color:var(--alarm);font-size:13px;margin-bottom:14px;line-height:1.45}
.seq-banner b{color:var(--alarm)}
.dg-suspect{display:flex;gap:10px;align-items:flex-start;padding:11px 13px;border-radius:var(--r-md);background:var(--alarm-bg);border:1px solid var(--alarm-line);color:var(--alarm);font-size:12.5px;margin-bottom:14px;line-height:1.45}
.dg-suspect b{color:var(--alarm)}

/* io filter */
.io-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.search{display:flex;align-items:center;gap:8px;background:var(--c-surface);border:1px solid var(--c-line-2);border-radius:var(--r-md);padding:0 12px;min-height:42px;flex:1;min-width:200px;max-width:360px}
.search input{border:none;outline:none;background:transparent;font-family:inherit;font-size:14px;width:100%;color:var(--ink)}
.io-type{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px}
.io-type.DO{background:#E4F4EB;color:#0E7A45}
.io-type.DI{background:#FBEDE2;color:#9A5500}
.io-type.AI{background:#E7F0F4;color:#2E6E8E}

/* hand/auto actuator card */
.act{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:13px 16px;border-bottom:1px solid var(--c-line);flex-wrap:wrap}
.act:last-child{border-bottom:none}
.act .info{min-width:200px;flex:1}
.act .info .nm{font-weight:600}
.act .info .il{font-size:12px;color:var(--ink-2);margin-top:3px;display:flex;gap:10px;flex-wrap:wrap}
.il-ok{color:var(--ok)} .il-bad{color:var(--alarm)}
.act .ctrl{display:flex;align-items:center;gap:10px}

/* calibration */
.cal{display:grid;grid-template-columns:1fr auto auto auto;gap:14px;align-items:center;padding:13px 16px;border-bottom:1px solid var(--c-line)}
.cal:last-child{border-bottom:none}
.cal .field{display:flex;flex-direction:column;gap:3px}
.cal .field label{font-size:10.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-3)}
.cal input{width:96px;border:1px solid var(--c-line-2);border-radius:8px;padding:8px 10px;font-family:var(--mono);font-size:13px;text-align:right;background:var(--c-surface);color:var(--ink)}
.cal input:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-50)}
.cal .preview{font-family:var(--mono);font-size:13px;color:var(--ink-2);background:var(--c-sunken);border-radius:8px;padding:8px 12px;white-space:nowrap}

/* recipe */
.rcp{display:flex;gap:0;align-items:stretch}
.rcp-list{flex:0 0 280px;border-right:1px solid var(--c-line);max-height:640px;overflow:auto}
.rcp-item{padding:14px 18px;border-bottom:1px solid var(--c-line);cursor:pointer;display:flex;flex-direction:column;gap:4px}
.rcp-item:hover{background:var(--c-sunken)}
.rcp-item[aria-current="true"]{background:var(--acc-50);box-shadow:inset 3px 0 0 var(--acc)}
.rcp-item .nm{font-weight:600;display:flex;align-items:center;justify-content:space-between;gap:8px}
.rcp-item .mt{font-size:12px;color:var(--ink-3);display:flex;gap:12px}
.rcp-detail{flex:1;padding:20px 22px;min-width:0}
.dose-row{display:grid;grid-template-columns:26px 1fr auto;gap:12px;align-items:center;padding:9px 0;border-bottom:1px solid var(--c-line)}
.dose-row:last-child{border-bottom:none}
.dose-row .seq{width:24px;height:24px;border-radius:50%;background:var(--c-sunken);border:1px solid var(--c-line-2);font-family:var(--mono);font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;color:var(--ink-2)}
.dose-row .amt{font-family:var(--mono);font-variant-numeric:tabular-nums;font-weight:600}

/* bars (verbruik) */
.bars{display:flex;flex-direction:column;gap:11px}
.bar-row{display:grid;grid-template-columns:120px 1fr 78px;gap:12px;align-items:center}
.bar-row .nm{font-size:13px;color:var(--ink-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{height:22px;background:var(--c-sunken);border-radius:6px;overflow:hidden;position:relative}
.bar-track > i{position:absolute;left:0;top:0;bottom:0;border-radius:6px;background:linear-gradient(90deg,var(--acc-100),var(--acc));transition:width .9s ease}
.bar-row .amt{font-family:var(--mono);font-variant-numeric:tabular-nums;text-align:right;font-weight:600;font-size:13px}

/* banner (customer status hero) */
.banner{display:flex;align-items:center;gap:18px;padding:20px 22px;border-radius:var(--r-lg);border:1px solid;box-shadow:var(--sh-2)}
.banner .icb{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex:0 0 52px}
.banner .tx{flex:1;min-width:0}
.banner .tx .h{font-size:19px;font-weight:600;letter-spacing:-.01em}
.banner .tx .p{font-size:13.5px;margin-top:2px}
.banner.ok{background:var(--ok-bg);border-color:var(--ok-line)} .banner.ok .icb{background:#fff;color:var(--ok)} .banner.ok .h{color:var(--ok)} .banner.ok .p{color:#2c6b48}
.banner.warn{background:var(--warn-bg);border-color:var(--warn-line)} .banner.warn .icb{background:#fff;color:var(--warn)} .banner.warn .h{color:var(--warn)} .banner.warn .p{color:#7a5410}
.banner.alarm{background:var(--alarm-bg);border-color:var(--alarm-line)} .banner.alarm .icb{background:#fff;color:var(--alarm)} .banner.alarm .h{color:var(--alarm)} .banner.alarm .p{color:#8f352b}

/* activity strip */
.activity{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.activity .stage{display:flex;align-items:center;gap:10px;flex:1;min-width:220px}
.activity .ring{width:46px;height:46px;flex:0 0 46px}
.activity .now{font-weight:600;font-size:15px}
.activity .sub{font-size:12.5px;color:var(--ink-2)}

/* mimic */
.mimic-wrap{padding:18px 16px 8px}
.mimic{width:100%;height:auto;display:block}
.legend{display:flex;gap:18px;flex-wrap:wrap;padding:10px 18px 4px;font-size:12px;color:var(--ink-2);border-top:1px solid var(--c-line)}
.legend span{display:inline-flex;align-items:center;gap:7px}

/* SVG dynamic */

.pipe-base{stroke:#D6DDD6;stroke-width:8;fill:none;stroke-linecap:round;stroke-linejoin:round}
.pipe-flow{stroke-width:6;fill:none;stroke-linecap:round;stroke-linejoin:round;opacity:0;transition:opacity .3s}
.pipe-flow.on{opacity:1;stroke-dasharray:7 9;animation:march var(--flow-dur,1s) linear infinite}
/* --- living liquid: damped level + kabbelend oppervlak (twee golflagen) --- */
.liqlvl{transition:transform .85s var(--ease-out)}
.liq-wave{animation:waveX 6.5s linear infinite}
.liq-wave2{animation:waveX 4.6s linear infinite;animation-delay:-2.2s}
@keyframes waveX{from{transform:translateX(0)}to{transform:translateX(calc(var(--wl,40px) * -1))}}
.glass-sheen{pointer-events:none}
/* mengbellen (alleen tijdens recirculatie) */
.bubbles{opacity:0;transition:opacity .5s var(--ease)}
.bubbles.on{opacity:.55}
.bubbles circle{animation:bub 3.2s ease-in infinite;transform-box:fill-box}
@keyframes bub{0%{transform:translateY(0);opacity:0}15%{opacity:.7}100%{transform:translateY(-42px);opacity:0}}
/* zacht ademende gloed op draaiende pomp (functioneel: 'actief') */
.spump-glow{fill:none!important;stroke:var(--acc)!important;stroke-width:2!important;opacity:0;transform-box:fill-box;transform-origin:center}
.spump.run .spump-glow{animation:pumpglow 2.8s var(--ease) infinite}
@keyframes pumpglow{0%,100%{opacity:.06;transform:scale(.9)}50%{opacity:.30;transform:scale(1.14)}}
/* mini-tank in tegels */
.mtank{display:block}
.tank .mtank{flex:0 0 56px}
.num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}
/* KPI sparkline (in-loco trend) */
.spark{width:100%;height:26px;display:block;margin-top:10px;overflow:visible}
.spark .ln{fill:none;stroke:var(--acc);stroke-width:2;stroke-linejoin:round;stroke-linecap:round}
.spark .ar{fill:var(--acc);opacity:.08}
/* value-change flash */
.flash{position:relative}
.flash::after{content:"";position:absolute;inset:0;border-radius:inherit;box-shadow:0 0 0 2px var(--acc);opacity:0;animation:flashk .9s var(--ease-out);pointer-events:none}
@keyframes flashk{0%{opacity:.85}100%{opacity:0}}
@keyframes march{to{stroke-dashoffset:-32}}
.fl-w{stroke:#5AA7BC}.fl-a{stroke:var(--a)}.fl-b{stroke:var(--b)}.fl-mix{stroke:#A7B3A8}

.svessel{fill:var(--c-sunken);stroke:#C6CFC6;stroke-width:1.5}
.svessel-lbl{font-family:var(--mono);font-size:13px;fill:var(--ink-2)}
.ssrc-nm{font-family:var(--font);font-size:11.5px;font-weight:600;fill:var(--ink)}

.sval .val-glow{fill:none;stroke:var(--acc);stroke-width:2.5;opacity:0;transform-box:fill-box;transform-origin:center}
.sval .val-seat{fill:none;stroke:transparent;stroke-width:1.8;transition:stroke .2s,fill .2s}
.sval path{fill:#9AA89E;transition:fill .2s}
.sval.open .val-seat{stroke:var(--acc);fill:var(--acc-50)}
.sval.open path{fill:var(--acc)}
.sval.open .val-glow{animation:valveglow 2s var(--ease) infinite}
@keyframes valveglow{0%,100%{opacity:.12;transform:scale(.92)}50%{opacity:.55;transform:scale(1.2)}}

.spump circle{fill:#FFFFFF;stroke:#C6CFC6;stroke-width:1.5;transition:stroke .2s}

.spump path{fill:#AEB8AE;transition:fill .2s}
.spump.run path{fill:var(--acc)}
.spump.run circle{stroke:var(--acc)}
.sreadout{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:14px;font-weight:600;fill:var(--ink)}
.sreadout-lbl{font-family:var(--font);font-size:12.5px;font-weight:500;fill:var(--ink-3)}
.stank-lbl{font-family:var(--font);font-size:15px;font-weight:600;fill:var(--ink)}
.stank-pc{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:19px;font-weight:700;fill:var(--ink)}
.liquid{transition:height .9s cubic-bezier(.22,.61,.36,1),y .9s cubic-bezier(.22,.61,.36,1)}

/* modal */
.modal-scrim{position:fixed;inset:0;background:rgba(16,33,46,.46);z-index:80;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px)}
.modal-scrim.show{display:flex}
.modal{background:var(--c-surface);border-radius:var(--r-xl);box-shadow:var(--sh-4);max-width:540px;width:100%;max-height:86vh;overflow:auto}
.modal-h{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--c-line)}
.modal-h h3{font-size:16px}
.modal-b{padding:20px 22px}
.x-btn{width:36px;height:36px;border:none;background:var(--c-sunken);border-radius:8px;cursor:pointer;color:var(--ink-2);display:flex;align-items:center;justify-content:center}
.x-btn:hover{background:var(--c-line);color:var(--ink)}

.empty{padding:40px 20px;text-align:center;color:var(--ink-3)}
.empty .ic{display:flex;justify-content:center;margin-bottom:10px;opacity:.6}

hr.sep{border:none;border-top:1px solid var(--c-line);margin:18px 0}
.kv{display:flex;justify-content:space-between;gap:12px;padding:7px 0;border-bottom:1px solid var(--c-line);font-size:13px}
.kv:last-child{border-bottom:none}
.kv .k{color:var(--ink-2)} .kv .v{font-weight:600;font-family:var(--mono)}
/* ---- Recepten: voedingsschema-invoer ---- */
.rcp-subbar{display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.sf-sel{display:flex;flex-direction:column;gap:4px;font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--ink-3);font-weight:600}
.sf-sel select{min-width:240px}
.sf-field input,.sf-field select,.sf-sel select,.vi input,.ph-row input,.vat-ed-row input,.vat-ed-row select{font-family:inherit;font-size:13.5px;color:var(--ink);background:var(--c-surface);border:1px solid var(--c-line-2);border-radius:9px;padding:9px 11px;min-height:42px;outline:none;width:100%}
.sf-field input:focus,.sf-field select:focus,.sf-sel select:focus,.vi input:focus,.ph-row input:focus,.vat-ed-row input:focus,.vat-ed-row select:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-50)}
.sf-head{padding:16px}
.sf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(178px,1fr));gap:12px}
.sf-field{display:flex;flex-direction:column;gap:4px;font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--ink-3);font-weight:600}
.sf-field.wide{grid-column:span 2}
.sf-field input{font-weight:500;text-transform:none;letter-spacing:0}
.sf-meta{display:flex;gap:16px;flex-wrap:wrap;align-items:center;margin-top:13px;font-size:12.5px}
.sf-meta #sf-verval{font-weight:600;color:var(--ok)}
.sf-meta #sf-verval.exp{color:var(--alarm)}
.schema-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:16px 0}
@media(max-width:900px){.schema-grid{grid-template-columns:1fr}}
.mb-col{background:var(--c-surface);border:1px solid var(--c-line);border-radius:var(--r-lg);padding:14px;box-shadow:var(--sh-1)}
.mb-col.a{border-top:3px solid var(--a)}
.mb-col.b{border-top:3px solid var(--b)}
.mb-h{font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px;margin-bottom:10px}
.vat-head{display:grid;grid-template-columns:1fr 132px 112px;gap:10px;font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--ink-3);font-weight:600;padding:0 2px 6px;border-bottom:1px solid var(--c-line)}
.vat-row{display:grid;grid-template-columns:1fr 132px 112px;gap:10px;align-items:center;padding:7px 2px;border-bottom:1px solid var(--c-line)}
.vat-row:last-child{border-bottom:none}
.vat-row .vn{font-size:13.5px;font-weight:500}
.vi{display:flex;align-items:center;gap:7px}
.vi input{text-align:right;font-family:var(--mono);padding:8px 10px;min-height:40px}
.vi .u{font-size:12px;color:var(--ink-3);min-width:22px}
.ccm{font-family:var(--mono);font-size:12px;color:var(--ink-2);text-align:right}
.vat-sub{font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--ink-3);font-weight:600;margin:11px 0 1px}
.vat-empty{font-size:12.5px;color:var(--ink-3);padding:8px 2px}
.sf-ph{padding:14px;margin-bottom:16px}
.ph-row{display:flex;gap:12px;max-width:300px}
.ph-row .sf-field{flex:1}
.ph-row input{text-align:right;font-family:var(--mono)}
.sf-actions{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.batch-card{padding:16px}
.batch-bar{display:flex;align-items:flex-end;gap:16px;flex-wrap:wrap;margin-bottom:12px}
.bp-row{display:flex;justify-content:space-between;gap:12px;padding:5px 2px;border-bottom:1px solid var(--c-line);font-size:13px}
.bp-row:last-child{border-bottom:none}
.bp-row.water{color:var(--ink-2)}
.bp-row.tot{border-top:2px solid var(--c-line-2);border-bottom:none;font-weight:700;margin-top:2px;padding-top:7px}
.il-ab{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:12.5px;padding:8px 10px;border:1px solid var(--c-line-2);border-radius:9px;background:var(--info-bg);border-left:3px solid var(--info)}
.il-ab.idle{background:var(--c-sunken);border-left-color:var(--c-line-2);color:var(--ink-2)}
.il-ab-ic{display:flex;color:var(--info)}
.il-ab.idle .il-ab-ic{color:var(--ink-3)}
.check-banner{margin-top:10px;border-radius:var(--r-md);padding:12px 14px;font-size:13px;border:1px solid}
.check-banner ul{margin:8px 0 0;padding-left:18px;display:flex;flex-direction:column;gap:4px}
.check-banner.error{background:var(--alarm-bg);border-color:var(--alarm-line)}
.check-banner.warn{background:var(--warn-bg);border-color:var(--warn-line)}
.cb-h{font-weight:700;display:flex;align-items:center;gap:8px}
.vat-ed-row.conflict{background:var(--warn-bg);border-radius:8px}
.sd-note{padding:13px 15px;font-size:12.5px;color:var(--ink-2);display:flex;gap:10px;align-items:flex-start;line-height:1.5;margin-bottom:16px}
.sd-note b{color:var(--ink)}
.log-item{border-bottom:1px solid var(--c-line)}
.log-item:last-child{border-bottom:none}
.log-row{display:grid;grid-template-columns:118px 1fr 132px 86px 90px 22px;gap:12px;align-items:center;padding:12px 16px;cursor:pointer;transition:background .12s}
.log-row:hover{background:var(--c-sunken)}
.log-item.open .log-row{background:var(--c-sunken)}
.log-when{display:flex;flex-direction:column;font-size:12px}
.log-when b{font-size:13px}
.log-rec{font-weight:600;font-size:13.5px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.log-tot,.log-dev{font-size:12.5px;text-align:right}
.log-dev.hi{color:var(--warn);font-weight:700}
.log-exp{color:var(--ink-3);text-align:center;font-size:12px}
.log-detail{padding:2px 16px 16px;background:var(--c-sunken)}
.log-meta{display:flex;gap:18px;flex-wrap:wrap;font-size:12.5px;color:var(--ink-2);padding-top:8px}
.log-meta b{color:var(--ink)}
.dev-t{color:var(--warn)}
.log-tbl tfoot td{border-top:2px solid var(--c-line-2);font-weight:700}
.log-tbl tr.dev td{background:var(--warn-bg)}
@media(max-width:760px){.log-row{grid-template-columns:1fr auto auto 22px;gap:8px}.log-when,.log-tot{display:none}}
.vat-ed{padding:16px}
.vat-ed-head{display:grid;grid-template-columns:28px 1.25fr 0.78fr 60px 68px 50px 66px 80px;gap:8px;font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--ink-3);font-weight:600;padding-bottom:6px;border-bottom:1px solid var(--c-line)}
.vat-ed-row{display:grid;grid-template-columns:28px 1.25fr 0.78fr 60px 68px 50px 66px 80px;gap:8px;align-items:center;padding:7px 0;border-bottom:1px solid var(--c-line)}
.vat-ed-row:last-of-type{border-bottom:none}
.vat-ed-row .vn-num{font-family:var(--mono);color:var(--ink-3);font-weight:600;text-align:center}
.vat-ed-row input,.vat-ed-row select{min-height:40px;padding:8px 10px}
@media(max-width:780px){.vat-ed-head{display:none}.vat-ed-row{grid-template-columns:1fr 1fr;gap:8px;padding:10px 0}}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 18px;border-radius:var(--r-md);box-shadow:var(--sh-4);font-size:13.5px;font-weight:500;z-index:90;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;display:flex;align-items:center;gap:10px;max-width:90vw}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.flag{font-size:11px;color:var(--ink-3);background:var(--c-sunken);border:1px dashed var(--c-line-2);border-radius:8px;padding:8px 12px;display:flex;gap:8px;align-items:flex-start}

/* ============================================================ RESPONSIVE */
@media (max-width:1180px){
  .cols-4{grid-template-columns:repeat(2,1fr)}
  .cols-3{grid-template-columns:repeat(2,1fr)}
}
@media (max-width:1024px){
  .split-2,.split-seq{grid-template-columns:1fr}
  :root{--rail-w:76px}
  .rail .nav-item .lbl,.rail .rail-group-label,.rail .rail-foot,.rail .nav-item .tag,.rail .nav-item .lock{display:none}
  .rail .nav-item{justify-content:center;padding:11px}
  .rail .nav-item .ic{flex:0 0 24px}
  .rail .nav-badge{position:absolute;top:5px;right:8px;margin:0;min-width:16px;height:16px;font-size:10px;padding:0 4px}
  .rail .nav-item[aria-current="page"]::before{top:6px;bottom:6px}
}
@media (max-width:820px){
  .cols-2{grid-template-columns:1fr}
  .main{padding:18px 16px 60px}
  .rcp{flex-direction:column}.rcp-list{flex:auto;border-right:none;border-bottom:1px solid var(--c-line);max-height:none;display:flex;overflow-x:auto}.rcp-item{flex:0 0 220px;border-bottom:none;border-right:1px solid var(--c-line)}
  .cal{grid-template-columns:1fr 1fr}.cal .preview{grid-column:1/-1}
}
@media (max-width:720px){
  :root{--rail-w:0px}
  .tb-burger{display:flex}
  .rail{transform:translateX(-100%);width:264px;box-shadow:var(--sh-3)}
  .rail .nav-item .lbl,.rail .rail-group-label,.rail .rail-foot,.rail .nav-item .tag,.rail .nav-item .lock{display:revert}
  .rail .nav-item{justify-content:flex-start;padding:11px 12px}
  .rail .nav-badge{position:static;margin-left:auto;min-width:20px;height:20px;font-size:11px}
  body.nav-open .rail{transform:translateX(0)}
  body.nav-open .scrim{display:block}
  .main{margin-left:0}
  .brand-machine .u{display:none}
  .tb-conn span.lbl{display:none}
  .tb-clock .d{display:none}
  .roles button .lbl{display:none}
  .roles button{padding:7px 9px}
  .grid{gap:12px}
  .al-row{grid-template-columns:26px 1fr;gap:10px}
  .al-row .al-time,.al-row .al-meta .badge-fo{grid-column:auto}
  .al-time{display:none}
  .kpi .v{font-size:26px}
  .page-head{align-items:flex-start}
}
@media (max-width:420px){
  .cols-4,.cols-3,.cols-2{grid-template-columns:1fr}
  .activity .stage{min-width:0}
}

/* ============================================================ LOGO */
.brand-logo{display:flex;align-items:center}
.brand-logo svg{height:30px;width:auto;display:block}
@media (max-width:720px){.brand-logo svg{height:26px}}

/* --- responsive topbar fit (tablets/phones) --- */
@media (max-width:720px){
  .topbar{gap:10px;padding-left:max(12px,env(safe-area-inset-left));padding-right:max(12px,env(safe-area-inset-right))}
  .tb-cluster{gap:6px}
}
@media (max-width:540px){
  .topbar{gap:8px}
  .brand-machine,.brand-sep{display:none}   /* identiteit = alleen logo op telefoon */
  .tb-conn{display:none}                     /* PLC-pil weg op smal scherm */
  .tb-clock{display:none}                    /* tijd staat al in de iOS-statusbalk */
  .brand-logo svg{height:24px}
  .roles{padding:2px}
  .roles button{padding:7px 8px}
}

/* ============================================================ CLICKABLE MIMIC */
.clk{cursor:pointer}
.dev-halo{fill:transparent;transition:fill .15s}
.clk:hover .dev-halo{fill:rgba(28,110,69,.12)}
.clk:active .dev-halo{fill:rgba(28,110,69,.20)}

/* ============================================================ DEVICE TILES (hand/auto) */
.tiles{display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));padding:16px}
.tiles.dose{grid-template-columns:repeat(auto-fill,minmax(118px,1fr))}
.tile{display:flex;flex-direction:column;gap:9px;padding:14px;border:1px solid var(--c-line);border-radius:var(--r-md);background:var(--c-surface);cursor:pointer;min-height:100px;text-align:left;transition:border-color .12s,box-shadow .12s,transform .05s}
.tile:hover{border-color:var(--ink-3);box-shadow:var(--sh-2)}
.tile:active{transform:translateY(1px)}
.tile .t-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.tile .t-ic{color:var(--ink-3);display:flex}
.tile .t-nm{font-weight:600;font-size:13.5px;line-height:1.22}
.tile .t-state{display:flex;align-items:center;gap:8px;margin-top:auto;font-size:13px;font-weight:600}
.tile.hand{border-color:var(--warn-line);background:var(--warn-bg)}
.tile.hand .t-ic{color:var(--warn)}
.tile.dz{min-height:92px}
.mode-badge{font-size:10px;font-weight:700;letter-spacing:.04em;padding:2px 7px;border-radius:6px;white-space:nowrap}
.mode-badge.auto{background:var(--acc-50);color:var(--acc-700)}
.mode-badge.hand{background:var(--warn);color:#fff}

/* ============================================================ ACCORDION */
.acc{border:1px solid var(--c-line);border-radius:var(--r-lg);background:var(--c-surface);box-shadow:var(--sh-2);overflow:hidden}
.acc+.acc{margin-top:12px}
.acc-h{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 18px;cursor:pointer;min-height:58px;user-select:none;-webkit-user-select:none}
.acc-h:hover{background:var(--c-sunken)}
.acc-h .lft{display:flex;align-items:center;gap:11px;min-width:0}
.acc-h .lft .ic{color:var(--ink-3);display:flex;flex:0 0 auto}
.acc-h h3{font-size:14.5px}
.acc-h .rgt{display:flex;align-items:center;gap:9px;flex:0 0 auto}
.acc-chev{transition:transform .2s;color:var(--ink-3);display:flex}
.acc.open .acc-chev{transform:rotate(90deg)}
.acc-body{display:none}
.acc.open .acc-body{display:block;border-top:1px solid var(--c-line)}
.cnt-pill{font-size:11px;font-weight:600;color:var(--ink-2);background:var(--c-sunken);border:1px solid var(--c-line);padding:3px 9px;border-radius:99px}
.cnt-pill.hand{background:var(--warn-bg);color:var(--warn);border-color:var(--warn-line)}

/* ============================================================ FACEPLATE (device control popup) */
.fp-status{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:13px 15px;background:var(--c-sunken);border-radius:var(--r-md);margin-bottom:16px}
.fp-mode{display:flex;gap:10px;margin-bottom:18px}
.fp-mode button{flex:1;min-height:54px;border-radius:var(--r-md);border:2px solid var(--c-line-2);background:var(--c-surface);font-size:14.5px;font-weight:600;color:var(--ink-2);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.fp-mode button[aria-pressed="true"]{border-color:var(--acc);background:var(--acc-50);color:var(--acc-700)}
.fp-mode button.hand[aria-pressed="true"]{border-color:var(--warn);background:var(--warn-bg);color:var(--warn)}
.cmp{display:flex;gap:22px;padding:12px 16px;border:1px dashed var(--c-line-2);border-radius:var(--r-md);margin-bottom:18px;align-items:center}
.cmp .c-k{font-size:10.5px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.04em}
.cmp .c-v{font-weight:600;font-family:var(--mono);font-size:15px;margin-top:2px}
.fp-cmd{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.fp-btn{position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;min-height:78px;border-radius:var(--r-md);border:2px solid var(--c-line-2);background:var(--c-surface);color:var(--ink);font-size:15px;font-weight:700;cursor:pointer;user-select:none;-webkit-user-select:none;touch-action:none}
.fp-btn .hint{font-size:10.5px;font-weight:500;color:var(--ink-3)}
.fp-btn.on{border-color:var(--ok);color:var(--ok)}
.fp-btn.off{border-color:var(--alarm);color:var(--alarm)}
.fp-btn:disabled{opacity:.42;cursor:not-allowed;color:var(--ink-3);border-color:var(--c-line)}
.fp-btn .fill{position:absolute;left:0;bottom:0;top:0;width:0;background:rgba(28,110,69,.16);z-index:0}
.fp-btn.on .fill{background:rgba(17,138,78,.18)}
.fp-btn.off .fill{background:rgba(206,58,46,.16)}
.fp-btn>*{position:relative;z-index:1}
.fp-il{border:1px solid var(--c-line);border-radius:var(--r-md);overflow:hidden}
.fp-il .il-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--c-line);font-size:13px}
.fp-il .il-item:last-child{border-bottom:none}
.fp-il .il-item .ico{display:flex;flex:0 0 auto}
.fp-il .il-item.ok .ico{color:var(--ok)}
.fp-il .il-item.bad{background:var(--alarm-bg)} .fp-il .il-item.bad .ico{color:var(--alarm)} .fp-il .il-item.bad{color:var(--alarm);font-weight:600}
.fp-note{font-size:12.5px;color:#0e4a8f;background:var(--info-bg);border:1px solid var(--info-line);border-radius:var(--r-md);padding:11px 13px;display:flex;gap:9px;align-items:flex-start;margin-bottom:4px}
.fp-note .ico{flex:0 0 auto;color:var(--info);display:flex;margin-top:1px}

/* ============================================================ CRAFT LAYER — depth, motion, character */
body{background:linear-gradient(177deg,#F0F4F0 0%,#E7EDE8 100%);background-attachment:fixed}

/* focus — brand-green glow (keyboard only) */
:focus{outline:none}
.btn:focus-visible,.tile:focus-visible,.nav-item:focus-visible,.tabs button:focus-visible,.seg button:focus-visible,
.fp-mode button:focus-visible,.fp-btn:focus-visible,.roles button:focus-visible,input:focus-visible,.acc-h:focus-visible,.al-row:focus-visible{
  box-shadow:0 0 0 3px var(--acc-50),0 0 0 1.5px var(--acc)!important}

/* micro-feedback */
.btn{transition:background var(--dur-fast) var(--ease),border-color var(--dur-fast) var(--ease),box-shadow var(--dur-fast) var(--ease),transform 90ms var(--ease-out)}
.btn:active{transform:translateY(1px) scale(.99)}
.btn.primary{background:var(--acc);border-color:var(--acc)}
.btn.primary:hover{background:var(--acc-600);border-color:var(--acc-600);box-shadow:0 4px 12px rgba(21,87,55,.22)}
.tile{transition:border-color var(--dur-fast) var(--ease),box-shadow var(--dur) var(--ease),transform 90ms var(--ease-out),background var(--dur) var(--ease)}
.kpi{transition:box-shadow var(--dur) var(--ease),transform var(--dur) var(--ease-out)}
.nav-item,.tabs button,.seg button,.roles button{transition:background var(--dur-fast) var(--ease),color var(--dur-fast) var(--ease),box-shadow var(--dur-fast) var(--ease)}
.pill{transition:background var(--dur) var(--ease),color var(--dur) var(--ease),border-color var(--dur) var(--ease)}

/* entrance — staggered reveal on screen change */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
#main.reveal>*{animation:fadeUp .5s var(--ease-out) both}
#main.reveal>*:nth-child(1){animation-delay:.00s}
#main.reveal>*:nth-child(2){animation-delay:.05s}
#main.reveal>*:nth-child(3){animation-delay:.10s}
#main.reveal>*:nth-child(4){animation-delay:.15s}
#main.reveal>*:nth-child(5){animation-delay:.20s}
#main.reveal>*:nth-child(n+6){animation-delay:.24s}

/* modal — soft pop */
@keyframes popIn{from{opacity:0;transform:translateY(10px) scale(.985)}to{opacity:1;transform:none}}
@keyframes scrimIn{from{opacity:0}to{opacity:1}}
.modal-scrim.show{animation:scrimIn .2s var(--ease) both}
.modal-scrim.show .modal{animation:popIn .3s var(--ease-out) both}

/* toast — success/character variants */
.toast{border-left:3px solid transparent}
.toast.ok{border-left-color:var(--ok)}
.toast.ok .ic-wrap{color:#7BE0A8}
.toast .ic-wrap{display:flex;color:#fff}
.toast.big{padding:14px 20px;font-size:14px}

/* connection pulse uses accent-green naturally via --ok */

/* ============================================================ BOOT / SPLASH (first impression) */
#boot{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;
  background:radial-gradient(120% 90% at 50% 38%,#FFFFFF 0%,#EEF3EF 60%,#E4ECE6 100%);transition:opacity .55s var(--ease)}
#boot.hide{opacity:0;pointer-events:none}
#boot .blogo{filter:drop-shadow(0 10px 26px rgba(21,72,51,.22))}
#boot .blogo svg{height:62px;width:auto;display:block}
#boot .btag{font-size:10.5px;letter-spacing:.26em;text-transform:uppercase;color:var(--ink-3);font-weight:600}
#boot .btrack{width:208px;height:3px;border-radius:99px;background:var(--c-line);overflow:hidden;margin-top:4px}
#boot .btrack>i{display:block;height:100%;width:0;background:var(--brand-grad);border-radius:99px;animation:bootfill 1.15s var(--ease) forwards}
@keyframes bootfill{0%{width:0}100%{width:100%}}
#boot .bstat{font-family:var(--mono);font-size:12px;color:var(--ink-2);display:flex;align-items:center;gap:7px;min-height:18px}
#boot .bstat .dotg{width:7px;height:7px;border-radius:50%;background:var(--ok)}

/* ============================================================ GREETING (personal band) */
.greet{display:flex;align-items:center;gap:16px}
.greet .gmark{width:46px;height:46px;border-radius:13px;background:var(--brand-grad);display:flex;align-items:center;justify-content:center;color:#fff;flex:0 0 46px;box-shadow:0 6px 16px rgba(21,72,51,.24)}
.greet .gtx .gh{font-size:21px;font-weight:600;letter-spacing:-.01em;line-height:1.15}
.greet .gtx .gp{font-size:13.5px;color:var(--ink-2);margin-top:2px}

/* subtle inner sheen on brand-gradient surfaces */
.gmark, .greet .gmark{position:relative;overflow:hidden}
.gmark::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.18),rgba(255,255,255,0) 55%);pointer-events:none}

/* ============================================================ REDUCED MOTION */
/* ============================================================ HARDWARE-TWEELING */
.hw-scroll{overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;border-radius:var(--r-lg);background:linear-gradient(180deg,#E7ECEA,#DCE2DF);border:1px solid var(--c-line);box-shadow:inset 0 1px 3px rgba(18,38,26,.05)}
.hw-rack{display:flex;align-items:stretch;gap:12px;min-width:max-content;padding:22px}

/* ---- LED base ---- */
.led{width:9px;height:9px;border-radius:50%;flex:0 0 auto;background:#2b322e;box-shadow:inset 0 0 0 1px rgba(0,0,0,.4);display:inline-block}
.led.xs{width:7px;height:7px}
.led.on.ok{background:var(--ok);box-shadow:0 0 6px rgba(28,122,77,.7),inset 0 0 0 1px rgba(255,255,255,.3)}
.led.on.warn{background:#E2A52F;box-shadow:0 0 6px rgba(226,165,47,.7)}
.led.on.alarm{background:var(--alarm);box-shadow:0 0 7px rgba(206,58,46,.85),inset 0 0 0 1px rgba(255,255,255,.25)}
.led.on.info{background:var(--info);box-shadow:0 0 6px rgba(46,110,142,.6)}
.led.on.amber{background:#E0A92E;box-shadow:0 0 6px rgba(224,169,46,.8)}
.led.blink{animation:ledblink 1s steps(1,end) infinite}
.led.blink.f05{animation-duration:2s}.led.blink.f4{animation-duration:.25s}
@keyframes ledblink{0%,49.9%{opacity:1}50%,100%{opacity:.16}}

/* ---- CONTROLLER ---- */
.hw-ctrl{flex:0 0 auto;width:170px;align-self:stretch;display:flex;border-radius:8px;background:linear-gradient(180deg,#D7DCDA,#C6CDCB);border:1px solid #98a19d;box-shadow:var(--sh-2);overflow:hidden}
.hw-ctrl-side{flex:0 0 18px;background:linear-gradient(180deg,#3a433e,#2b342e);color:#cfe0d6;display:flex;align-items:center;justify-content:center}
.hw-ctrl-side span{writing-mode:vertical-rl;transform:rotate(180deg);font-size:10px;font-weight:700;letter-spacing:.16em;font-family:var(--mono);white-space:nowrap}
.hw-ctrl-col{flex:1;display:flex;flex-direction:column;min-width:0}
.cz{padding:6px 8px;border-bottom:1px solid rgba(0,0,0,.08)}
.hw-sd{background:#c0c7c4;border-radius:5px;border:1px solid #a6afab;padding:6px;display:flex;flex-direction:column;gap:5px}
.hw-sd .l{display:flex;align-items:center;justify-content:space-between;font-family:var(--mono);font-size:8px;color:#46514b;font-weight:700;letter-spacing:.03em}
.hw-sd .l .r{display:inline-flex;align-items:center;gap:3px;font-weight:600}
.hw-sd .slot{height:15px;border-radius:2px;background:linear-gradient(90deg,#2b322e,#3c453f 70%,#2b322e);box-shadow:inset 0 1px 2px rgba(0,0,0,.45)}
.hw-ident{font-family:var(--mono);font-size:7.5px;line-height:1.65;color:#5a635e}
.hw-ident b{color:#39433d;font-weight:700}
.hw-brand{display:flex;align-items:center;gap:6px}
.hw-brand .pcmark{width:15px;height:15px;border-radius:3px;background:#39433d;display:flex;align-items:center;justify-content:center;color:#cfe0d6;font-size:9px;font-weight:800;flex:0 0 auto}
.hw-brand .pc{font-size:8.5px;line-height:1.25;color:#39433d;font-weight:700}
.hw-brand .pc small{display:block;font-weight:500;color:#76807a;font-size:7px}
.hw-leds{display:grid;grid-template-columns:1fr 1fr;gap:2px 8px;padding:8px}
.hw-led-row{display:flex;align-items:center;gap:6px;background:transparent;border:0;padding:1px 3px;border-radius:4px;cursor:pointer;text-align:left;font:inherit}
.hw-led-row:hover{background:rgba(0,0,0,.06)}
.hw-led-row.sel{background:rgba(28,110,69,.14);box-shadow:inset 0 0 0 1px var(--acc)}
.hw-led-row .lbl{font-family:var(--mono);font-size:8.5px;font-weight:700;color:#2c352f;letter-spacing:.02em}
.hw-busd{display:flex;align-items:center;gap:8px;padding:6px 8px}
.hw-busd .ttl{font-family:var(--mono);font-size:9px;font-weight:800;color:#46514b}
.hw-dgrid{display:grid;grid-template-columns:repeat(3,auto);gap:4px 6px}
.hw-dled{display:inline-flex;align-items:center;gap:3px;background:transparent;border:0;padding:1px;cursor:pointer;font:inherit}
.hw-dled .dn{font-family:var(--mono);font-size:7.5px;color:#5a635e;font-weight:700}
.hw-dled:hover{background:rgba(0,0,0,.06);border-radius:3px}
.hw-up{margin-left:auto;display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:8px;color:#46514b;font-weight:700}
.hw-qr{display:flex;align-items:center;gap:8px}
.hw-qr .q{width:38px;height:38px;flex:0 0 auto;border-radius:2px;background:#fff;border:1px solid #aeb6b2;padding:2px}
.hw-qr .cap{font-size:7.5px;color:#76807a;line-height:1.35}
.hw-window{flex:1;min-height:24px;margin:7px;border-radius:5px;border:1px solid #aeb6b2;background:#c5ccc9;background-image:radial-gradient(rgba(57,67,62,.22) 1px,transparent 1.4px);background-size:7px 7px;position:relative}
.hw-window .x3{position:absolute;left:5px;bottom:4px;font-family:var(--mono);font-size:7.5px;color:#5a635e;font-weight:700}
.hw-supply{display:flex;flex-direction:column;gap:6px}
.hw-supply .ulrow{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:9px;font-weight:800;color:#2c352f}
.hw-terms{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px}
.hw-tm{display:flex;flex-direction:column;align-items:center;gap:2px;font-family:var(--mono);font-size:7.5px;color:#39433d;font-weight:600}
.hw-tm i{width:16px;height:13px;border-radius:2px;box-shadow:inset 0 1px 1px rgba(0,0,0,.3);flex:0 0 auto}
.hw-tm i.rd{background:#c0473b}.hw-tm i.bl{background:#3f6f9c}.hw-tm i.gy{background:#8b948f}
.hw-eth{display:flex;gap:10px;justify-content:center;padding:8px}
.hw-port{display:flex;flex-direction:column;align-items:center;gap:3px}
.hw-port .jack{width:28px;height:19px;border-radius:3px;background:#2b322e;display:flex;align-items:flex-end;justify-content:center;padding-bottom:2px;box-shadow:inset 0 0 0 1px rgba(0,0,0,.4)}
.hw-port .jack .lk{width:7px;height:5px;border-radius:1px;background:#3a463f}
.hw-port.up .jack .lk{background:var(--ok);box-shadow:0 0 5px var(--ok)}
.hw-port .pn{font-family:var(--mono);font-size:8px;color:#46514b;font-weight:700}
.hw-rel{display:flex;align-items:center;justify-content:center;gap:8px;padding:7px;background:rgba(0,0,0,.05)}
.hw-rel .lever{width:34px;height:8px;border-radius:3px;background:linear-gradient(90deg,#d98a2b,#c2791f);box-shadow:inset 0 1px 1px rgba(255,255,255,.35)}
.hw-rel .arr{color:#5a635e;display:flex}

/* ---- BACKPLANE ---- */
.hw-bp{flex:0 0 auto;display:flex;align-self:stretch}
.hw-spine{flex:0 0 22px;background:linear-gradient(180deg,#cdd3d1,#bcc3c0);border:1px solid #9aa3a0;border-right:0;border-radius:7px 0 0 7px;display:flex;align-items:center;justify-content:center}
.hw-spine span{writing-mode:vertical-rl;transform:rotate(180deg);font-family:var(--mono);font-size:8.5px;font-weight:700;letter-spacing:.07em;color:#46514b;white-space:nowrap}
.hw-grid{display:grid;grid-template-columns:repeat(3,162px);grid-auto-rows:344px;gap:9px;padding:9px;background:#ccd2d0;border:1px solid #9aa3a0;border-radius:0 7px 7px 0}

/* ---- SMART ELEMENT (realistische AXL SE) ---- */
.hw-elem{position:relative;display:flex;border-radius:7px 7px 5px 5px;overflow:hidden;border:1px solid #99a29d;
  background:
    repeating-linear-gradient(90deg,rgba(255,255,255,.10) 0,rgba(255,255,255,.10) 1px,transparent 1px,transparent 6px),
    linear-gradient(180deg,#DBE0DD 0%,#CDD3D0 6px,#C4CBC7 60%,#BAC2BD 100%);
  box-shadow:var(--sh-2),inset 0 1px 0 rgba(255,255,255,.5),inset -2px 0 4px rgba(0,0,0,.07);
  transition:box-shadow var(--dur) var(--ease),border-color var(--dur) var(--ease)}
.hw-elem.flt{border-color:var(--alarm);box-shadow:0 0 0 2px var(--alarm),0 0 22px rgba(206,58,46,.32),inset 0 1px 0 rgba(255,255,255,.4)}
.hw-elem.empty{background:repeating-linear-gradient(45deg,#DADFDD,#DADFDD 9px,#D0D6D4 9px,#D0D6D4 18px);border-style:dashed;border-color:#aeb6b2;box-shadow:inset 0 1px 3px rgba(18,38,26,.06)}

/* left coding strip (kleur = type, herkenning) */
.hw-tab{flex:0 0 19px;background:#8b948f;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:6px;padding:7px 0;cursor:pointer;box-shadow:inset -2px 0 4px rgba(0,0,0,.22)}
.hw-tab .n{font-size:13px;font-weight:800;line-height:1;font-family:var(--mono)}
.hw-tab .fn{opacity:.92;display:flex}
.hw-tab .fn svg{display:block}
.hw-tab.DI{background:linear-gradient(180deg,#3A7C9A,#2E6E8E)}
.hw-tab.DO{background:linear-gradient(180deg,#D08828,#C2791F)}
.hw-tab.AI{background:linear-gradient(180deg,#5C9A7B,#4E8A6B)}
.hw-tab.AO{background:linear-gradient(180deg,#7A6FC0,#6A5FB0)}
.hw-elem.flt .hw-tab{background:linear-gradient(180deg,#D9483A,#CE3A2C)}
.hw-elem.empty .hw-tab{background:#9aa3a0}
.hw-ebody{flex:1;display:flex;flex-direction:column;min-width:0}

/* module-kop: PC-merk + type + artikelnr */
.hw-head{padding:5px 7px 4px;border-bottom:1px solid rgba(0,0,0,.10);background:linear-gradient(180deg,rgba(255,255,255,.55),rgba(255,255,255,.18))}
.hw-head .pcrow{display:flex;align-items:center;gap:4px;margin-bottom:2px}
.hw-head .pcmk{width:11px;height:11px;border-radius:2.5px;background:#16a04a;display:flex;align-items:center;justify-content:center;color:#fff;font-size:7px;font-weight:800;flex:0 0 auto;box-shadow:inset 0 0 0 1px rgba(0,0,0,.12)}
.hw-head .pcw{font-size:6.5px;font-weight:800;letter-spacing:.08em;color:#3c463f}
.hw-head .nm{font-family:var(--mono);font-size:10px;font-weight:700;color:#222a25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hw-head .art{font-family:var(--mono);font-size:7.5px;font-weight:600;color:#6c766f;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* diagnose-strip D/E bovenin (zoals echte module) */
.hw-de{display:flex;align-items:center;gap:9px;padding:3px 8px;background:linear-gradient(180deg,#2b332e,#222824);border-bottom:1px solid rgba(0,0,0,.3)}
.hw-de .dd{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:8px;font-weight:800;color:#aeb8b1;letter-spacing:.04em}
.hw-de .hw-ef{margin:0;padding:0;border:0;background:none;display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:8px;font-weight:800;color:#aeb8b1}
.hw-de .tylbl{margin-left:auto;font-family:var(--mono);font-size:7.5px;font-weight:600;color:#7d8881}

.hw-chs{flex:1;display:flex;flex-direction:column;padding:3px 3px 2px;gap:1.5px;overflow:hidden}
.hw-ch{display:flex;align-items:center;gap:5px;height:14px;padding:0 3px 0 4px;border-radius:3px;background:linear-gradient(180deg,rgba(255,255,255,.62),rgba(255,255,255,.40));border:1px solid rgba(0,0,0,.05);cursor:pointer;font:inherit;text-align:left;flex:0 0 auto}
.hw-ch:hover{background:#fff;border-color:rgba(0,0,0,.16)}
.hw-ch .led{margin-left:1px}
.hw-ch .cn{font-family:var(--mono);font-size:8px;font-weight:700;color:#46514b;flex:0 0 auto;width:13px}
.hw-ch .ab{font-size:8.5px;color:#39433d;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;flex:1;min-width:0}
.hw-ch .mA{font-family:var(--mono);font-size:8px;color:#2c352f;flex:0 0 auto}
/* realistische donkere push-in klem (zoals echte AXL SE): metalen klemsleuf + contact */
.hw-ch .pin{position:relative;width:12px;height:11px;border-radius:2px;background:linear-gradient(180deg,#454e48,#262d28);box-shadow:inset 0 0 0 1px rgba(0,0,0,.55),inset 0 1px 1px rgba(255,255,255,.10);flex:0 0 auto;overflow:hidden}
.hw-ch .pin::before{content:"";position:absolute;left:2.5px;right:2.5px;top:2.5px;height:3.5px;border-radius:1px;background:linear-gradient(180deg,#aeb5af,#838c86);box-shadow:inset 0 1px 1px rgba(0,0,0,.35)}
.hw-ch .pin::after{content:"";position:absolute;left:3.5px;right:3.5px;bottom:2px;height:2px;border-radius:.5px;background:#0e120e}
.hw-ch.free{opacity:.55}.hw-ch.free .ab{font-style:italic;color:#76807a}
.hw-ch.free .pin{filter:brightness(.95)}
/* oranje potentiaal-/voedingsklem (UP) midden in de module */
.hw-pot{display:flex;align-items:center;gap:4px;height:13px;margin:2px 1px;padding:0 4px;border-radius:3px;background:linear-gradient(180deg,rgba(226,149,47,.30),rgba(207,127,28,.18));border:1px solid rgba(196,118,20,.55);flex:0 0 auto}
.hw-pot .pl{font-family:var(--mono);font-size:7px;font-weight:800;color:#945c11;letter-spacing:.05em;flex:1;white-space:nowrap}
.hw-pot .pt{position:relative;width:12px;height:10px;border-radius:2px;background:linear-gradient(180deg,#e8983a,#cf7f1c);box-shadow:inset 0 0 0 1px rgba(120,70,10,.45),inset 0 1px 1px rgba(255,255,255,.45);flex:0 0 auto;overflow:hidden}
.hw-pot .pt::after{content:"";position:absolute;left:3px;right:3px;bottom:1.5px;height:2px;border-radius:.5px;background:#7a4a0c}
.hw-ch.flt{background:var(--alarm-bg);border-color:var(--alarm);box-shadow:0 0 0 1px var(--alarm),0 1px 4px rgba(206,58,46,.18)}
.hw-ch.flt .cn,.hw-ch.flt .ab,.hw-ch.flt .mA{color:var(--alarm);font-weight:700}
.hw-ch.flt .led{background:var(--alarm)!important;box-shadow:0 0 7px rgba(206,58,46,.9),inset 0 0 0 1px rgba(255,255,255,.25)!important;animation:ledblink 1s steps(1,end) infinite!important}
.hw-ch.sel{outline:2px solid var(--acc);outline-offset:-1px;background:#fff}
.hw-spare{flex:1;display:flex;flex-wrap:wrap;align-content:flex-start;gap:3px;padding:6px 4px 4px;opacity:.45}
.hw-spare i{position:relative;width:11px;height:9px;border-radius:1.5px;background:linear-gradient(180deg,#454e48,#262d28);box-shadow:inset 0 0 0 1px rgba(0,0,0,.4)}
.hw-spare i::before{content:"";position:absolute;left:2px;right:2px;top:2px;height:2.5px;border-radius:1px;background:#838c86}

/* basis-voet: bus/voeding (zoals onderzijde echte module) */
.hw-ef{display:flex;align-items:center;gap:6px;padding:3px 7px;margin-top:auto;border-top:1px solid rgba(0,0,0,.12);background:linear-gradient(180deg,rgba(255,255,255,.30),rgba(0,0,0,.04));font-family:var(--mono)}
.hw-ef .t{font-size:7.5px;font-weight:800;color:#46514b;letter-spacing:.03em}
.hw-ef .ty{margin-left:auto;font-size:7.5px;color:#59635e;font-weight:600}
.hw-ef .ty2{margin:0 auto;font-family:var(--mono);font-size:9px;font-weight:700;color:#2c352f;letter-spacing:.02em}
.hw-elem.empty .cover{margin:auto;text-align:center;font-size:10.5px;color:var(--ink-3);padding:14px;line-height:1.55}

/* ---- status bar ---- */
.hw-bar{display:flex;align-items:center;gap:12px;padding:13px 16px;border-radius:var(--r-md);border:1px solid var(--c-line);background:var(--c-surface);box-shadow:var(--sh-1);margin-top:14px;transition:background var(--dur),border-color var(--dur)}
.hw-bar.flt{background:var(--alarm-bg);border-color:var(--alarm-line)}
.hw-bar.ok{background:var(--ok-bg);border-color:var(--ok-line)}
.hw-bar .ic{flex:0 0 auto;display:flex}
.hw-bar.flt .ic{color:var(--alarm)} .hw-bar.ok .ic{color:var(--ok)} .hw-bar.info .ic{color:var(--info)}
.hw-bar .tx{font-size:13px;color:var(--ink);min-width:0;line-height:1.4}
.hw-bar .tx b{font-weight:700}
.hw-bar.flt .tx b{color:var(--alarm)}
.hw-bar .tx .sub{color:var(--ink-2);font-size:12.5px}
.hw-bar .tx .code{font-family:var(--mono);font-size:11.5px;font-weight:600}
.hw-bar .reset{margin-left:auto;flex:0 0 auto;font-size:12.5px;color:var(--acc);background:none;border:0;cursor:pointer;font-weight:600;white-space:nowrap}
.hw-bar .reset:hover{text-decoration:underline}
.hw-legend{display:flex;flex-wrap:wrap;gap:8px 18px;margin-top:12px;font-size:11.5px;color:var(--ink-2)}
.hw-legend span{display:inline-flex;align-items:center;gap:6px}
.hw-tools{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.hw-hint{font-size:12.5px;color:var(--ink-3)}

/* ---- configurator ---- */
.hw-elem.edit .hw-ch{border-style:dashed;border-color:rgba(0,0,0,.18)}
.hw-elem.edit .hw-ch:hover{outline:1.5px dashed var(--acc)}
.hw-head.hw-pick{display:block;width:100%;border:0;cursor:pointer;font:inherit;text-align:left;position:relative}
.hw-head.hw-pick:hover{background:linear-gradient(180deg,var(--acc-50),rgba(233,244,237,.6))}
.hw-head.hw-pick .pick-chip{margin-left:auto;font-family:var(--font);font-size:7.5px;font-weight:700;color:var(--acc);background:var(--acc-50);border:1px solid var(--acc-100);border-radius:99px;padding:1px 5px}
.hw-head.hw-pick .pcrow{display:flex;align-items:center}
.cover.hw-pick.add-slot{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;width:100%;height:100%;border:0;background:none;cursor:pointer;color:var(--acc);font:inherit;padding:14px}
.cover.hw-pick.add-slot:hover{background:var(--acc-50)}
.cover.hw-pick.add-slot .plus{font-size:22px;font-weight:300;line-height:1;color:var(--acc)}
.cover.hw-pick.add-slot span:not(.plus):not(.sub){font-size:11px;font-weight:600}
.cover.hw-pick.add-slot .sub{font-size:9px;color:var(--ink-3)}

/* config-bouwbalk */
.hw-config{margin:-6px 0 16px}
.cfg-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(184px,1fr));gap:10px}
.cfg-card{display:flex;flex-direction:column;gap:3px;align-items:flex-start;padding:11px 13px;border:1px solid var(--c-line);border-radius:var(--r-md);background:var(--c-surface);box-shadow:var(--sh-1);cursor:pointer;text-align:left;font:inherit;transition:border-color var(--dur),background var(--dur)}
.cfg-card:hover:not(.static):not(.dis){border-color:var(--acc);background:var(--acc-50)}
.cfg-card .k{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.03em;color:var(--ink-3)}
.cfg-card .k svg{color:var(--ink-3)}
.cfg-card .v{font-size:14px;font-weight:700;color:var(--ink);line-height:1.25}
.cfg-card .m{font-size:11px;color:var(--ink-3);font-family:var(--mono)}
.cfg-card.static{cursor:default}
.cfg-card.toggle.on{border-color:var(--acc);background:var(--acc-50)}
.cfg-card.toggle.on .v{color:var(--acc-700)}
.cfg-card.dis{opacity:.6;cursor:not-allowed}
.cfg-card .seg.sm{margin:2px 0}
.seg.sm{display:inline-flex;background:var(--c-sunken);border:1px solid var(--c-line);border-radius:var(--r-pill);padding:2px}
.seg.sm button{font:inherit;font-size:11.5px;font-weight:600;border:0;background:none;color:var(--ink-2);padding:3px 10px;border-radius:var(--r-pill);cursor:pointer}
.seg.sm button[aria-pressed="true"]{background:var(--acc);color:#fff}
.cfg-hint{display:flex;align-items:flex-start;gap:7px;margin-top:10px;font-size:12px;color:var(--ink-2);line-height:1.5}
.cfg-hint svg{flex:0 0 auto;color:var(--ink-3);margin-top:1px}

/* links-aanbouw (AXC BS L 2 + XT) */
.hw-bsl{flex:0 0 auto;display:flex;flex-direction:column;align-self:stretch;border-radius:7px;border:1px solid #9aa3a0;background:linear-gradient(180deg,#cdd3d1,#bcc3c0);overflow:hidden;margin-right:2px}
.hw-bsl-spine{padding:4px 0;text-align:center;background:linear-gradient(180deg,#3a433e,#2b342e);color:#cfe0d6}
.hw-bsl-spine span{font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:.04em}
.hw-xt-row{flex:1;display:flex;gap:6px;padding:8px;align-items:stretch}
.hw-xt{flex:0 0 92px;display:flex;border-radius:6px;overflow:hidden;border:1px solid #a1aaa6;background:linear-gradient(180deg,#D7DCDA,#C4CBC7);box-shadow:var(--sh-1)}
.hw-xt.hw-pick{cursor:pointer}
.hw-xt.hw-pick:hover{border-color:var(--acc);box-shadow:0 0 0 2px var(--acc-100)}
.hw-xt.flt{border-color:var(--alarm);box-shadow:0 0 0 2px var(--alarm-line),0 0 16px rgba(206,58,46,.22)}
.hw-xt-tab{flex:0 0 18px;background:linear-gradient(180deg,#5a635e,#454e48);color:#fff;display:flex;align-items:flex-start;justify-content:center;padding-top:7px}
.hw-xt.flt .hw-xt-tab{background:var(--alarm)}
.hw-xt-body{flex:1;display:flex;flex-direction:column;gap:3px;padding:7px 7px 6px;min-width:0}
.hw-xt-pc .pcmk{display:inline-flex;align-items:center;justify-content:center;width:13px;height:13px;border-radius:3px;background:#16a04a;color:#fff;font-size:7px;font-weight:800}
.hw-xt-nm{font-family:var(--mono);font-size:9.5px;font-weight:700;color:#222a25;line-height:1.15}
.hw-xt-if{font-size:8.5px;color:#5a635e;line-height:1.2;flex:1}
.hw-xt-de{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:8px;font-weight:700;color:#46514b}
.hw-xt-art{font-family:var(--mono);font-size:7.5px;color:#76807a}
.hw-xt.add{flex:0 0 86px;flex-direction:column;align-items:center;justify-content:center;gap:4px;border-style:dashed;border-color:var(--acc);background:var(--acc-50);color:var(--acc);cursor:pointer;font:inherit}
.hw-xt.add .plus{font-size:22px;font-weight:300;line-height:1}
.hw-xt.add .t{font-size:9.5px;font-weight:700;text-align:center;padding:0 4px}

/* rail-keten (geen DIN-rail meer getekend) */
.hw-railrow{display:flex;align-items:stretch;gap:12px;min-width:max-content;padding:2px}

/* direct-op-rail Axioline F-module (voeding/IO) */
.hw-axlf{flex:0 0 auto;width:96px;align-self:stretch;display:flex;border-radius:6px;overflow:hidden;border:1px solid #a1aaa6;background:linear-gradient(180deg,#D7DCDA,#C4CBC7);box-shadow:var(--sh-2)}
.hw-axlf.hw-pick{cursor:pointer}
.hw-axlf.hw-pick:hover{border-color:var(--acc);box-shadow:0 0 0 2px var(--acc-100)}
.hw-axlf.flt{border-color:var(--alarm);box-shadow:0 0 0 2px var(--alarm),0 0 18px rgba(206,58,46,.28)}
.hw-axlf.pwr{background:linear-gradient(180deg,#E6CB8A,#D3B25C);border-color:#b59134}
.hw-axlf-tab{flex:0 0 18px;background:linear-gradient(180deg,#5a635e,#454e48);color:#fff;display:flex;align-items:flex-start;justify-content:center;padding-top:7px}
.hw-axlf.pwr .hw-axlf-tab{background:linear-gradient(180deg,#9a7a22,#6b5212)}
.hw-axlf.flt .hw-axlf-tab{background:var(--alarm)}
.hw-axlf-body{flex:1;display:flex;flex-direction:column;gap:4px;padding:7px 7px 7px;min-width:0}
.hw-axlf-pc{display:flex;align-items:center;gap:5px}
.hw-axlf-pc .pcmk{display:inline-flex;align-items:center;justify-content:center;width:13px;height:13px;border-radius:3px;background:#16a04a;color:#fff;font-size:7px;font-weight:800}
.hw-axlf.pwr .hw-axlf-pc .pcmk{background:#6b5212}
.hw-axlf-nm{font-family:var(--mono);font-size:10px;font-weight:700;color:#222a25;line-height:1.15}
.hw-axlf-if{font-size:9px;color:#5a635e;line-height:1.25;flex:1}
.hw-axlf.pwr .hw-axlf-if{color:#5a4410}
.hw-axlf-foot{display:flex;align-items:center;justify-content:space-between;gap:4px;border-top:1px solid rgba(0,0,0,.12);padding-top:4px}
.hw-axlf-de{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:8px;font-weight:800;color:#46514b}
.hw-axlf-art{font-family:var(--mono);font-size:7.5px;color:#76807a}
.seg-chip{font-family:var(--font);font-size:7.5px;font-weight:700;color:var(--acc);background:var(--acc-50);border:1px solid var(--acc-100);border-radius:99px;padding:1px 6px;margin-left:auto}
.hw-bp.hw-pick .hw-spine{cursor:pointer}
.hw-bp.hw-pick:hover .hw-spine{background:linear-gradient(180deg,#2f6a45,#1f5234)}
.hw-spine{position:relative}

/* + Op de rail toevoegen */
.hw-railadd{flex:0 0 auto;width:96px;align-self:stretch;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;border-radius:6px;border:2px dashed var(--acc);background:var(--acc-50);color:var(--acc);cursor:pointer;font:inherit}
.hw-railadd .plus{font-size:26px;font-weight:300;line-height:1}
.hw-railadd .t{font-size:10px;font-weight:700;text-align:center;padding:0 6px}
.hw-railadd:hover{background:var(--acc-100)}

/* standalone Axioline F-module op de rail (zelfde stijl als SE-module) */
.hw-elem.axlf{flex:0 0 auto;width:162px;align-self:flex-start}
.hw-tab.PWR{background:linear-gradient(180deg,#E0A92E,#C2791F)}
.hw-tab.ADAPT{background:linear-gradient(180deg,#6b746e,#5a635e)}
.hw-tab.DIO{background:linear-gradient(180deg,#D08828,#C2791F)}
.hw-elem.axlf.PWR{background:repeating-linear-gradient(90deg,rgba(255,255,255,.10) 0,rgba(255,255,255,.10) 1px,transparent 1px,transparent 6px),linear-gradient(180deg,#E6CF95 0%,#Dcc079 60%,#D3B25C 100%);border-color:#b59134}
.hw-pwrbody{flex:1;display:flex;flex-direction:column;gap:6px;padding:8px 8px}
.hw-pwr-row{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:9.5px;font-weight:700;color:#4a3a0c}
.hw-pwr-terms{display:grid;grid-template-columns:repeat(2,1fr);gap:4px;margin-top:2px}
.hw-pwr-terms .t{font-family:var(--mono);font-size:8px;font-weight:700;color:#4a3a0c;text-align:center;padding:5px 0;border-radius:3px;box-shadow:inset 0 1px 1px rgba(0,0,0,.18)}
.hw-pwr-terms .t.rd{background:linear-gradient(180deg,#d98a82,#c0473b);color:#fff}
.hw-pwr-terms .t.bl{background:linear-gradient(180deg,#7ea0c4,#3f6f9c);color:#fff}
.hw-pwr-note{font-size:9px;color:#6b5212;line-height:1.3;margin-top:auto}
.hw-adaptbody{flex:1;display:flex;flex-direction:column;padding:4px}
.hw-elem.axlf .hw-ch[tabindex]{cursor:default}
.hw-elem.axlf.hw-pick .hw-head{cursor:pointer}
.hw-elem.axlf.hw-pick:hover{box-shadow:0 0 0 2px var(--acc-100),var(--sh-2)}

/* '+ toevoegen'-chip op configkaart */
.cfg-add{font-family:var(--font);font-size:9px;font-weight:700;color:var(--acc-700);background:var(--acc-50);border:1px solid var(--acc-100);border-radius:99px;padding:0 6px;margin-left:4px;text-transform:none;letter-spacing:0}

/* decentrale veldbus-stations */
.fb-card{margin-top:20px;padding:0;overflow:hidden}
.fb-cardhead{display:flex;align-items:center;gap:8px;padding:13px 16px;border-bottom:1px solid var(--c-line)}
.fb-cardhead h3{font-size:14px}
.fb-row{display:flex;align-items:stretch;gap:0;padding:18px 16px;overflow-x:auto}
.fb-plc{flex:0 0 auto;width:104px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:12px 8px;border-radius:var(--r-md);border:1px solid var(--c-line-2);background:linear-gradient(180deg,#D7DCDA,#C6CDCB);color:var(--ink);box-shadow:var(--sh-1);text-align:center}
.fb-plc svg{color:var(--ink-2)}
.fb-plc span{font-family:var(--mono);font-size:11px;font-weight:700;line-height:1.2}
.fb-plc .fb-plc-sub{font-family:var(--font);font-size:10px;font-weight:600;color:var(--ink-3)}
.fb-bus{flex:0 0 34px;align-self:stretch;display:flex;align-items:center}
.fb-bus .fb-busline{flex:1;height:3px;border-radius:2px;background:repeating-linear-gradient(90deg,var(--info) 0,var(--info) 6px,transparent 6px,transparent 11px)}
.fb-node{flex:0 0 auto;width:168px;margin-right:14px;position:relative;padding-top:20px}
.fb-node.hw-pick{cursor:pointer}
.fb-link{position:absolute;top:0;left:0;right:0;display:flex;justify-content:center}
.fb-proto{font-family:var(--mono);font-size:9px;font-weight:800;color:var(--info);background:var(--info-bg);border:1px solid var(--info-line);border-radius:99px;padding:1px 9px}
.fb-node.bad .fb-proto{color:var(--warn);background:var(--warn-bg);border-color:var(--warn-line)}
.fb-coupler{border:1px solid var(--c-line-2);border-radius:var(--r-md);background:linear-gradient(180deg,#DBE0DD,#C8CFCB);box-shadow:var(--sh-1);padding:9px 10px;display:flex;flex-direction:column;gap:5px}
.fb-node.bad .fb-coupler{border-color:var(--warn-line);box-shadow:0 0 0 1px var(--warn-line)}
.fb-node.hw-pick:hover .fb-coupler{border-color:var(--acc);box-shadow:0 0 0 2px var(--acc-100)}
.fb-head{display:flex;align-items:center;gap:6px}
.fb-head .pcmk{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:3px;background:#16a04a;color:#fff;font-size:7.5px;font-weight:800;flex:0 0 auto}
.fb-head .fb-nm{font-family:var(--mono);font-size:11px;font-weight:700;color:#222a25}
.fb-art{font-family:var(--mono);font-size:9px;color:var(--ink-3)}
.fb-mods{display:flex;align-items:center;gap:3px;padding:3px 0}
.fb-mods i{width:11px;height:26px;border-radius:2px;background:linear-gradient(180deg,#CDD3D1,#B8C0BB);border:1px solid #a1aaa6}
.fb-mods .fb-more{font-size:9.5px;color:var(--ink-3);font-style:italic;margin-left:3px}
.fb-conn{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;color:var(--info);font-weight:600}
.fb-conn svg{color:var(--info)}
.fb-conn.bad,.fb-conn.bad svg{color:var(--warn)}
.fb-add{flex:0 0 auto;width:148px;align-self:stretch;min-height:96px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;border-radius:var(--r-md);border:2px dashed var(--acc);background:var(--acc-50);color:var(--acc);cursor:pointer;font:inherit;margin-top:20px}
.fb-add .plus{font-size:24px;font-weight:300;line-height:1}
.fb-add .t{font-size:11px;font-weight:700;text-align:center;padding:0 8px}
.fb-add:hover{background:var(--acc-100)}
.fb-empty{flex:0 0 auto;align-self:center;color:var(--ink-3);font-size:12.5px;font-style:italic;padding:0 16px}

/* realistische buskoppelaar (zoals AXL F BK PN TPS) */
.fb-cpl{flex:0 0 auto;align-self:stretch;border-right:2px dashed var(--info-line)}
.fb-cpl.bad{border-right-color:var(--warn-line)}
.fb-cpl.hw-pick{cursor:pointer}
.fb-cpl.hw-pick:hover{box-shadow:0 0 0 2px var(--acc-100),var(--sh-2)}
.fb-cpl .hw-terms.cpl{grid-template-columns:repeat(2,1fr)}
.fb-cpl .hw-window{min-height:60px}
.cpl-eth{display:flex;flex-direction:column;gap:9px;padding:8px}
.cpl-port{display:flex;flex-direction:column;align-items:center;gap:2px}
.cpl-la{display:flex;justify-content:space-between;width:36px;font-family:var(--mono);font-size:6px;font-weight:700;color:#5a635e;letter-spacing:.02em}
.cpl-jack{width:36px;height:25px;border-radius:3px;background:linear-gradient(180deg,#3a433e,#262d28);display:flex;align-items:flex-end;justify-content:center;gap:4px;padding-bottom:3px;box-shadow:inset 0 0 0 1px rgba(0,0,0,.45)}
.cpl-jack i{width:6px;height:4px;border-radius:1px;background:#3a463f}
.cpl-port.up .cpl-jack i:first-child{background:var(--ok);box-shadow:0 0 5px var(--ok)}
.cpl-port.up .cpl-jack i:last-child{background:#E0A92E;box-shadow:0 0 4px rgba(224,169,46,.7)}
.cpl-pn{font-family:var(--mono);font-size:8px;font-weight:700;color:#46514b}
